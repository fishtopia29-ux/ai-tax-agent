// ─────────────────────────────────────────
//  PII SCRUBBER
// ─────────────────────────────────────────
const PII_PATTERNS = [
  /\b\d{3}\s?\d{3}\s?\d{3}\b/g,
  /\bBSB\s*\d{3}[-\s]?\d{3}\b/gi,
  /\b\d{2,3}-?\d{3}-?\d{3}\b/g,
];
function scrubPII(text) {
  let t = text;
  PII_PATTERNS.forEach(p => { t = t.replace(p, "[REDACTED]"); });
  return t;
}

// ─────────────────────────────────────────
//  TAX CALCULATIONS
// ─────────────────────────────────────────
function calcTax2425(inc) {
  if (inc <= 18200)  return 0;
  if (inc <= 45000)  return (inc - 18200) * 0.19;
  if (inc <= 120000) return 5092 + (inc - 45000) * 0.325;
  if (inc <= 180000) return 29467 + (inc - 120000) * 0.37;
  return 51667 + (inc - 180000) * 0.45;
}
function calcLITO(inc) {
  if (inc <= 37500) return 700;
  if (inc <= 45000) return 700 - (inc - 37500) * 0.05;
  if (inc <= 66667) return 325 - (inc - 45000) * 0.015;
  return 0;
}
function parseVal(v) {
  if (v == null) return 0;
  const n = parseFloat(String(v).replace(/[$,\s]/g, ""));
  return isNaN(n) ? 0 : n;
}
function fmtAUD(v) {
  if (!v && v !== 0) return "—";
  return "$" + Math.abs(v).toLocaleString("en-AU", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function computeTotals(docs) {
  const done    = docs.filter(d => d.status === "done" && d.extracted && !d.extracted.error);
  const nonEss  = done.filter(d => d.type !== "ess");
  const essDocs = done.filter(d => d.type === "ess");
  const sum = (arr, f) => arr.reduce((a, d) => a + parseVal(d.extracted[f]), 0);

  const paygIncome   = sum(nonEss, "income");
  const taxWithheld  = sum(nonEss, "taxWithheld");
  const deductions   = sum(done,   "deductions");
  const rentalIncome = sum(done,   "rentalIncome");
  const rentalExp    = sum(done,   "rentalExpenses");
  const capitalGains = sum(done,   "capitalGains");
  const essBoxF      = sum(essDocs,"essIncome");
  const essBoxD      = sum(essDocs,"essBoxD");
  const essBoxE      = sum(essDocs,"essBoxE");
  const essTaxWH     = sum(essDocs,"essTaxWithheld");

  const essBoxDConcession = essDocs.length > 0 ? Math.min(essBoxD, 1000 * essDocs.length) : 0;
  const essAssessable = essBoxF + Math.max(0, essBoxD - essBoxDConcession) + essBoxE;
  const netRental     = rentalIncome - rentalExp;
  const totalIncome   = paygIncome + essAssessable + (netRental > 0 ? netRental : 0) + capitalGains;
  const taxableIncome = Math.max(0, totalIncome - deductions + (netRental < 0 ? netRental : 0));

  const grossTax   = calcTax2425(taxableIncome);
  const lito       = calcLITO(taxableIncome);
  const medicare   = taxableIncome * 0.02;
  const netTax     = Math.max(0, grossTax - lito + medicare);
  const totalTaxWH = taxWithheld + essTaxWH;
  const refund     = totalTaxWH - netTax;

  return { paygIncome, taxWithheld, deductions, rentalIncome, rentalExp, capitalGains,
           essBoxF, essBoxD, essBoxE, essTaxWH, essBoxDConcession,
           taxableIncome, grossTax, lito, medicare, netTax, totalTaxWH, refund };
}

// ─────────────────────────────────────────
//  STATE / REDUCER
// ─────────────────────────────────────────
const INITIAL = {
  apiKey: "",
  panel: "interview",
  incomeTypes: new Set(["payg"]),
  chatMessages: [],
  drafterMessages: [],
  docs: [],
  docIdSeq: 0,
  clientActive: false,
  archivedClients: [],
  interviewSummary: [],
  interviewRisks: [],
  showArchiveModal: false,
};

function reducer(state, action) {
  switch (action.type) {
    case "SET_API_KEY":      return { ...state, apiKey: action.payload };
    case "SET_PANEL":        return { ...state, panel: action.payload };
    case "TOGGLE_INCOME": {
      const s = new Set(state.incomeTypes);
      s.has(action.payload) ? s.delete(action.payload) : s.add(action.payload);
      return { ...state, incomeTypes: s };
    }
    case "ADD_CHAT_MSG":       return { ...state, chatMessages: [...state.chatMessages, action.payload], clientActive: true };
    case "ADD_DRAFTER_MSG":    return { ...state, drafterMessages: [...state.drafterMessages, action.payload] };
    case "SET_SUMMARY":        return { ...state, interviewSummary: action.payload };
    case "SET_RISKS":          return { ...state, interviewRisks: action.payload };
    case "ADD_DOCS":           return { ...state, docs: [...state.docs, ...action.payload], docIdSeq: state.docIdSeq + action.payload.length };
    case "UPDATE_DOC":         return { ...state, docs: state.docs.map(d => d.id === action.payload.id ? { ...d, ...action.payload } : d) };
    case "REMOVE_DOC":         return { ...state, docs: state.docs.filter(d => d.id !== action.payload) };
    case "SHOW_ARCHIVE_MODAL": return { ...state, showArchiveModal: true };
    case "HIDE_ARCHIVE_MODAL": return { ...state, showArchiveModal: false };
    case "ARCHIVE_CLIENT":     return { ...state, archivedClients: [action.payload, ...state.archivedClients] };
    case "RESET_SESSION":      return {
      ...INITIAL,
      apiKey: state.apiKey,
      archivedClients: state.archivedClients,
      incomeTypes: new Set(["payg"]),
      panel: "interview",
    };
    default: return state;
  }
}

// ─────────────────────────────────────────
//  API HELPERS
// ─────────────────────────────────────────
async function callClaude(apiKey, { system, messages, maxTokens = 1000 }) {
  const resp = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({ model: MODEL, max_tokens: maxTokens, system, messages }),
  });
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error?.message || "API error");
  return data.content.map(c => c.text || "").join("");
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("Read error"));
    r.readAsDataURL(file);
  });
}

function guessDocType(name) {
  const n = name.toLowerCase();
  if (/payg|income|salary|payment/.test(n))      return "payg";
  if (/ess|share.scheme|employee.share/.test(n)) return "ess";
  if (/rental|rent|property/.test(n))            return "rental";
  if (/invest|broker|dividend|cgt/.test(n))      return "invest";
  if (/receipt|deduct|expense/.test(n))          return "receipt";
  if (/loan|mortgage|interest/.test(n))          return "loan";
  if (/bas|abn|sole|business/.test(n))           return "business";
  return "other";
}

// ─────────────────────────────────────────
//  ARCHIVE / EXPORT HELPERS
// ─────────────────────────────────────────
function buildArchiveText(clientName, state) {
  const lines = [];
  lines.push("AusTax Agent — Accountant Notes");
  lines.push(`Client: ${clientName}`);
  lines.push(`FY ${FY}`);
  lines.push(`Archived: ${new Date().toLocaleString("en-AU")}`);
  lines.push("");
  lines.push("=== INTERVIEW TRANSCRIPT ===");
  state.chatMessages.length
    ? state.chatMessages.forEach(m => lines.push(`[${m.role.toUpperCase()}] ${m.content}`))
    : lines.push("(no interview recorded)");
  lines.push("");
  lines.push("=== VAULT EXTRACTED DATA ===");
  const done = state.docs.filter(d => d.status === "done" && d.extracted && !d.extracted.error);
  done.length ? done.forEach(d => {
    const ex = d.extracted;
    lines.push(`\n--- ${d.file.name} (${ex.docLabel || d.type}) ---`);
    (ex.fields || []).forEach(f => lines.push(`  ${f.ato_code || ""} ${f.label}: ${f.value}`));
    if (ex.essTransactions && ex.essTransactions.length) {
      lines.push("  ESS Transactions:");
      ex.essTransactions.forEach(t => lines.push(
        `    ${t.taxingPointDate || ""} ${t.soldWithin30Days ? "SALE" : "VEST"} Box${t.essItem || "F"} ${t.numInterests}x AU:${t.taxableAuPct != null ? t.taxableAuPct : 100}% = $${t.reportableDiscount}`
      ));
    }
    if (ex.notes) lines.push(`  Notes: ${ex.notes}`);
  }) : lines.push("(no documents extracted)");
  lines.push("");
  lines.push("=== RETURN DRAFTER ===");
  state.drafterMessages.length
    ? state.drafterMessages.forEach(m => lines.push(`[${m.role.toUpperCase()}] ${m.content}`))
    : lines.push("(no drafter session recorded)");
  return lines.join("\n");
}

function downloadText(filename, content) {
  const blob = new Blob([content], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function buildVaultContext(docs, chatMessages) {
  const done = docs.filter(d => d.status === "done" && d.extracted && !d.extracted.error);
  if (!done.length) return "No documents have been processed yet.";
  return done.map(d => {
    const ex = d.extracted;
    if (d.type === "ess") {
      const txs = ex.essTransactions || [];
      const saleEvents  = txs.filter(t => t.soldWithin30Days);
      const vestEvents  = txs.filter(t => !t.soldWithin30Days);
      const totalDiscount = txs.reduce((a, t) => a + parseVal(t.reportableDiscount), 0);
      const txTable = txs.map(t =>
        `  ${(t.taxingPointDate||"").padEnd(12)} ${(t.soldWithin30Days?"SALE":"VEST").padEnd(5)} Box${t.essItem||"F"} AU:${t.taxableAuPct!=null?t.taxableAuPct:100}% ${t.numInterests||0}x ${t.discountBasis||""} = $${parseVal(t.reportableDiscount).toFixed(2)} [${t.award||""}]`
      ).join("\n");
      return `[ESS STATEMENT — Item 12] ${d.file.name}
Employer: ${ex.essEmployer||"Unknown"}
Box D (Taxed upfront — eligible for reduction, s.83A-35): $${parseVal(ex.essBoxD).toFixed(2)}
Box E (Taxed upfront — not eligible for reduction): $${parseVal(ex.essBoxE).toFixed(2)}
Box F (Deferral scheme discount — FULLY ASSESSABLE at Item 12, s.83A-110): $${parseVal(ex.essIncome).toFixed(2)}
Box C (TFN amounts withheld): $${parseVal(ex.essTaxWithheld).toFixed(2)}
Tx row sum: $${totalDiscount.toFixed(2)} ${Math.abs(totalDiscount-parseVal(ex.essIncome))<1?"[✓ matches Box F]":"[⚠ differs — use Box F]"}
TRANSACTIONS (${txs.length} rows): ${vestEvents.length} vest, ${saleEvents.length} sale-date
${txTable}
TAX TREATMENT: Box F = ordinary income s.83A-110, no CGT discount. Box D apply $1,000 concession. Box C offsets tax payable.
Notes: ${ex.notes||""}`;
    }
    const fields = (ex.fields||[]).map(f => `${f.label}: ${f.value}`).join(", ");
    return `[${ex.docLabel||d.type.toUpperCase()}] ${d.file.name}
${fields}
Income: ${ex.income!=null?ex.income:"N/A"} | Tax withheld: ${ex.taxWithheld!=null?ex.taxWithheld:"N/A"} | Deductions: ${ex.deductions!=null?ex.deductions:"N/A"} | Rental income: ${ex.rentalIncome!=null?ex.rentalIncome:"N/A"} | Rental exp: ${ex.rentalExpenses!=null?ex.rentalExpenses:"N/A"} | CGT: ${ex.capitalGains!=null?ex.capitalGains:"N/A"}
Notes: ${ex.notes||""}`;
  }).join("\n\n");
}

.modal-input:focus{border-color:var(--accent);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px;}
`;

// ─────────────────────────────────────────
//  SMALL SHARED COMPONENTS
// ─────────────────────────────────────────
function Spinner() { return <span className="spin" />; }

function SbSection({ children }) {
  return <div className="sb-section">{children}</div>;
}

function SumRow({ label, value, bold, color }) {
  return (
    <div className="sum-row">
      <span className="sum-label" style={bold ? { fontWeight:600, color:"var(--text)" } : {}}>{label}</span>
      <span className="sum-val" style={color ? { color, fontWeight: bold ? 700 : 600 } : {}}>{value || "—"}</span>
    </div>
  );
}

// ─────────────────────────────────────────
//  VAULT TOTALS
// ─────────────────────────────────────────
function VaultTotals({ docs }) {
  const t = computeTotals(docs);
  const f  = v => v > 0 ? fmtAUD(v) : "—";
  const fN = v => v > 0 ? "-" + fmtAUD(v) : "—";
  return (
    <div style={{ padding:"0 10px 8px" }}>
      <div className="sb-section" style={{ padding:"6px 0 2px" }}>Income</div>
      <SumRow label="PAYG salary (Item 1)"    value={f(t.paygIncome)}   />
      <SumRow label="Rental income"           value={f(t.rentalIncome)} />
      <SumRow label="Capital gains"           value={f(t.capitalGains)} />
      <div className="sb-section" style={{ padding:"6px 0 2px", borderTop:"0.5px solid var(--border)", marginTop:4 }}>ESS — Item 12</div>
      <SumRow label="Box F deferral"          value={f(t.essBoxF)} color="var(--invest)" bold />
      <SumRow label="Box D upfront (elig.)"   value={t.essBoxD > 0 ? f(t.essBoxD) + (t.essBoxDConcession > 0 ? ` (-$${t.essBoxDConcession.toFixed(0)} conc.)` : "") : "—"} />
      <SumRow label="Box E upfront (no red.)" value={f(t.essBoxE)} />
      <SumRow label="Box C TFN withheld"      value={f(t.essTaxWH)} />
      <div className="sb-section" style={{ padding:"6px 0 2px", borderTop:"0.5px solid var(--border)", marginTop:4 }}>Deductions</div>
      <SumRow label="Work deductions"         value={fN(t.deductions)} />
      <SumRow label="Rental expenses"         value={fN(t.rentalExp)}  />
      <div className="sb-section" style={{ padding:"6px 0 2px", borderTop:"0.5px solid var(--border)", marginTop:4 }}>Summary</div>
      <SumRow label="Taxable income"          value={f(t.taxableIncome)} bold />
      <SumRow label="Est. tax payable"        value={fN(t.netTax)} bold color="var(--danger)" />
      <SumRow label="Medicare levy (2%)"      value={fN(t.medicare)} />
      <SumRow label="Total withheld"          value={f(t.totalTaxWH)} />
      <div style={{ borderTop:"1.5px solid var(--border-strong)", marginTop:3, paddingTop:3 }}>
        <SumRow
          label="Est. refund / payable"
          value={t.totalTaxWH === 0 && t.netTax === 0 ? "—" : t.refund >= 0 ? `+${fmtAUD(t.refund)} refund` : `-${fmtAUD(Math.abs(t.refund))} payable`}
          bold
          color={t.refund >= 0 ? "var(--accent)" : "var(--danger)"}
        />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────
//  INTERVIEW PANEL
// ─────────────────────────────────────────
function InterviewPanel({ state, dispatch }) {
  const { apiKey, chatMessages, incomeTypes } = state;
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current && bottomRef.current.scrollIntoView({ behavior:"smooth" }); }, [chatMessages, loading]);

  const send = useCallback(async (text) => {
    if (!apiKey) { alert("Please enter your Anthropic API key."); return; }
    const clean = scrubPII(text.trim());
    if (!clean) return;
    setInput("");
    dispatch({ type:"ADD_CHAT_MSG", payload:{ role:"user", content:clean } });
    setLoading(true);
    const incomeList = [...incomeTypes].join(", ");
    const system = `You are AusTax Agent, an expert Australian tax accountant assistant — Accountant Edition. Conducting a structured tax interview for FY${FY}.
Active income types: ${incomeList}
- Ask focused, one-at-a-time questions
- Reference ATO sections, item numbers, and rulings
- Flag risks and opportunities
- After each exchange append SUMMARY and RISKS blocks
Format:
SUMMARY
• Item 1 Salary: $...
RISKS
→ [risk]
Never ask for TFN, full name, DOB, address, ABN, or bank details.`;
    try {
      const msgs = [...chatMessages, { role:"user", content:clean }];
      const reply = await callClaude(apiKey, { system, messages:msgs });
      dispatch({ type:"ADD_CHAT_MSG", payload:{ role:"assistant", content:reply } });
      const sumMatch = reply.match(/SUMMARY\n([\s\S]*?)(?=\nRISKS|\n\n|$)/);
      if (sumMatch) {
        const rows = sumMatch[1].trim().split("\n").filter(l => l.trim()).map(l => ({
          label: (l.replace(/^[•\-]\s*/, "").split(":")[0] || "").trim(),
          value: ((l.split(":")[1] || "").trim()),
        }));
        dispatch({ type:"SET_SUMMARY", payload:rows });
      }
      const riskMatch = reply.match(/RISKS\n([\s\S]*?)(?=\n\n|$)/);
      if (riskMatch) {
        const risks = riskMatch[1].trim().split("\n").filter(l => l.startsWith("→")).map(r => r.replace(/^→\s*/, ""));
        dispatch({ type:"SET_RISKS", payload:risks });
      }
    } catch(e) {
      dispatch({ type:"ADD_CHAT_MSG", payload:{ role:"assistant", content:"Error: " + e.message } });
    }
    setLoading(false);
  }, [apiKey, chatMessages, incomeTypes, dispatch]);

  const isEmpty = chatMessages.length === 0;
  return (
    <div className="panel">
      <div className="chat-wrap">
        {isEmpty && (
          <>
            <div style={{ textAlign:"center", padding:"10px 0 4px" }}>
              <div style={{ fontSize:22, marginBottom:6 }}>📋</div>
              <div style={{ fontSize:13, fontWeight:500, marginBottom:4 }}>Start a tax interview</div>
              <div style={{ fontSize:12, color:"var(--muted)" }}>Select income types, enter your API key, then pick a starting point or type your own question.</div>
            </div>
            <div className="starter-grid">
              {STARTER_PROMPTS.map((s, i) => (
                <div key={i} className="starter-card" onClick={() => send(s.prompt)}>
                  <div className="starter-icon">{s.icon}</div>
                  <div className="starter-title">{s.title}</div>
                  <div className="starter-sub">{s.sub}</div>
                </div>
              ))}
            </div>
          </>
        )}
        {chatMessages.map((m, i) => (
          <div key={i} className="msg">
            <div className="msg-role">{m.role}</div>
            <div className={`msg-body ${m.role}`}>{m.content}</div>
          </div>
        ))}
        {loading && (
          <div className="msg">
            <div className="msg-role">assistant</div>
            <div className="msg-body assistant loading"><Spinner />Thinking…</div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div className="notice warn" style={{ margin:"0 20px", borderRadius:"var(--rs)" }}>
        <span>⚠</span><span>Do not enter TFN, full name, DOB, address, ABN, or bank details.</span>
      </div>
      <div className="chips-row" style={{ borderTop:"none", paddingTop:8 }}>
        {INTERVIEW_CHIPS.map((c, i) => <span key={i} className="chip" onClick={() => send(c.prompt)}>{c.label}</span>)}
      </div>
      <div className="chat-input-row">
        <textarea className="chat-input" rows={1} placeholder="Ask anything about the return…"
          value={input}
          onChange={e => { setInput(e.target.value); e.target.style.height="auto"; e.target.style.height=Math.min(e.target.scrollHeight,110)+"px"; }}
          onKeyDown={e => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); send(input); } }}
        />
        <button className="tbtn primary" onClick={() => send(input)} disabled={loading}>Send →</button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────
//  ESS CARD
// ─────────────────────────────────────────
function EssCard({ doc }) {
  const ex = doc.extracted;
  const txs = ex.essTransactions || [];
  const total = txs.reduce((a, t) => a + parseVal(t.reportableDiscount), 0);
  const saleRows = txs.filter(t => t.soldWithin30Days);
  const matches = Math.abs(total - parseVal(ex.essIncome)) < 1;
  return (
    <div className="ext-panel">
      <div className="ext-hdr">
        <span>🏢</span>
        <span style={{ flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{doc.file.name}</span>
        <span style={{ fontSize:10, fontFamily:"Courier New", color:"var(--hint)", flexShrink:0 }}>ESS · Item 12 · {txs.length} rows</span>
      </div>
      <div className="ext-body">
        <div className="field-grid" style={{ marginBottom:10 }}>
          <div><div className="f-label">Employer</div><div className="f-val">{ex.essEmployer || "—"}</div></div>
          <div><div className="f-label">Box F — Deferral (Item 12)</div><div className="f-val" style={{ color:"var(--invest)", fontWeight:600 }}>{fmtAUD(parseVal(ex.essIncome))}</div></div>
          <div><div className="f-label">Box D — Upfront eligible</div><div className="f-val">{parseVal(ex.essBoxD) > 0 ? fmtAUD(parseVal(ex.essBoxD)) : "$0"}</div></div>
          <div><div className="f-label">Box E — Upfront no reduc.</div><div className="f-val">{parseVal(ex.essBoxE) > 0 ? fmtAUD(parseVal(ex.essBoxE)) : "$0"}</div></div>
          <div><div className="f-label">Box C — TFN withheld</div><div className="f-val">{fmtAUD(parseVal(ex.essTaxWithheld))}</div></div>
          <div><div className="f-label">Row total vs Box F</div><div className="f-val" style={{ color: matches ? "var(--accent)" : "var(--danger)" }}>{fmtAUD(total)} {matches ? "✓" : "⚠"}</div></div>
        </div>
        {saleRows.length > 0 && (
          <div className="notice warn" style={{ marginBottom:8, fontSize:11 }}>
            <span>⚠</span><span>{saleRows.length} sale-date event(s) — market value basis is sale price per ATO rules.</span>
          </div>
        )}
        {txs.length > 0 && (
          <div style={{ overflowX:"auto" }}>
            <table className="ess-table">
              <thead><tr>
                <th>Award</th><th>Taxing point</th><th>Type</th><th>Basis</th>
                <th style={{ textAlign:"right" }}>#</th>
                <th style={{ textAlign:"right" }}>AU%</th>
                <th style={{ textAlign:"right" }}>Box</th>
                <th style={{ textAlign:"right" }}>Discount</th>
              </tr></thead>
              <tbody>
                {txs.map((t, i) => (
                  <tr key={i} style={{ background: t.soldWithin30Days ? "var(--warn-l)" : i%2===0 ? "var(--surface)" : "var(--surface2)" }}>
                    <td title={t.award}>{(t.award||"").slice(0,20)}</td>
                    <td>{t.taxingPointDate}</td>
                    <td style={{ color: t.soldWithin30Days ? "var(--warn)" : "var(--muted)" }}>{t.soldWithin30Days ? "Sale" : "Vest"}</td>
                    <td>{t.discountBasis}</td>
                    <td style={{ textAlign:"right" }}>{t.numInterests}</td>
                    <td style={{ textAlign:"right" }}>{t.taxableAuPct != null ? t.taxableAuPct+"%" : ""}</td>
                    <td style={{ textAlign:"right", fontWeight:600, color:"var(--invest)" }}>{t.essItem||"F"}</td>
                    <td style={{ textAlign:"right", fontWeight:600 }}>{fmtAUD(parseVal(t.reportableDiscount))}</td>
                  </tr>
                ))}
              </tbody>
              <tfoot><tr><td colSpan={7}>TOTAL</td><td style={{ textAlign:"right" }}>{fmtAUD(total)}</td></tr></tfoot>
            </table>
          </div>
        )}
        {ex.notes && <div className="ext-notes">{ex.notes}</div>}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────
//  DOCUMENT EXTRACTION
// ─────────────────────────────────────────
async function extractDoc(doc, apiKey) {
  const dt = DOC_TYPES.find(d => d.id === doc.type) || DOC_TYPES[8];
  const b64 = await toBase64(doc.file);
  const isImg = doc.file.type !== "application/pdf";
  const isEss = doc.type === "ess";
  const system = `You are an Australian tax document parser for FY2024-25. Return ONLY valid JSON, no markdown, no backticks, no preamble.
FIELD RULES (all numbers: plain, no $ or commas):
"income"→PAYG gross wages(Item 1). NULL for ESS. "taxWithheld"→PAYG tax withheld. "deductions"→total deductible. "rentalIncome"→gross rental. "rentalExpenses"→rental deductions. "capitalGains"→net capital gains.
"essIncome"→ESS Box F deferral(Item 12). MUST NOT be null for ESS. "essTaxWithheld"→Box C TFN withheld. "essBoxD"→Box D upfront eligible. "essBoxE"→Box E upfront not eligible. "essEmployer"→employer name.
"essTransactions"→ESS ONLY: EVERY row from detail table: {award,grantDate,taxingPointDate,taxingPointType,discountBasis,numInterests,taxableAuPct,taxableForeignPct,reportableDiscount,essItem,soldWithin30Days}. Extract ALL rows.
Return: {"docType":"${doc.type}","docLabel":"${dt.name}","fields":[{"label":"","value":"","ato_code":""}],"income":null,"taxWithheld":null,"deductions":null,"rentalIncome":null,"rentalExpenses":null,"capitalGains":null,"essIncome":null,"essTaxWithheld":null,"essBoxD":null,"essBoxE":null,"essEmployer":null,"essTransactions":[],"notes":""}`;
  const text = await callClaude(apiKey, {
    system,
    messages: [{ role:"user", content:[
      { type: isImg ? "image" : "document", source:{ type:"base64", media_type:doc.file.type, data:b64 } },
      { type:"text", text: isEss ? "Extract ALL tax data including every row from the transaction table." : "Extract all tax-relevant data as JSON." }
    ]}],
    maxTokens: isEss ? 4000 : 1000,
  });
  return JSON.parse(text.replace(/```json|```/g, "").trim());
}

// ─────────────────────────────────────────
//  VAULT PANEL
// ─────────────────────────────────────────
function VaultPanel({ state, dispatch, onDraft }) {
  const { apiKey, docs } = state;
  const [drag, setDrag] = useState(false);
  const [processing, setProcessing] = useState(false);
  const fileRef = useRef(null);

  const addFiles = useCallback((files) => {
    const valid = Array.from(files).filter(f => ["application/pdf","image/png","image/jpeg"].includes(f.type));
    const newDocs = valid.map((f, i) => ({
      id: state.docIdSeq + i + 1,
      file: f,
      type: guessDocType(f.name),
      status: "pending",
      extracted: null,
    }));
    if (newDocs.length) dispatch({ type:"ADD_DOCS", payload:newDocs });
  }, [state.docIdSeq, dispatch]);

  const processAll = useCallback(async () => {
    if (!apiKey) { alert("Please enter your Anthropic API key."); return; }
    setProcessing(true);
    const pending = docs.filter(d => d.status !== "done");
    for (const doc of pending) {
      dispatch({ type:"UPDATE_DOC", payload:{ id:doc.id, status:"processing" } });
      try {
        const extracted = await extractDoc(doc, apiKey);
        dispatch({ type:"UPDATE_DOC", payload:{ id:doc.id, status:"done", extracted } });
      } catch(e) {
        dispatch({ type:"UPDATE_DOC", payload:{ id:doc.id, status:"error", extracted:{ error:e.message } } });
      }
    }
    setProcessing(false);
  }, [apiKey, docs, dispatch]);

  const hasDone = docs.some(d => d.status === "done" && d.extracted && !d.extracted.error);

  return (
    <div className="panel">
      <div className="vault-wrap">
        <div className="notice warn"><span>⚠</span><span>Do not upload documents containing TFN, full name, or bank account numbers. Use anonymised copies only.</span></div>
        <div className="notice info"><span>ℹ</span><span>Upload PDFs or images. Claude will extract all ATO-relevant figures automatically.</span></div>
        <div className={`upload-zone${drag ? " drag" : ""}`}
          onClick={() => fileRef.current && fileRef.current.click()}
          onDragOver={e => { e.preventDefault(); setDrag(true); }}
          onDrop={e => { e.preventDefault(); setDrag(false); addFiles(e.dataTransfer.files); }}
          onDragLeave={() => setDrag(false)}>
          <input ref={fileRef} type="file" style={{ display:"none" }} multiple accept=".pdf,.png,.jpg,.jpeg"
            onChange={e => addFiles(e.target.files)} />
          <div className="uz-icon">⬆</div>
          <div className="uz-title">Drop files here or click to upload</div>
          <div className="uz-sub">PDF, PNG, JPG — PAYG summaries, receipts, rental statements, brokerage reports, ESS statements</div>
        </div>
        <div className="doc-types">
          {DOC_TYPES.map(dt => (
            <div key={dt.id} className="dtype-card">
              <span className="dtype-icon">{dt.icon}</span>
              <div className="dtype-name">{dt.name}</div>
              <div className="dtype-desc">{dt.desc}</div>
            </div>
          ))}
        </div>
        {docs.length > 0 && (
          <>
            <div className="vault-hdr">
              <div className="vault-hdr-title">Uploaded documents ({docs.length})</div>
              <button className="tbtn primary" onClick={processAll} disabled={processing || docs.every(d => d.status === "done")}>
                {processing ? <><Spinner />Extracting…</> : "Extract documents"}
              </button>
            </div>
            {docs.map(doc => {
              const dt = DOC_TYPES.find(d => d.id === doc.type) || DOC_TYPES[8];
              const statusLabel = { pending:"Pending", processing:"Extracting…", done:"Extracted", error:"Error" }[doc.status];
              return (
                <div key={doc.id} className="doc-item">
                  <div className="doc-item-icon" style={{ background:dt.bg }}>{dt.icon}</div>
                  <div className="doc-item-info">
                    <div className="doc-item-name">{doc.file.name}</div>
                    <div className="doc-item-meta">{dt.name} · {(doc.file.size/1024).toFixed(0)} KB</div>
                  </div>
                  <select className="type-sel" value={doc.type}
                    onChange={e => dispatch({ type:"UPDATE_DOC", payload:{ id:doc.id, type:e.target.value } })}>
                    {DOC_TYPES.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                  </select>
                  <span className={`doc-status ${doc.status}`}>{statusLabel}</span>
                  <span className="doc-remove" onClick={() => dispatch({ type:"REMOVE_DOC", payload:doc.id })}>✕</span>
                </div>
              );
            })}
          </>
        )}
        {hasDone && (
          <>
            <div className="cta-banner">
              <div style={{ fontSize:26, flexShrink:0 }}>✦</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:600, marginBottom:3 }}>Documents extracted — ready to draft</div>
                <div style={{ fontSize:11, color:"var(--muted)" }}>All vault data has been read. Click to generate a complete FY{FY} tax return draft.</div>
              </div>
              <button className="tbtn primary" style={{ flexShrink:0, padding:"8px 16px" }} onClick={onDraft}>✦ Draft tax return</button>
            </div>
            <div className="vault-hdr"><div className="vault-hdr-title">Extracted data</div></div>
            {docs.filter(d => d.status === "done" && d.extracted && !d.extracted.error).map(doc => {
              if (doc.type === "ess") return <EssCard key={doc.id} doc={doc} />;
              const ex = doc.extracted;
              const dt = DOC_TYPES.find(d => d.id === doc.type) || DOC_TYPES[8];
              return (
                <div key={doc.id} className="ext-panel">
                  <div className="ext-hdr">
                    <span>{dt.icon}</span>
                    <span style={{ flex:1 }}>{doc.file.name}</span>
                    <span style={{ fontSize:10, fontFamily:"Courier New", color:"var(--hint)" }}>{ex.docLabel||dt.name}</span>
                  </div>
                  <div className="ext-body">
                    <div className="field-grid">
                      {(ex.fields||[]).slice(0,8).map((f,i) => (
                        <div key={i}>
                          <div className="f-label">{f.ato_code ? f.ato_code+" — " : ""}{f.label}</div>
                          <div className="f-val">{f.value}</div>
                        </div>
                      ))}
                    </div>
                    {ex.notes && <div className="ext-notes">{ex.notes}</div>}
                  </div>
                </div>
              );
            })}
          </>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────
//  DRAFTER PANEL
// ─────────────────────────────────────────
function DrafterPanel({ state, dispatch }) {
  const { apiKey, drafterMessages, docs, chatMessages } = state;
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current && bottomRef.current.scrollIntoView({ behavior:"smooth" }); }, [drafterMessages, loading]);

  const send = useCallback(async (text) => {
    if (!apiKey) { alert("Please enter your Anthropic API key."); return; }
    const clean = text.trim();
    if (!clean) return;
    setInput("");
    dispatch({ type:"ADD_DRAFTER_MSG", payload:{ role:"user", content:clean } });
    setLoading(true);
    const ctx = buildVaultContext(docs, chatMessages);
    const system = `You are AusTax Agent, an expert Australian tax accountant. FY${FY}.
EXTRACTED DOCUMENT DATA:\n${ctx}
Interview:\n${chatMessages.map(m=>m.role+": "+m.content).join("\n").slice(0,2000)||"(none)"}
═══ FY2024-25 TAX RATES ═══
$0–$18,200:Nil | $18,201–$45,000:19c | $45,001–$120,000:$5,092+32.5c | $120,001–$180,000:$29,467+37c | $180,001+:$51,667+45c
Medicare:2% | LITO:up to $700(phases out $37,500–$66,667) | LMITO:NOT applicable FY2024-25
═══ ESS TREATMENT ═══
Box F→Item 12 FULLY ASSESSABLE ordinary income(s.83A-110) NO CGT discount. Box D→$1,000 concession(s.83A-35). Box E→fully assessable. Box C→offsets tax payable.
TASKS: Draft ATO-compliant return. Include ALL income(PAYG Item 1+ESS Item 12+rental+CGT). Calculate taxable income, gross tax, LITO, Medicare, withheld, refund/payable. Reference item numbers. Flag missing info. Australian resident assumed.`;
    try {
      const msgs = [...drafterMessages, { role:"user", content:clean }];
      const reply = await callClaude(apiKey, { system, messages:msgs, maxTokens:2000 });
      dispatch({ type:"ADD_DRAFTER_MSG", payload:{ role:"assistant", content:reply } });
    } catch(e) {
      dispatch({ type:"ADD_DRAFTER_MSG", payload:{ role:"assistant", content:"Error: "+e.message } });
    }
    setLoading(false);
  }, [apiKey, drafterMessages, docs, chatMessages, dispatch]);

  return (
    <div className="panel">
      <div className="chat-wrap">
        {drafterMessages.length === 0 && (
          <div className="msg">
            <div className="msg-role">System</div>
            <div className="msg-body assistant">Document vault loaded. Use the quick actions below or type your own question.</div>
          </div>
        )}
        {drafterMessages.map((m, i) => (
          <div key={i} className="msg">
            <div className="msg-role">{m.role}</div>
            <div className={`msg-body ${m.role}`}>{m.content}</div>
          </div>
        ))}
        {loading && (
          <div className="msg">
            <div className="msg-role">assistant</div>
            <div className="msg-body assistant loading"><Spinner />Drafting…</div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div className="chips-row">
        {DRAFTER_CHIPS.map((c, i) => (
          <span key={i} className={`chip${c.primary ? " primary-chip" : ""}`} onClick={() => send(c.prompt)}>{c.label}</span>
        ))}
      </div>
      <div className="chat-input-row">
        <textarea className="chat-input" rows={1} placeholder="Ask anything about this return…"
          value={input}
          onChange={e => { setInput(e.target.value); e.target.style.height="auto"; e.target.style.height=Math.min(e.target.scrollHeight,110)+"px"; }}
          onKeyDown={e => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); send(input); } }}
        />
        <button className="tbtn primary" onClick={() => send(input)} disabled={loading}>Send →</button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────
//  ARCHIVE MODAL
// ─────────────────────────────────────────
function ArchiveModal({ state, dispatch }) {
  const [clientName, setClientName] = useState("");
  const inputRef = useRef(null);
  const hasData = state.chatMessages.length || state.drafterMessages.length || state.docs.length;

  useEffect(() => {
    if (state.showArchiveModal) {
      setClientName("");
      setTimeout(() => inputRef.current && inputRef.current.focus(), 80);
    }
  }, [state.showArchiveModal]);

  if (!state.showArchiveModal) return null;

  const confirm = () => {
    const name = clientName.trim() || ("Client-" + new Date().toLocaleDateString("en-AU").replace(/\//g, "-"));
    const safeName = name.replace(/[^a-zA-Z0-9_\-\s]/g, "").trim().replace(/\s+/g, "_");
    const filename = `AusTax_${safeName}_FY2425.txt`;
    dispatch({ type:"HIDE_ARCHIVE_MODAL" });
    if (hasData) {
      downloadText(filename, buildArchiveText(name, state));
      dispatch({ type:"ARCHIVE_CLIENT", payload:{ name, safeName, filename, ts:new Date().toLocaleString("en-AU") } });
      setTimeout(() => dispatch({ type:"RESET_SESSION" }), 400);
    } else {
      dispatch({ type:"RESET_SESSION" });
    }
  };

  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) dispatch({ type:"HIDE_ARCHIVE_MODAL" }); }}>
      <div className="modal">
        <div className="modal-title">📁 Archive current client & start fresh</div>
        <div className="modal-sub">
          {hasData
            ? <span>The session will be downloaded as <strong>AusTax_[ClientName]_FY2425.txt</strong>. All data will then be cleared.</span>
            : "No active session data — confirm to reset the screen for a new client."}
        </div>
        {hasData && (
          <div className="modal-info">
            ℹ What gets saved:<br />
            · Full interview transcript<br />
            · All vault extracted document data<br />
            · Return drafter conversation<br />
            · Running summary & flagged risks
          </div>
        )}
        <div className="modal-label">Client name or reference</div>
        <input ref={inputRef} className="modal-input" placeholder="e.g. Smith J — FY2425"
          maxLength={60} value={clientName}
          onChange={e => setClientName(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") confirm(); }} />
        <div className="modal-actions">
          <button className="tbtn" onClick={() => dispatch({ type:"HIDE_ARCHIVE_MODAL" })}>Cancel</button>
          <button className="tbtn primary" onClick={confirm}>
            {hasData ? "📥 Save & clear session" : "✓ Clear & start fresh"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────
//  ROOT APP
// ─────────────────────────────────────────
function App() {
  const [state, dispatch] = useReducer(reducer, INITIAL);

  const autoDraft = useCallback(() => {
    dispatch({ type:"SET_PANEL", payload:"drafter" });
  }, [dispatch]);

  const onExport = useCallback(() => {
    downloadText("austax-notes-fy2425.txt", buildArchiveText("Export", state));
  }, [state]);

  const PANEL_TITLES = { interview:"Client Tax Interview", vault:"Document Vault", drafter:"Return Drafter" };

  return (
    <>
      <style>{CSS}</style>
      <div className="shell">
        <Sidebar state={state} dispatch={dispatch} onExport={onExport} />
        <div className="main">
          <div className="topbar">
            <div className="topbar-title">{PANEL_TITLES[state.panel]}</div>
            <span className="client-pill" onClick={() => dispatch({ type:"SHOW_ARCHIVE_MODAL" })}>
              {state.clientActive ? "Active session" : "No client session — begin below"}
            </span>
            <button className="tbtn" onClick={() => dispatch({ type:"SHOW_ARCHIVE_MODAL" })}>+ New client</button>
            {state.panel === "vault" && (
              <button className="tbtn primary" onClick={autoDraft} disabled={!state.docs.some(d => d.status === "done")}>
                ✦ Draft tax return
              </button>
            )}
          </div>
          {state.panel === "interview" && <InterviewPanel state={state} dispatch={dispatch} />}
          {state.panel === "vault"     && <VaultPanel     state={state} dispatch={dispatch} onDraft={autoDraft} />}
          {state.panel === "drafter"   && <DrafterPanel   state={state} dispatch={dispatch} />}
        </div>
      </div>
      <ArchiveModal state={state} dispatch={dispatch} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

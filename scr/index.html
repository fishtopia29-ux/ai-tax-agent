    ${estimatePage}
    ${incomePage}
    ${deductPage}
  </body></html>`);
  win.document.close();
}

// ?????????????????????????????????????????
//  CLIENT LETTER GENERATOR
// ?????????????????????????????????????????
async function generateClientLetter(state, clientRef) {
  const clientName = clientRef || (state.clientActive ? "Client" : "Client");
  const { estimatePage, incomePage, deductPage, printStyles } = buildTaxEstimateHTML(state, clientName);

  // Build the taxation estimate appendix HTML block (the {{TAXATION_ESTIMATE_APPENDIX}} token)
  const appendixHTML = `
    <div style="page-break-before:always;"></div>
    ${estimatePage}
    ${incomePage}
    ${deductPage}
  `;

  // Dates
  const today = new Date();
  const pad = n => String(n).padStart(2,"0");
  const ordinal = d => { const s=["th","st","nd","rd"]; const v=d%100; return d+(s[(v-20)%10]||s[v]||s[0]); };
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const letterDate = `${ordinal(today.getDate())} ${months[today.getMonth()]} ${today.getFullYear()}`;
  const invoiceDate = `${pad(today.getDate())}/${pad(today.getMonth()+1)}/${today.getFullYear()}`;
  const dueDate = new Date(today.getTime() + 14*24*60*60*1000);
  const invoiceDue = `${pad(dueDate.getDate())}/${pad(dueDate.getMonth()+1)}/${dueDate.getFullYear()}`;
  const invoiceNum = `INV-${today.getFullYear()}${pad(today.getMonth()+1)}${pad(today.getDate())}-${Math.floor(Math.random()*900)+100}`;

  const fyLabel = getFYLabel(state.selectedFY || DEFAULT_FY);
  const fyCfg = getFYConfig(state.selectedFY || DEFAULT_FY);
  const returnYear = String(fyCfg.endYear);
  const t = computeTotals(state.docs, state.clientProfile, state.selectedFY);
  const fmtM = v => "$" + Math.abs(v).toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:2});
  const amountPayable = t.refund >= 0 ? `${fmtM(t.refund)} refund` : `${fmtM(t.refund)} payable`;
  const fmt = v => "$" + v.toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:2});
  const feeEx = FIRM_CONFIG.feeExGst;
  const feeGst = feeEx * 0.1;
  const feeInc = feeEx + feeGst;

  const tokens = {
    FIRM_NAME:                   FIRM_CONFIG.name,
    FIRM_TAGLINE:                FIRM_CONFIG.tagline,
    FIRM_ADDRESS:                FIRM_CONFIG.address,
    FIRM_SUBURB:                 FIRM_CONFIG.suburb,
    FIRM_STATE_PC:               FIRM_CONFIG.statePc,
    FIRM_PHONE:                  FIRM_CONFIG.phone,
    FIRM_EMAIL:                  FIRM_CONFIG.email,
    FIRM_ABN:                    FIRM_CONFIG.abn,
    SIGNER_NAME:                 FIRM_CONFIG.signerName,
    SIGNER_TITLE:                FIRM_CONFIG.signerTitle,
    CLIENT_NAME:                 clientName,
    CLIENT_FIRST:                clientName.split(" ")[0],
    LETTER_DATE:                 letterDate,
    RETURN_YEAR:                 returnYear,
    FY_LABEL:                    fyLabel,
    AMOUNT_PAYABLE:              amountPayable,
    INVOICE_NUMBER:              invoiceNum,
    INVOICE_DATE:                invoiceDate,
    INVOICE_DUE:                 invoiceDue,
    FEE_EX_GST:                  fmt(feeEx),
    FEE_GST:                     fmt(feeGst),
    FEE_INC_GST:                 fmt(feeInc),
    BANK_NAME:                   FIRM_CONFIG.bankName,
    BANK_ACCOUNT_NAME:           FIRM_CONFIG.bankAccName,
    BANK_BSB:                    FIRM_CONFIG.bankBsb,
    BANK_ACCOUNT:                FIRM_CONFIG.bankAcc,
    TAXATION_ESTIMATE_APPENDIX:  appendixHTML,
    ESTIMATE_PRINT_STYLES:       printStyles,
  };

  // Try to fetch letter-template.html; fall back to a standalone estimate window
  let template;
  try {
    const resp = await fetch("letter-template.html?v=" + Date.now(), { cache:"no-store" });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    template = await resp.text();
  } catch(e) {
    // No template found - open standalone estimate with notice
    const win = window.open("", "_blank");
    if (!win) { alert("Pop-up blocked - please allow pop-ups for this site."); return; }
    win.document.write(`<!DOCTYPE html><html lang="en"><head>
      <meta charset="UTF-8"><title>Taxation Estimate - ${clientName}</title>
      <style>${printStyles}</style>
    </head><body>
      <div style="padding:16px 48px;font-family:Arial,sans-serif;font-size:11pt;background:#faeeda;border-bottom:2px solid #ba7517;color:#854f0b;" class="no-print">
        ? <strong>letter-template.html not found.</strong> Showing taxation estimate appendix only.
        Place <code>letter-template.html</code> in the same directory as <code>index.html</code> and add
        <code>{{TAXATION_ESTIMATE_APPENDIX}}</code> where you want the estimate to appear.
        <button onclick="window.print()" style="margin-left:16px;padding:6px 16px;background:#2d7a3a;color:#fff;border:none;border-radius:4px;cursor:pointer;">? Print / PDF</button>
      </div>
      ${estimatePage}
      ${incomePage}
      ${deductPage}
    </body></html>`);
    win.document.close();
    return;
  }

  // Replace all tokens
  let populated = template;
  Object.entries(tokens).forEach(([key, val]) => {
    populated = populated.split("{{" + key + "}}").join(val || "");
  });

  const win = window.open("", "_blank");
  if (!win) { alert("Pop-up blocked - please allow pop-ups for this site."); return; }
  win.document.write(populated);
  win.document.close();
}

// ?????????????????????????????????????????
//  BUILD WORKPAPER DATA
//  Maps computeTotals + raw extracted docs into every ATO ITR label
//  Returns { sections: [...], fields: {...}, flags: [...], totals: {...} }
// ?????????????????????????????????????????
function buildWorkpaperData(docs, clientProfile, selectedFY, overrides) {
  const t = computeTotals(docs, clientProfile, selectedFY);
  const ov = overrides || {};
  const fyLabel = getFYLabel(selectedFY);
  const done = docs.filter(d => d.status === "done" && d.extracted && !d.extracted.error);

  // Helper: resolve value - override wins, else computed, else null
  const val = (key, computed) => ov[key] != null ? parseFloat(ov[key]) : (computed || 0);
  const fmtN = v => v === 0 ? null : v;
  const srcLabel = (docType) => {
    const matching = done.filter(d => d.type === docType);
    if (!matching.length) return null;
    return matching.map(d => d.file.name.replace(/\.[^.]+$/, "")).join(", ");
  };

  // Per-employer breakdown for Item 1
  const paygDocs  = done.filter(d => d.type === "payg");
  const essDocs   = done.filter(d => d.type === "ess");
  const rentalDocs= done.filter(d => d.type === "rental");
  const insurDocs = done.filter(d => d.type === "insurance");

  const item1Rows = paygDocs.map(d => {
    const ex = d.extracted;
    const employer = (ex.fields || []).find(f => /employer/i.test(f.label));
    return {
      employer: employer ? employer.value : d.file.name,
      income:   parseVal(ex.income),
      withheld: parseVal(ex.taxWithheld),
    };
  });
  if (!item1Rows.length && t.paygIncome > 0) {
    item1Rows.push({ employer: "Employer (from extracted data)", income: t.paygIncome, withheld: t.taxWithheld });
  }

  // ESS per-employer
  const essRows = essDocs.map(d => ({
    employer: d.extracted.essEmployer || d.file.name,
    boxF: parseVal(d.extracted.essIncome),
    boxD: parseVal(d.extracted.essBoxD),
    boxE: parseVal(d.extracted.essBoxE),
    boxC: parseVal(d.extracted.essTaxWithheld),
  }));

  // Deduction line items
  const deductFields = done.filter(d => d.type !== "ess").flatMap(d => {
    const ex = d.extracted;
    return (ex.fields || []).filter(f => f.ato_code && /^D/i.test(f.ato_code)).map(f => ({
      code: f.ato_code, label: f.label, value: parseVal(f.value), src: d.file.name,
    }));
  });

  // Flags
  const flags = [];
  if (t.essBoxF > 50000 && t.totalTaxWH < t.grossTax * 0.7)
    flags.push({ type:"warn", msg:"ESS > $50k and PAYG withheld < 70% of gross tax - consider PAYG variation." });
  if (t.outOfPeriodDocs && t.outOfPeriodDocs.length > 0)
    flags.push({ type:"warn", msg:`${t.outOfPeriodDocs.length} document(s) outside FY${fyLabel} - excluded from deductions.` });
  if (t.phiClawback > 0)
    flags.push({ type:"info", msg:`PHI rebate clawback of ${fmtAUD(t.phiClawback)} applies (income tier exceeded).` });
  if (t.essBoxD > 0 && t.essBoxDConcession > 0)
    flags.push({ type:"info", msg:`ESS Box D $1,000 concession applied per s.83A-35. Net assessable: ${fmtAUD(t.essBoxD - t.essBoxDConcession)}.` });
  if (t.refund < 0 && Math.abs(t.refund) > 10000)
    flags.push({ type:"warn", msg:`Large tax payable of ${fmtAUD(Math.abs(t.refund))} - confirm PAYG instalments and payment plan.` });
  if (t.ipPremium > 0 && t.ipBenefit > 0)
    flags.push({ type:"info", msg:"Income protection: premium claimed as D15 deduction; benefit payments included as assessable income (Item 20/s.6-5)." });

  const sections = [
    // ?? SECTION A: INCOME ??
    {
      id: "income", title: "INCOME", subtitle: "Items 1-24 ITAA 1997",
      rows: [
        ...item1Rows.map((r, i) => ({
          code: "Item 1", label: r.employer,
          sublabel: "Salary or wages - s.6-5",
          value: r.income, valueClass: "pos",
          extra: `Tax withheld: ${fmtAUD(r.withheld)}`,
          src: srcLabel("payg"),
          status: r.income > 0 ? "auto" : "nil",
          xeroField: `item1_income_${i}`, xeroWH: `item1_withheld_${i}`,
        })),
        {
          code: "Item 2", label: "Allowances, director's fees, tips",
          sublabel: "s.6-5 - from PAYG summary",
          value: val("item2", done.reduce((a, d) => {
            const f = (d.extracted?.fields||[]).find(f2 => /allowance/i.test(f2.label));
            return a + (f ? parseVal(f.value) : 0);
          }, 0)),
          valueClass: "pos",
          src: srcLabel("payg"),
          status: "nil",
          xeroField: "item2",
        },
        {
          code: "Item 12", label: "Employee share scheme - total assessable discount",
          sublabel: "Div 83A ITAA 1997 - Box F deferral + Box D net + Box E",
          value: val("item12", t.essBoxF + Math.max(0, t.essBoxD - t.essBoxDConcession) + t.essBoxE),
          valueClass: t.essBoxF + t.essBoxD + t.essBoxE > 0 ? "pos" : "muted",
          src: srcLabel("ess"),
          status: t.essBoxF + t.essBoxD + t.essBoxE > 0 ? "auto" : "nil",
          xeroField: "item12_boxF",
          detail: essRows.length > 0 ? essRows.map(r =>
            `${r.employer}: Box F ${fmtAUD(r.boxF)} | Box D ${fmtAUD(r.boxD)} | Box E ${fmtAUD(r.boxE)} | Box C (TFN WH) ${fmtAUD(r.boxC)}`
          ).join(" ? ") : null,
        },
        {
          code: "Item 15", label: "Net rent / rental income",
          sublabel: "s.25-10 - gross rental less allowable expenses",
          value: val("item15", t.rentalIncome > 0 ? t.rentalIncome : 0),
          valueClass: t.rentalIncome > 0 ? "pos" : "muted",
          src: srcLabel("rental"),
          status: t.rentalIncome > 0 ? "auto" : "nil",
          xeroField: "item15_grossRental",
          detail: t.rentalIncome > 0 ? `Gross rental: ${fmtAUD(t.rentalIncome)} | Expenses: ${fmtAUD(t.rentalExp)} | Net: ${fmtAUD(t.rentalIncome - t.rentalExp)}` : null,
        },
        {
          code: "Item 18", label: "Capital gains",
          sublabel: "Div 102 ITAA 1997 - net capital gain after discount/losses",
          value: val("item18", t.capitalGains),
          valueClass: t.capitalGains > 0 ? "pos" : "muted",
          src: srcLabel("invest"),
          status: t.capitalGains > 0 ? "auto" : "nil",
          xeroField: "item18_netCapGain",
        },
        {
          code: "Item 20", label: "Income protection benefit payments",
          sublabel: "s.6-5 - assessable if received during FY",
          value: val("item20", t.ipBenefit),
          valueClass: t.ipBenefit > 0 ? "pos" : "muted",
          src: srcLabel("insurance"),
          status: t.ipBenefit > 0 ? "auto" : "nil",
          xeroField: "item20_ipBenefit",
        },
        {
          code: "Total", label: "Total assessable income",
          sublabel: "Sum of all income items",
          value: val("totalIncome", t.totalIncome),
          valueClass: "pos", bold: true,
          status: "auto", xeroField: "totalIncome",
        },
      ],
    },
    // ?? SECTION B: DEDUCTIONS ??
    {
      id: "deductions", title: "DEDUCTIONS", subtitle: "Items D1-D15 ITAA 1997",
      rows: [
        {
          code: "D1", label: "Work-related car expenses",
          sublabel: "s.8-1 - logbook or cents/km (88c/km FY24-25)",
          value: val("D1", deductFields.filter(f => /D1/i.test(f.code)).reduce((a,f)=>a+f.value,0)),
          valueClass: "neg", src: null, status: "required",
          xeroField: "D1",
          notice: "Verify: logbook records or cents/km calculation required",
        },
        {
          code: "D2", label: "Work-related travel expenses",
          sublabel: "s.8-1 - airfares, accommodation, meals on overnight travel",
          value: val("D2", deductFields.filter(f => /D2/i.test(f.code)).reduce((a,f)=>a+f.value,0)),
          valueClass: "neg", src: null, status: "required",
          xeroField: "D2",
        },
        {
          code: "D3", label: "Work-related clothing, laundry & dry cleaning",
          sublabel: "s.8-1 - occupation-specific, protective or compulsory uniforms",
          value: val("D3", deductFields.filter(f => /D3/i.test(f.code)).reduce((a,f)=>a+f.value,0)),
          valueClass: "neg",
          src: deductFields.filter(f => /D3/i.test(f.code)).map(f=>f.src).filter(Boolean).join(", ") || null,
          status: deductFields.some(f => /D3/i.test(f.code)) ? "auto" : "required",
          xeroField: "D3",
        },
        {
          code: "D4", label: "Work-related self-education expenses",
          sublabel: "s.8-1 - directly connected to current employment income",
          value: val("D4", deductFields.filter(f => /D4/i.test(f.code)).reduce((a,f)=>a+f.value,0)),
          valueClass: "neg", src: null, status: "required",
          xeroField: "D4",
        },
        {
          code: "D5", label: "Other work-related expenses",
          sublabel: "s.8-1 - home internet, mobile, union fees, tools, WFH",

          sublabel: "Total credits minus net tax payable",

        },

    // ?? SECTION E: INCOME TESTS & SPOUSE ??
    {
      id: "incometests", title: "INCOME TESTS & PROFILE", subtitle: "IT1-IT8 - affects offsets and Medicare",
      rows: [
        {
          code: "IT1", label: "Total reportable fringe benefits",
          sublabel: "From employer - salary packaged amounts",
          value: val("IT1", 0), valueClass: "muted",
          status: "required", xeroField: "IT1_rfba",
        },
        {
          code: "IT2", label: "Reportable employer super contributions",
          sublabel: "Employer salary sacrifice super above SG",
          value: val("IT2", 0), valueClass: "muted",
          status: "required", xeroField: "IT2_resc",
        },
        {
          code: "IT8", label: "Number of dependent children",
          sublabel: "For Medicare levy family reduction",
          value: clientProfile?.numDependants || 0, valueClass: "muted",
          status: (clientProfile?.numDependants||0) > 0 ? "auto" : "nil",
          xeroField: "IT8_deps",
        },
        {
          code: "Spouse", label: "Spouse / de facto",
          sublabel: "For Medicare family threshold and PHI clawback",
          value: clientProfile?.hasSpouse ? "Yes" : "No",
          valueClass: "muted",
          status: clientProfile?.hasSpouse ? "auto" : "nil",
          xeroField: "hasSpouse",
          isText: true,
        },
        {
          code: "Spouse ATI", label: "Spouse adjusted taxable income",
          sublabel: "For Medicare threshold and rebates",
          value: val("spouseATI", clientProfile?.spouseIncome || 0), valueClass: "muted",
          status: clientProfile?.hasSpouse ? "required" : "nil",
          xeroField: "spouseATI",
        },
      ],
    },
  ];

  return { sections, flags, totals: t, fyLabel };
}

function exportWorkpaperCSV(wpData, clientRef, selectedFY) {
  const { sections, totals, fyLabel } = wpData;
  const rows = [];
  const esc = v => `"${String(v == null ? "" : v).replace(/"/g, '""')}"`;
  const now = new Date().toLocaleString("en-AU");
  rows.push(["GREENGRAPH Tax Agent - ITR Workpaper Export"].map(esc).join(","));
  rows.push([`Client: ${clientRef || "Client"}`, `FY: ${fyLabel}`, `Generated: ${now}`].map(esc).join(","));
  rows.push([]);
  rows.push(["Section","ATO Code","Description","Sub-label","Amount","Status","Source"].map(esc).join(","));
  sections.forEach(sec => {
    sec.rows.forEach(r => {
      const amt = r.isText ? r.value : (r.value != null && r.value !== 0 ? r.value : "");
      rows.push([sec.title, r.code, r.label, r.sublabel||"", amt, r.status, r.src||""].map(esc).join(","));
    });
  });
  rows.push([]);
  rows.push(["KEY TOTALS"].map(esc).join(","));
  rows.push(["Taxable Income", totals.taxableIncome].map(esc).join(","));
  rows.push(["Net Tax Payable", totals.netTax].map(esc).join(","));
  rows.push(["Total Withheld", totals.totalTaxWH].map(esc).join(","));
  rows.push(["Est. Refund / Payable", totals.refund].map(esc).join(","));
  const blob = new Blob([rows.join("\n")], { type:"text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `ITR_Workpaper_FY${selectedFY.replace("-","")}_${(clientRef||"Client").replace(/\s+/g,"_")}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// Xero Tax API-shaped JSON - maps each ATO label to Xero's individual ITR field names
// Xero Tax uses the ATO SBR2 field IDs under the hood; these labels match Xero's displayed field names
// ready for your integration to POST to Xero Tax API /returns endpoint
function buildXeroJSON(wpData, overrides, clientProfile, selectedFY) {
  const { totals: t, fyLabel } = wpData;
  const ov = overrides || {};
  const vn = (key, computed) => ov[key] != null ? parseFloat(ov[key]) : (computed || 0);
  const round2 = v => Math.round((v||0)*100)/100;

  return {
    _meta: {
      generator: "GREENGRAPH Tax Agent",
      generatedAt: new Date().toISOString(),
      financialYear: selectedFY,
      fyLabel,
      note: "Xero Tax integration - map these fields to your Xero Tax API POST body. Numbers are raw AUD, no $ or commas.",
    },
    returnType: "individualIncomeTax",
    financialYearEnd: `${getFYConfig(selectedFY).endYear}-06-30`,

    // ?? INCOME ??
    income: {
      item1_salaryWages: round2(vn("item1_income", t.paygIncome)),
      item1_taxWithheld: round2(vn("item1_withheld", t.taxWithheld)),
      item2_allowancesTips: round2(vn("item2", 0)),
      item12_essBoxF_deferral: round2(vn("item12_boxF", t.essBoxF)),
      item12_essBoxD_upfrontEligible: round2(t.essBoxD),
      item12_essBoxD_concession: round2(t.essBoxDConcession),
      item12_essBoxE_upfrontNotEligible: round2(t.essBoxE),
      item12_essBoxC_tfnWithheld: round2(t.essTaxWH),
      item12_totalAssessableDiscount: round2(t.essBoxF + Math.max(0, t.essBoxD - t.essBoxDConcession) + t.essBoxE),
      item15_grossRentalIncome: round2(t.rentalIncome),
      item15_rentalExpenses: round2(t.rentalExp),
      item15_netRent: round2(t.rentalIncome - t.rentalExp),
      item18_netCapitalGain: round2(t.capitalGains),
      item20_incomeProtectionBenefit: round2(t.ipBenefit),
      totalIncome: round2(vn("totalIncome", t.totalIncome)),
    },

    // ?? DEDUCTIONS ??
    deductions: {
      D1_carExpenses: round2(vn("D1", 0)),
      D2_travelExpenses: round2(vn("D2", 0)),
      D3_clothingLaundry: round2(vn("D3", 0)),
      D4_selfEducation: round2(vn("D4", 0)),
      D5_otherWorkRelated: round2(vn("D5", t.deductions)),
      D6_lowValuePool: round2(vn("D6", 0)),
      D7_interestDeductions: round2(vn("D7", 0)),
      D8_dividendDeductions: round2(vn("D8", 0)),
      D9_giftsOrDonations: round2(vn("D9", 0)),
      D10_taxAffairsCosts: round2(vn("D10", 0)),
      D15_incomeProtectionPremium: round2(vn("D15", t.ipPremium)),
      totalDeductions: round2(vn("totalDeductions", t.deductions + t.ipPremium)),
    },

    // ?? TAX CALCULATION ??
    taxCalculation: {
      taxableIncome: round2(t.taxableIncome),
      grossTax: round2(t.grossTax),
      T1_lito: round2(t.lito),
      T2_lmito: round2(t.lmito || 0),
      M1_medicareLevy: round2(t.medicare),
      M2_phiRebateClawback: round2(t.phiClawback),
      netTaxPayable: round2(t.netTax),
    },

    // ?? CREDITS ??
    credits: {
      paygWithholding: round2(t.taxWithheld),
      essTfnWithheld: round2(t.essTaxWH),
      totalCredits: round2(t.totalTaxWH),
      estimatedRefundOrPayable: round2(t.refund),
      resultType: t.refund >= 0 ? "REFUND" : "PAYABLE",
    },

    // ?? INCOME TESTS ??
    incomeTests: {
      IT1_reportableFringeBenefits: round2(vn("IT1", 0)),
      IT2_reportableEmployerSuperContributions: round2(vn("IT2", 0)),
      IT8_numberOfDependentChildren: clientProfile?.numDependants || 0,
      hasSpouse: clientProfile?.hasSpouse || false,
      spouseAdjustedTaxableIncome: round2(clientProfile?.spouseIncome || 0),
      phiRebateReceived: round2(clientProfile?.phiRebateReceived || 0),
    },

    // ?? PRIVATE HEALTH INSURANCE ??
    privateHealthInsurance: {
      hasCover: clientProfile?.phiRebateReceived > 0,
      rebateReceived: round2(clientProfile?.phiRebateReceived || 0),
      clawback: round2(t.phiClawback),
    },
  };
}

function exportXeroJSON(wpData, overrides, clientProfile, selectedFY, clientRef) {
  const json = buildXeroJSON(wpData, overrides, clientProfile, selectedFY);
  const blob = new Blob([JSON.stringify(json, null, 2)], { type:"application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `Xero_ITR_FY${selectedFY.replace("-","")}_${(clientRef||"Client").replace(/\s+/g,"_")}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function copyXeroJSON(wpData, overrides, clientProfile, selectedFY) {
  const json = buildXeroJSON(wpData, overrides, clientProfile, selectedFY);
  navigator.clipboard.writeText(JSON.stringify(json, null, 2))
    .then(() => alert("Xero JSON copied to clipboard - paste into your integration or Postman."))
    .catch(() => alert("Copy failed - please use the download button instead."));
}

// ?????????????????????????????????????????
//  WORKPAPER PANEL
// ?????????????????????????????????????????
function WorkpaperPanel({ state }) {
  const { docs, clientProfile, selectedFY } = state;
  const [overrides, setOverrides] = useState({});
  const [clientRef, setClientRef] = useState("");
  const hasDocs = docs.some(d => d.status === "done" && d.extracted && !d.extracted.error);
  const fyLabel = getFYLabel(selectedFY);

  const wpData = React.useMemo(
    () => hasDocs ? buildWorkpaperData(docs, clientProfile, selectedFY, overrides) : null,
    [docs, clientProfile, selectedFY, overrides]
  );

  const setOverride = (key, val) => {
    setOverrides(prev => ({ ...prev, [key]: val === "" ? undefined : val }));
  };

  if (!hasDocs) {
    return (
      <div className="panel">
        <div className="wp-wrap" style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", color:"var(--muted)", gap:12 }}>
          <div style={{ fontSize:32 }}>📋</div>
          <div style={{ fontSize:14, fontWeight:600 }}>No extracted documents yet</div>
          <div style={{ fontSize:12, maxWidth:340, textAlign:"center" }}>
            Go to <strong>ITR Preparation</strong>, upload and extract your client's documents, then return here to view the ATO-formatted workpaper and Xero export.
          </div>
        </div>
      </div>
    );
  }

  const { sections, flags, totals: t } = wpData;

  const statusBadge = (status) => {
    const map = { auto:"AUTO", manual:"MANUAL", nil:"NIL", required:"REQUIRED", flag:"FLAG" };
    return <span className={`wp-badge ${status}`}>{map[status] || status.toUpperCase()}</span>;
  };

  const amtCell = (row) => {
    if (row.isText) return <td className="wp-amt muted">{row.value}</td>;
    const v = row.value;
    if (v == null || v === 0) return <td className="wp-amt muted">-</td>;
    const absV = Math.abs(v).toLocaleString("en-AU", { minimumFractionDigits:2, maximumFractionDigits:2 });
    const sign = v < 0 ? "-$" : "$";
    return <td className={`wp-amt ${row.valueClass || ""}`} style={row.bold ? { fontWeight:700 } : {}}>
      {sign}{absV}
    </td>;
  };

  return (
    <div className="panel">
      <div className="wp-wrap">

        {/* Top bar */}
        <div className="wp-topbar">
          <div className="wp-topbar-title">ITR Workpaper - FY {fyLabel}</div>
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            <span style={{ fontSize:11, color:"var(--muted)" }}>Client ref:</span>
            <input value={clientRef} onChange={e => setClientRef(e.target.value)}
              placeholder="e.g. Smith J"
              style={{ padding:"4px 8px", fontSize:11, fontFamily:"Courier New", border:"0.5px solid var(--border-strong)", borderRadius:4, background:"var(--bg)", color:"var(--text)", width:130 }} />
          </div>
        </div>

        {/* KPI summary bar */}
        <div className="wp-summary-box">
          {[
            { label:"Taxable income",       val: fmtAUD(t.taxableIncome), cls:"pos" },
            { label:"Gross tax",             val: fmtAUD(t.grossTax),      cls:"neg" },
            { label:"LITO offset",           val: fmtAUD(t.lito),          cls:"pos" },
            { label:"Medicare levy",         val: fmtAUD(t.medicare),      cls:"neg" },
            { label:"Total withheld",        val: fmtAUD(t.totalTaxWH),    cls:"pos" },
            { label: t.refund >= 0 ? "Est. refund" : "Est. payable",
              val: fmtAUD(Math.abs(t.refund)), cls: t.refund >= 0 ? "pos" : "neg" },
          ].map((k, i) => (
            <div key={i} className="wp-kpi">
              <div className="wp-kpi-label">{k.label}</div>
              <div className={`wp-kpi-val ${k.cls}`}>{k.val}</div>
            </div>
          ))}
        </div>

        {/* Flags */}
        {flags.length > 0 && (
          <div style={{ marginBottom:16 }}>
            {flags.map((f, i) => (
              <div key={i} className={`notice ${f.type}`} style={{ marginBottom:6 }}>
                <span>{f.type === "warn" ? "⚠" : "ⓘ"}</span>
                <span style={{ fontSize:11 }}>{f.msg}</span>
              </div>
            ))}
          </div>
        )}

        {/* Override notice */}
        {Object.keys(overrides).length > 0 && (
          <div className="notice warn" style={{ marginBottom:12 }}>
            <span>⛑</span>
            <span style={{ fontSize:11 }}>
              {Object.keys(overrides).length} field(s) manually overridden.
              Overrides are included in all exports.{" "}
              <span style={{ cursor:"pointer", textDecoration:"underline" }} onClick={() => setOverrides({})}>Clear all overrides</span>
            </span>
          </div>
        )}

        {/* Workpaper sections */}
        {sections.map(sec => (
          <div key={sec.id} className="wp-section">
            <div className="wp-section-hdr">
              <span>{sec.title}</span>
              <span className="wp-section-code">{sec.subtitle}</span>
            </div>
            <table className="wp-table">
              <colgroup>
                <col style={{ width:70 }} />
                <col />
                <col style={{ width:200 }} />
                <col style={{ width:110 }} />
                <col style={{ width:90 }} />
              </colgroup>
              <tbody>
                {sec.rows.map((row, ri) => {
                  const isEdited = row.xeroField && overrides[row.xeroField] != null;
                  return (
                    <React.Fragment key={ri}>
                      <tr style={row.bold ? { background:"var(--surface2)" } : {}}>
                        <td className="wp-code">{row.code}</td>
                        <td className="wp-desc">
                          <span style={row.bold ? { fontWeight:700 } : {}}>{row.label}</span>
                          {row.sublabel && <small>{row.sublabel}</small>}
                          {row.detail && <small style={{ color:"var(--accent-t)" }}>? {row.detail}</small>}
                        </td>
                        <td className="wp-src">{row.src || ""}</td>
                        {row.isText
                          ? <td className="wp-amt muted">{row.value}</td>
                          : <td className="wp-amt" style={row.bold ? { fontWeight:700 } : {}}>
                              {/* Inline override input */}
                              {row.xeroField && !row.bold ? (
                                <input
                                  type="number"
                                  className={`wp-override${isEdited ? " edited" : ""}`}
                                  value={isEdited ? overrides[row.xeroField] : (row.value || "")}
                                  placeholder={row.value != null && row.value !== 0 ? String(row.value) : "0"}
                                  onChange={e => setOverride(row.xeroField, e.target.value)}
                                  title="Override - enter corrected amount"
                                />
                              ) : (
                                <span className={`${row.valueClass || ""}`}>
                                  {row.value == null || row.value === 0 ? "-" :
                                    (row.value < 0 ? "-$" : "$") + Math.abs(row.value).toLocaleString("en-AU", { minimumFractionDigits:2, maximumFractionDigits:2 })}
                                </span>
                              )}
                            </td>
                        }
                        <td className="wp-status">{statusBadge(row.status)}</td>
                      </tr>
                      {row.notice && (
                        <tr className="wp-notice-row">
                          <td />
                          <td colSpan={4} style={{ padding:"4px 10px", fontSize:11, color:"var(--warn-t)" }}>
                            ? {row.notice}
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
        ))}

        {/* Status legend */}
        <div style={{ display:"flex", gap:10, flexWrap:"wrap", padding:"8px 0 24px", fontSize:11, color:"var(--muted)" }}>
          <span>Legend:</span>
          {[["auto","Extracted from documents"],["manual","Manually overridden"],["nil","Not applicable / zero"],["required","Needs manual input"],["flag","Review required"]].map(([cls,lbl]) => (
            <span key={cls} style={{ display:"flex", alignItems:"center", gap:4 }}>
              <span className={`wp-badge ${cls}`}>{cls.toUpperCase()}</span> {lbl}

// ?????????????????????????????????????????
//  XERO OAUTH 2.0 PKCE HELPERS
// ?????????????????????????????????????????
const XERO_CLIENT_ID   = "YOUR_XERO_CLIENT_ID";   // ? replace with your Xero app Client ID
const XERO_REDIRECT_URI = window.location.origin + window.location.pathname; // same page
const XERO_SCOPES = "openid profile email accounting.transactions accounting.contacts offline_access";

function genCodeVerifier() {
  const arr = new Uint8Array(48);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
}
async function genCodeChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest("SHA-256", data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
}

// Initiate OAuth - opens Xero login in popup, resolves with { code, state }
async function xeroAuthorise() {
  const verifier  = genCodeVerifier();
  const challenge = await genCodeChallenge(verifier);
  const state     = Math.random().toString(36).slice(2);
  sessionStorage.setItem("xero_verifier", verifier);
  sessionStorage.setItem("xero_state", state);

  const params = new URLSearchParams({
    response_type: "code",
    client_id:     XERO_CLIENT_ID,
    redirect_uri:  XERO_REDIRECT_URI,
    scope:         XERO_SCOPES,
    state,
    code_challenge:         challenge,
    code_challenge_method:  "S256",
  });
  const authUrl = `https://login.xero.com/identity/connect/authorize?${params}`;

  return new Promise((resolve, reject) => {
    const popup = window.open(authUrl, "xero_oauth", "width=520,height=660,left=200,top=100");
    if (!popup) { reject(new Error("Pop-up blocked - please allow pop-ups for this site.")); return; }
    const timer = setInterval(() => {
      try {
        const url = new URL(popup.location.href);
        if (url.origin === window.location.origin) {
          clearInterval(timer);
          popup.close();
          const code  = url.searchParams.get("code");
          const retState = url.searchParams.get("state");
          if (retState !== sessionStorage.getItem("xero_state")) {
            reject(new Error("OAuth state mismatch - possible CSRF.")); return;
          }
          if (!code) { reject(new Error("No authorisation code returned.")); return; }
          resolve(code);
        }
      } catch(e) { /* cross-origin - still loading */ }
      if (popup.closed) { clearInterval(timer); reject(new Error("Popup closed before completing authorisation.")); }
    }, 400);
  });
}

// Exchange code for tokens - NOTE: Xero requires client_secret for confidential apps.
// For a browser-only PKCE public app, omit client_secret. For a server-backed integration
// this exchange should happen server-side to protect tokens.
async function xeroExchangeCode(code) {
  const verifier = sessionStorage.getItem("xero_verifier");
  const resp = await fetch("https://identity.xero.com/connect/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      grant_type:    "authorization_code",
      client_id:     XERO_CLIENT_ID,
      code,
      redirect_uri:  XERO_REDIRECT_URI,
      code_verifier: verifier,
    }),
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error_description || `Token exchange failed (${resp.status})`);
  }
  return resp.json(); // { access_token, refresh_token, expires_in, token_type }
}

// Fetch Xero tenant/org list
async function xeroGetTenants(accessToken) {
  const resp = await fetch("https://api.xero.com/connections", {
    headers: { Authorization: `Bearer ${accessToken}`, "Content-Type": "application/json" },
  });
  if (!resp.ok) throw new Error(`Could not fetch tenants (${resp.status})`);
  return resp.json(); // [{ tenantId, tenantName, tenantType, ... }]
}

// Submit ITR to Xero Tax - POSTs the workpaper JSON to the Xero Tax Returns endpoint
// Xero Tax API: POST /tax.xero.com/api.xro/1.0/Returns
async function xeroSubmitReturn(accessToken, tenantId, payload) {
  const resp = await fetch("https://tax.xero.com/api.xro/1.0/Returns", {
    method: "POST",
    headers: {
      Authorization:    `Bearer ${accessToken}`,
      "Xero-tenant-id": tenantId,
      "Content-Type":   "application/json",
    },
    body: JSON.stringify(payload),
  });
  const data = await resp.json().catch(() => ({}));
  if (!resp.ok) throw new Error(data.Detail || data.Message || `Xero API error (${resp.status})`);
  return data;
}

function openFormI(state, clientName) {
  const name = clientName || "Client";
  const { css, page1, page2, deductionsSchedule, essSchedule } = buildFormIHTML(state, name);
  const win = window.open("", "_blank");
  if (!win) { alert("Pop-up blocked - please allow pop-ups for this site."); return; }
  win.document.write(`<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <title>ATO Form I - ${name} - Individual Tax Return ${getFYConfig(state.selectedFY||DEFAULT_FY).endYear}</title>
    <style>${css}</style>
  </head><body>
    <button class="print-btn no-print" onclick="window.print()">🖨 Print / Save as PDF</button>
    ${page1}
    ${page2}
    ${deductionsSchedule}
    ${essSchedule}
  </body></html>`);
  win.document.close();
}

function mergeExceptions(wpFlags, aiExceptions) {
  var fromFlags = (wpFlags||[]).map(function(f) {
    return { type:f.type||"warn", category:"Calculated", msg:f.msg, ref:"", action:"Review before lodgement" };
  });
  return fromFlags.concat((aiExceptions||[]).filter(function(e){return e&&e.msg;}));
}

function inferEmployerContext(docs) {
  var done = docs.filter(function(d){return d.status==="done"&&d.extracted&&!d.extracted.error;});
  var paygDocs = done.filter(function(d){return d.type==="payg";});
  if (!paygDocs.length) return null;
  var employers = paygDocs.map(function(d) {
    var ex = d.extracted;
    var empField = (ex.fields||[]).find(function(f){return /employer/i.test(f.label);});
    var empName = empField ? empField.value : "";
    var abnField = (ex.fields||[]).find(function(f){return /abn/i.test(f.label);});
    return { name:empName, abn:abnField?abnField.value:null, income:parseVal(ex.income) };
  }).filter(function(e){return e.name;});
  return employers.length ? employers : null;
}

async function generateExceptions(apiKey, state, wpData) {
  var t = wpData.totals;
  var fy = getFYLabel(state.selectedFY);
  var system = "You are an Australian tax review specialist. Analyse the return and identify exceptions, risks, and areas of interest. Return ONLY a JSON array, no markdown. Each item: {\"type\":\"warn|info|flag\",\"category\":\"string\",\"msg\":\"string\",\"ref\":\"ATO item/section\",\"action\":\"string\"}. flag=must fix before lodging. warn=review recommended. info=note. Max 10 items.";
  var prompt = "FY"+fy+" ITR review:\nTaxable income: "+fmtAUD(t.taxableIncome)+" | Deductions: "+fmtAUD(t.deductions+(t.ipPremium||0))+" | "+(t.refund>=0?"Refund":"Payable")+": "+fmtAUD(Math.abs(t.refund))+"\nESS: "+fmtAUD(t.essBoxF+t.essBoxD+t.essBoxE)+" | Rental net: "+fmtAUD(t.rentalIncome-t.rentalExp)+" | Medicare: "+fmtAUD(t.medicare)+"\nInterview risks: "+((state.interviewRisks||[]).join("; ")||"none recorded")+"\nDocs: "+buildVaultContext(state.docs, state.chatMessages, state.selectedFY).slice(0,1000);
  var raw = await callClaude(apiKey, { system:system, messages:[{role:"user",content:prompt}], maxTokens:700 });
  try { return JSON.parse(raw.replace(/```json|```/g,"").trim()); }
  catch(e) { return [{type:"info",category:"Parse",msg:"Exceptions could not be parsed - review manually.",ref:"",action:"Manual review"}]; }
}

async function checkDeductionLegitimacy(apiKey, state, wpData) {
  var t = wpData.totals;
  var fy = getFYLabel(state.selectedFY);
  var employers = inferEmployerContext(state.docs);
  var employerStr = employers
    ? employers.map(function(e){return e.name+(e.abn?" (ABN: "+e.abn+")":"")+" - income $"+e.income.toLocaleString("en-AU");}).join(" | ")
    : "No PAYG employer extracted";
  var done = state.docs.filter(function(d){return d.status==="done"&&d.extracted&&!d.extracted.error;});
  var claimedDeductions = [];
  done.filter(function(d){return d.type!=="ess";}).forEach(function(d) {
    var ex = d.extracted;
    (ex.fields||[]).filter(function(f){return f.ato_code&&/^D/i.test(f.ato_code)&&parseVal(f.value)>0;}).forEach(function(f) {
      claimedDeductions.push({code:f.ato_code, label:f.label, amount:parseVal(f.value), source:d.file.name});
    });
  });
  if (t.ipPremium>0) claimedDeductions.push({code:"D15",label:"Income protection insurance premium",amount:t.ipPremium,source:"insurance doc"});
  if (t.deductions>0&&!claimedDeductions.length) claimedDeductions.push({code:"D5",label:"Other work-related expenses",amount:t.deductions,source:"receipts"});
  if (!claimedDeductions.length) return [];
  var statedOccupation = state.clientProfile.occupation || "not stated";
  var atoTitle = state.clientProfile.atoJobTitle;
  var occupationContext = atoTitle
    ? "ATO-confirmed job title: \""+atoTitle+"\" (from ATO prefill service)"
    : "Stated occupation: \""+statedOccupation+"\" (manually entered - ATO confirmation not yet available)";
  var system = "You are an expert Australian tax compliance reviewer. Analyse each claimed deduction against ATO occupation-specific deduction rules and s.8-1 ITAA 1997. Return ONLY a JSON array, no markdown. Each item: {\"code\":\"D1\",\"label\":\"description\",\"amount\":1234.56,\"verdict\":\"accepted|query|rejected\",\"confidence\":\"high|medium|low\",\"reason\":\"brief explanation\",\"ato_reference\":\"s.8-1 ITAA 1997 or ATO guide\",\"action\":\"what to do\"}";
  var deductList = claimedDeductions.map(function(d,i){return (i+1)+". "+d.code+" - "+d.label+": $"+d.amount.toFixed(2)+" (source: "+d.source+")";}).join("\n");
  var prompt = "FY"+fy+" deduction legitimacy check.\n\nEMPLOYER (from PAYG - what ATO knows via STP):\n"+employerStr+"\n\n"+occupationContext+"\n\nCLAIMED DEDUCTIONS:\n"+deductList+"\n\nFor each deduction: infer industry from employer name, cross-reference ATO occupation-specific rules, flag inconsistencies.";
  var raw = await callClaude(apiKey, { system:system, messages:[{role:"user",content:prompt}], maxTokens:1200 });
  try { return JSON.parse(raw.replace(/```json|```/g,"").trim()); }
  catch(e) { return [{code:"?",label:"Parse error",amount:0,verdict:"query",confidence:"low",reason:"Legitimacy check could not be parsed.",ato_reference:"s.8-1 ITAA 1997",action:"Manual review required"}]; }
}

function buildOutputsReviewContext(state, wpData, exceptions) {
  if (!wpData) return "No outputs generated yet.";
  var t = wpData.totals;
  var fy = getFYLabel(state.selectedFY);
  var fmt = function(v){return v>0?fmtAUD(v):"--";};

}

          </div>

            <div className="op-review-chips">

            </div>
          )}

            <textarea className="chat-input" rows={1}
              placeholder={allDone?"Ask about any output...":"Generate outputs first"}
              disabled={!allDone} value={reviewInput}
              onChange={function(e){setReviewInput(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,100)+"px";}}
              onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendReview(reviewInput);}}}
            />

          </div>
        </div>
      </div>
    </div>
  );
}


// ─────────────────────────────────────────
//  TRIGGER OUTPUT GENERATION FROM DRAFTER
//  Called when accountant clicks "Generate all 6 outputs" in drafter
// ─────────────────────────────────────────
async function triggerOutputGeneration(state, dispatch) {
  if (!state.apiKey) { alert("Please enter your Anthropic API key."); return; }
  const hasDocs = state.docs.some(function(d){return d.status==="done"&&d.extracted&&!d.extracted.error;});
  if (!hasDocs) { alert("No extracted documents - complete Step 2 first."); return; }

  // Navigate to first output item
  dispatch({ type:"SET_PANEL", payload:"output-detail" });
  dispatch({ type:"SET_ACTIVE_OUTPUT", payload:"letter" });

  // Reset all to loading
  dispatch({ type:"SET_OUTPUTS_STATE", payload:{
    letter:"loading", xero:"loading", form:"loading", xlsx:"loading", exc:"loading", deduct:"loading",
    exceptions:[], wpData:null, deductData:[], xeroData:null
  }});

  const wp = buildWorkpaperData(state.docs, state.clientProfile, state.selectedFY, {});
  dispatch({ type:"SET_OUTPUTS_STATE", payload:{ wpData:wp, form:"done" }});

  // Xero JSON - synchronous
  const xeroJson = buildXeroJSON(wp, {}, state.clientProfile, state.selectedFY);
  dispatch({ type:"SET_OUTPUTS_STATE", payload:{ xeroData:xeroJson, xero:"done" }});

  // Letter - synchronous (popup-based)
  dispatch({ type:"SET_OUTPUTS_STATE", payload:{ letter:"done" }});

  // XLSX - synchronous
  dispatch({ type:"SET_OUTPUTS_STATE", payload:{ xlsx:"done" }});

  // Run AI calls in parallel
  try {
    const [excRes, deductRes] = await Promise.allSettled([
      generateExceptions(state.apiKey, state, wp),
      checkDeductionLegitimacy(state.apiKey, state, wp),
    ]);
    const aiExc = excRes.status==="fulfilled" ? excRes.value : [];
    const allExc = mergeExceptions(wp.flags, aiExc);
    const deductData = deductRes.status==="fulfilled" ? deductRes.value : [];
    dispatch({ type:"SET_OUTPUTS_STATE", payload:{ exceptions:allExc, exc:"done", deductData:deductData, deduct:"done" }});
  } catch(e) {
    dispatch({ type:"SET_OUTPUTS_STATE", payload:{ exc:"error", deduct:"error" }});
  }
}

// ─────────────────────────────────────────
//  OUTPUT DETAIL PANEL
//  Shows the selected output as main content with review chat
// ─────────────────────────────────────────
function OutputDetailPanel({ state, dispatch }) {
  const { apiKey, activeOutput, outputsState, docs, clientProfile, selectedFY } = state;
  const [reviewMsgs, setReviewMsgs] = useState([]);
  const [reviewInput, setReviewInput] = useState("");
  const [reviewLoading, setReviewLoading] = useState(false);
  const [verifyChecks, setVerifyChecks] = useState({ letter:false, xero:false, form:false, xlsx:false, exc:false, deduct:false });
  const reviewBottomRef = useRef(null);

  useEffect(function(){ reviewBottomRef.current && reviewBottomRef.current.scrollIntoView({behavior:"smooth"}); }, [reviewMsgs, reviewLoading]);

  const wp = outputsState.wpData;
  const allDone = ["letter","xero","form","xlsx","exc","deduct"].every(function(k){ return outputsState[k]==="done"||outputsState[k]==="error"; });
  const allVerified = Object.values(verifyChecks).every(Boolean);

  const sendReview = useCallback(async function(text) {
    if (!apiKey || !text.trim()) return;
    const clean = scrubPII(text.trim());
    setReviewInput("");
    setReviewMsgs(function(prev){ return [...prev, {role:"user",content:clean}]; });
    setReviewLoading(true);
    try {
      var sys = buildOutputsReviewContext(state, wp, outputsState.exceptions);
      var reply = await callClaude(apiKey, { system:sys, messages:[...reviewMsgs,{role:"user",content:clean}], maxTokens:600 });
      setReviewMsgs(function(prev){ return [...prev, {role:"assistant",content:reply}]; });
    } catch(e) {
      setReviewMsgs(function(prev){ return [...prev, {role:"assistant",content:"Error: "+e.message}]; });

                  <div key={i} style={{display:"flex",gap:8,padding:"8px 0",borderBottom:"0.5px solid var(--border)",fontSize:12,lineHeight:1.5}}>
                    <span style={{flex:1}}>{ex.msg}<small style={{display:"block",fontSize:10,fontFamily:"Courier New",color:"var(--hint)",marginTop:2}}>{[ex.category,ex.ref,ex.action].filter(Boolean).join(" - ")}</small></span>
                  </div>
                );})}
              </div>
            );
          })}</div>;
    }

    if (activeOutput === "deduct") {
      var checks = outputsState.deductData || [];
      if (!checks.length) return <div className="notice info"><span>i</span><span>No deductions to check.</span></div>;
      var verdictColour={accepted:"var(--accent)",query:"var(--warn)",rejected:"var(--danger)"};
      var verdictBg={accepted:"var(--accent-l)",query:"var(--warn-l)",rejected:"var(--danger-l)"};
      var employers=inferEmployerContext(docs);
      var cp=clientProfile;
      return (
        <div>
          <div style={{padding:"8px 10px",background:"var(--surface2)",border:"0.5px solid var(--border-strong)",borderRadius:"var(--rs)",marginBottom:12,fontSize:11}}>
            <div style={{fontFamily:"Courier New",fontSize:10,color:"var(--hint)",marginBottom:4,textTransform:"uppercase",letterSpacing:".4px"}}>Context</div>
            <div><span style={{color:"var(--muted)"}}>Employer (STP): </span><strong>{employers?employers.map(function(e){return e.name;}).join(", "):"not extracted"}</strong></div>
            <div><span style={{color:"var(--muted)"}}>Occupation: </span><strong>{cp.occupation||"not stated"}</strong></div>
            <div><span style={{color:"var(--muted)"}}>ATO job title: </span><strong style={{color:cp.atoJobTitle?"var(--accent)":"var(--hint)"}}>{cp.atoJobTitle||"not available - ATO SBR2 pending"}</strong></div>
          </div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr style={{background:"var(--surface2)"}}>
              {["Code","Deduction","Amount","Verdict","Action"].map(function(h){return <th key={h} style={{padding:"6px 10px",textAlign:h==="Amount"?"right":"left",fontSize:10,fontFamily:"Courier New",fontWeight:600,borderBottom:"0.5px solid var(--border-strong)"}}>{h}</th>;})}
            </tr></thead>
            <tbody>{checks.map(function(row,i){return (
              <tr key={i} style={{borderBottom:"0.5px solid var(--border)",background:i%2===0?"var(--surface)":"transparent"}}>
                <td style={{padding:"6px 10px",fontFamily:"Courier New",fontSize:10,color:"var(--accent)",fontWeight:700,width:50}}>{row.code}</td>
                <td style={{padding:"6px 10px"}}><div style={{fontWeight:500}}>{row.label}</div><div style={{fontSize:10,color:"var(--muted)",marginTop:1}}>{row.reason}</div><div style={{fontSize:10,color:"var(--hint)",marginTop:1,fontFamily:"Courier New"}}>{row.ato_reference}</div></td>
                <td style={{padding:"6px 10px",textAlign:"right",fontFamily:"Courier New",fontWeight:600,whiteSpace:"nowrap"}}>{row.amount>0?"$"+row.amount.toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:2}):"--"}</td>
                <td style={{padding:"6px 10px",whiteSpace:"nowrap"}}><span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:20,fontSize:10,fontFamily:"Courier New",fontWeight:700,background:verdictBg[row.verdict]||"var(--surface2)",color:verdictColour[row.verdict]||"var(--muted)",border:"0.5px solid "+(verdictColour[row.verdict]||"var(--border-strong)")}}>{(row.verdict||"").toUpperCase()}</span></td>
                <td style={{padding:"6px 10px",fontSize:11,color:"var(--muted)"}}>{row.action}</td>
              </tr>
            );})}</tbody>
          </table>
          <div style={{display:"flex",gap:10,marginTop:10,flexWrap:"wrap"}}>
            {[{label:"Accepted",key:"accepted",color:"var(--accent)",bg:"var(--accent-l)"},{label:"Query",key:"query",color:"var(--warn-t)",bg:"var(--warn-l)"},{label:"Rejected",key:"rejected",color:"var(--danger)",bg:"var(--danger-l)"}].map(function(s){
              var count=checks.filter(function(c){return c.verdict===s.key;}).length;
              return count>0?<span key={s.key} style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontFamily:"Courier New",fontWeight:600,background:s.bg,color:s.color}}>{count} {s.label.toLowerCase()}</span>:null;
            })}
          </div>
        </div>
      );
    }
    return null;
  }

  var activeLabel = (OUTPUT_DEFS.find(function(o){return o.key===activeOutput;})||{}).label || "";

  return (
    <div className="op-wrap">
      {/* Top bar */}
      <div className="op-topbar">
        <div className="op-topbar-title">{activeLabel || "Step 3 - Output detail"}</div>
        <button className="tbtn" onClick={function(){ dispatch({type:"SET_PANEL",payload:"drafter"}); }}>Back to drafter</button>
        {allDone && (
          <button className="tbtn" onClick={function(){
            if(wp) exportOutputsXLSX(wp, outputsState.exceptions, outputsState.clientRef||"Client", selectedFY, outputsState.deductData||[]);
          }}>Download XLSX</button>
        )}
      </div>

      {/* Output nav tabs */}
      <div style={{display:"flex",gap:0,borderBottom:"0.5px solid var(--border)",background:"var(--surface)",flexShrink:0,overflowX:"auto"}}>
        {OUTPUT_DEFS.map(function(item){
          var st=outputsState[item.key]||"idle";
          var isActive=activeOutput===item.key;
          return (
            <div key={item.key}
              onClick={function(){ if(st!=="idle"){ dispatch({type:"SET_ACTIVE_OUTPUT",payload:item.key}); } }}
              style={{padding:"8px 14px",fontSize:11,fontFamily:"Courier New",cursor:st==="idle"?"default":"pointer",
                borderBottom:isActive?"2px solid var(--accent)":"2px solid transparent",
                color:isActive?"var(--accent-t)":st==="idle"?"var(--hint)":"var(--muted)",
                fontWeight:isActive?600:400,whiteSpace:"nowrap",flexShrink:0,
                display:"flex",alignItems:"center",gap:5}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:st==="done"?"var(--accent)":st==="loading"?"var(--warn)":st==="error"?"var(--danger)":"var(--border-strong)",flexShrink:0}}/>
              {item.label}
            </div>
          );
        })}
      </div>

      <div className="op-body">
        {/* Main content */}
        <div className="op-outputs">
          {renderOutputContent()}

          {/* Verify bar when all done */}
          {allDone && (
            <div className="op-verify-bar" style={{marginTop:20}}>
              <span style={{fontSize:12,fontWeight:600}}>Verify:</span>
              {OUTPUT_DEFS.map(function(c){return (
                <label key={c.key}>
                  <input type="checkbox" checked={verifyChecks[c.key]||false} onChange={function(e){setVerifyChecks(function(prev){var n={...prev};n[c.key]=e.target.checked;return n;});}}/>
                  {c.label.split(" ")[0]}
                </label>
              );})}
              <div style={{flex:1}}/>
              <button className="tbtn primary" disabled={!allVerified} onClick={function(){ alert("All outputs approved - proceed to Step 4."); }}>
                Approve all and continue
              </button>
            </div>
          )}
        </div>

        {/* Review chat */}
        <div className="op-review">
          <div className="op-review-hdr">Review and query outputs</div>
          <div className="op-review-msgs">
            {reviewMsgs.length===0 && <div style={{fontSize:12,color:"var(--hint)",fontStyle:"italic",padding:"8px 0"}}>Ask anything about any output - calculations, exceptions, or deduction legitimacy.</div>}
            {reviewMsgs.map(function(m,i){return (
              <div key={i} className="op-review-msg">
                <div className="op-review-role">{m.role}</div>
                <div className={"op-review-body "+m.role}>{m.content}</div>
              </div>
            );})}
            {reviewLoading && <div className="op-review-msg"><div className="op-review-role">assistant</div><div className="op-review-body assistant loading"><Spinner/>Reviewing...</div></div>}
            <div ref={reviewBottomRef}/>
          </div>
          {reviewMsgs.length===0 && (
            <div className="op-review-chips">
              {REVIEW_CHIPS.map(function(c,i){return <button key={i} className="op-review-chip" onClick={function(){sendReview(c);}}>{c}</button>;})}
            </div>
          )}
          <div className="op-review-input-row">
            <textarea className="chat-input" rows={1}
              placeholder="Ask about any output..."
              value={reviewInput}
              onChange={function(e){setReviewInput(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,100)+"px";}}
              onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendReview(reviewInput);}}}
            />
            <button className="tbtn primary" onClick={function(){sendReview(reviewInput);}} disabled={reviewLoading}>-&gt;</button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>

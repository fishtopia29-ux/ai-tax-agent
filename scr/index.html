function AdjustmentsPanel({ state, dispatch, outputsState }) {
  const { apiKey, adjustments, docs, clientProfile, selectedFY } = state;
  const [input, setInput] = useState("");
  const [pendingInstruction, setPendingInstruction] = useState("");
  const [candidates, setCandidates] = useState(null); // [{code, label, amount}] when ambiguous
  const [loading, setLoading] = useState(false);
  const [regenLoading, setRegenLoading] = useState(false);
  const inputRef = useRef(null);

  const baseTotals = computeTotals(docs, clientProfile, selectedFY);
  const adjTotals  = computeAdjustedTotals(docs, clientProfile, selectedFY, adjustments);

  // Derive quick chips dynamically from actual extracted deduction line items
  const lineItems = buildDeductionLineItems(docs, baseTotals);
  const CHIPS = lineItems.length > 0
    ? lineItems.slice(0,6).map(function(l){
        return "Reduce " + l.label + " to 70%";
      })
    : [
        "Reduce mobile phone claim to 70%",
        "Remove car expense deduction",
        "Add self-education expense of $500",
        "Reduce WFH deduction to 60% claimable",
        "Remove the uniform/laundry deduction",
        "Change internet claim to 50%",
      ];

  function commitAdjustment(result, instr) {
    const before = {};
    const after = {};
    Object.keys(result.delta).forEach(function(k) {
      before[k] = adjTotals[k] !== undefined ? adjTotals[k] : 0;
      after[k]  = result.delta[k];
    });
    dispatch({
      type: "ADD_ADJUSTMENT",
      payload: {
        id: Date.now().toString(),
        instruction: instr,
        summary: result.summary,
        delta: result.delta,
        lineItem: result.lineItem || null,
        before,
        after,
        timestamp: new Date().toLocaleTimeString("en-AU"),
      }
    });
    regenReviewOutputs(result.delta, result.summary);
  }

  // Called when accountant picks from the candidates list
  async function handleCandidatePick(candidate) {
    setCandidates(null);
    const refinedInstruction = pendingInstruction + " — specifically the item: " + candidate.label + " ($" + candidate.amount.toFixed(2) + ")";
    setLoading(true);
    try {
      const result = await interpretAdjustment(apiKey, refinedInstruction, adjTotals, docs, selectedFY);
      if (result.delta && Object.keys(result.delta).length > 0) {
        commitAdjustment(result, pendingInstruction + " [" + candidate.label + "]");
      } else {
        alert(result.summary || "Could not apply — please rephrase.");
      }
    } catch(e) {
      alert("Error: " + e.message);
    }
    setLoading(false);
    setPendingInstruction("");
  }

  async function handleApply() {
    if (!apiKey) { alert("Please enter your Anthropic API key."); return; }
    const instr = input.trim();
    if (!instr) return;
    setInput("");
    setLoading(true);
    setCandidates(null);
    try {
      const result = await interpretAdjustment(apiKey, instr, adjTotals, docs, selectedFY);
      if (result.candidates && result.candidates.length > 0) {
        // Ambiguous — show picker
        setPendingInstruction(instr);
        setCandidates(result.candidates);
      } else if (result.delta && Object.keys(result.delta).length > 0) {
        commitAdjustment(result, instr);
      } else {
        alert(result.summary || "Could not interpret — please rephrase.");
      }
    } catch(e) {
      alert("Error: " + e.message);
    }
    setLoading(false);
  }

  async function regenReviewOutputs(latestDelta, latestSummary) {
    setRegenLoading(true);
    // Rebuild wp with adjusted totals (include new delta)
    const allAdj = [...adjustments, { delta: latestDelta }];
    const newTotals = computeAdjustedTotals(docs, clientProfile, selectedFY, allAdj);
    const wp = {
      totals: { ...newTotals, ipPremium: newTotals.ipPremium||0, essTaxWH: newTotals.essTaxWH||0, taxWithheld: newTotals.taxWithheld||0 },
      flags: [],
      sections: [],
      fy: getFYLabel(selectedFY),
    };
    dispatch({ type:"SET_OUTPUTS_STATE", payload:{ wpData: wp, xlsx:"done", review:"loading" }});
    try {
      const excResult = await generateExceptions(apiKey, { ...state, adjustments: allAdj }, wp);
      const allExc = mergeExceptions(wp.flags, excResult);
      dispatch({ type:"SET_OUTPUTS_STATE", payload:{ exceptions:allExc, review:"done", deductData:[], wpData:wp }});
    } catch(e) {
      dispatch({ type:"SET_OUTPUTS_STATE", payload:{ review:"error" }});
    }
    setRegenLoading(false);
  }

  async function handleRevert(id) {
    dispatch({ type:"REVERT_ADJUSTMENT", payload: id });
    // Recalc without that adjustment — regenerate silently
    const remaining = adjustments.filter(function(a){ return a.id !== id; });
    const newTotals = computeAdjustedTotals(docs, clientProfile, selectedFY, remaining);
    const wp = {
      totals: { ...newTotals, ipPremium: newTotals.ipPremium||0, essTaxWH: newTotals.essTaxWH||0, taxWithheld: newTotals.taxWithheld||0 },
      flags: [], sections: [], fy: getFYLabel(selectedFY),
    };
    dispatch({ type:"SET_OUTPUTS_STATE", payload:{ wpData: wp, xlsx:"done", review:"loading" }});
    try {
      const excResult2 = await generateExceptions(apiKey, { ...state, adjustments: remaining }, wp);
      dispatch({ type:"SET_OUTPUTS_STATE", payload:{
        exceptions: mergeExceptions(wp.flags, excResult2),
        review:"done",
        deductData: [],
        wpData: wp,
      }});
    } catch(e) {
      dispatch({ type:"SET_OUTPUTS_STATE", payload:{ review:"error" }});
    }
  }

  const fmt = function(v){ return v >= 0 ? fmtAUD(v) : "-" + fmtAUD(Math.abs(v)); };
  const diff = function(a, b){ const d = a - b; return d === 0 ? null : (d > 0 ? "+" : "") + fmtAUD(d); };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:0,height:"100%"}}>

      {/* ── Refund/payable impact bar ── */}
      <div style={{padding:"10px 16px",background:"var(--surface2)",border:"0.5px solid var(--border)",borderRadius:"var(--rs)",marginBottom:14,display:"flex",gap:20,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{fontSize:11,color:"var(--muted)"}}>Impact on outcome</div>
        <div style={{flex:1,display:"flex",gap:20,flexWrap:"wrap"}}>
          <span style={{fontSize:12}}><span style={{color:"var(--muted)"}}>Taxable income: </span>
            <strong>{fmtAUD(adjTotals.taxableIncome)}</strong>
            {adjustments.length>0 && adjTotals.taxableIncome!==baseTotals.taxableIncome &&
              <span style={{fontSize:11,marginLeft:5,color:adjTotals.taxableIncome<baseTotals.taxableIncome?"var(--accent)":"var(--danger)"}}>
                ({diff(adjTotals.taxableIncome, baseTotals.taxableIncome)})
              </span>}
          </span>
          <span style={{fontSize:12}}><span style={{color:"var(--muted)"}}>{adjTotals.refund>=0?"Refund:":"Payable:"} </span>
            <strong style={{color:adjTotals.refund>=0?"var(--accent)":"var(--danger)"}}>{fmtAUD(Math.abs(adjTotals.refund))}</strong>
            {adjustments.length>0 && adjTotals.refund!==baseTotals.refund &&
              <span style={{fontSize:11,marginLeft:5,color:adjTotals.refund>baseTotals.refund?"var(--accent)":"var(--danger)"}}>
                ({diff(adjTotals.refund, baseTotals.refund)})
              </span>}
          </span>
        </div>
        {regenLoading && <span style={{fontSize:11,color:"var(--muted)",fontStyle:"italic"}}><Spinner/>Updating review...</span>}
        {adjustments.length>0 && <button className="tbtn" style={{fontSize:10}} onClick={function(){ dispatch({type:"CLEAR_ADJUSTMENTS"}); }}>Reset all</button>}
      </div>

      {/* ── Candidate picker — shown when Claude finds ambiguous matches ── */}
      {candidates && (
        <div style={{marginBottom:14,padding:"12px 14px",background:"var(--warn-l)",border:"1px solid var(--warn)",borderRadius:"var(--rs)"}}>
          <div style={{fontSize:12,fontWeight:600,color:"var(--warn-t)",marginBottom:8}}>
            ⚠ Multiple deduction items could match — which one did you mean?
          </div>
          <div style={{fontSize:11,color:"var(--muted)",marginBottom:10,fontStyle:"italic"}}>Instruction: "{pendingInstruction}"</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {candidates.map(function(c,i){return (
              <button key={i} onClick={function(){ handleCandidatePick(c); }}
                style={{display:"flex",alignItems:"center",gap:12,padding:"8px 12px",background:"var(--surface)",
                  border:"0.5px solid var(--border-strong)",borderRadius:"var(--rs)",cursor:"pointer",textAlign:"left",fontSize:12}}
                onMouseEnter={function(e){e.currentTarget.style.background="var(--accent-l)";e.currentTarget.style.borderColor="var(--accent)";}}
                onMouseLeave={function(e){e.currentTarget.style.background="var(--surface)";e.currentTarget.style.borderColor="var(--border-strong)";}}>
                <span style={{fontFamily:"Courier New",fontSize:10,color:"var(--accent)",fontWeight:700,minWidth:30}}>{c.code}</span>

                <span style={{fontSize:11,color:"var(--accent)"}}>Select →</span>
              </button>
            );})}
          </div>
          <button className="tbtn" style={{marginTop:8,fontSize:11}} onClick={function(){setCandidates(null);setPendingInstruction("");}}>Cancel</button>
        </div>
      )}

      {/* ── Change log ── */}
      {adjustments.length > 0 && (
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,fontFamily:"Courier New",color:"var(--muted)",fontWeight:700,letterSpacing:".6px",textTransform:"uppercase",marginBottom:6}}>Change log</div>

                <span style={{fontSize:10,fontFamily:"Courier New",color:"var(--hint)",flexShrink:0,marginTop:2}}>{adj.timestamp}</span>

      )}

      {adjustments.length === 0 && !candidates && (
        <div style={{marginBottom:12}}>
          <div className="notice info"><span>ℹ</span><span>No adjustments applied. Original extracted figures are in use. Use the quick actions below or type an instruction.</span></div>
        </div>
      )}

      {/* ── Extracted deduction items reference ── */}
      {buildDeductionLineItems(docs, baseTotals).length > 0 && !candidates && (
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,fontFamily:"Courier New",color:"var(--muted)",fontWeight:700,letterSpacing:".6px",textTransform:"uppercase",marginBottom:6}}>Extracted deduction items</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {buildDeductionLineItems(docs, baseTotals).map(function(l,i){return (
              <button key={i}
                onClick={function(){ setInput("Reduce " + l.label + " to 70%"); inputRef.current && inputRef.current.focus(); }}
                style={{fontSize:11,padding:"4px 10px",background:"var(--surface2)",border:"0.5px solid var(--border-strong)",
                  borderRadius:20,cursor:"pointer",display:"flex",gap:6,alignItems:"center",color:"var(--muted)"}}
                onMouseEnter={function(e){e.currentTarget.style.background="var(--accent-l)";e.currentTarget.style.color="var(--accent-t)";}}
                onMouseLeave={function(e){e.currentTarget.style.background="var(--surface2)";e.currentTarget.style.color="var(--muted)";}}>
                <span style={{fontFamily:"Courier New",fontSize:9,color:"var(--accent)",fontWeight:700}}>{l.code}</span>
                <span>{l.label}</span>
                <span style={{fontFamily:"Courier New",fontWeight:600}}>{fmtAUD(l.amount)}</span>
              </button>
            );})}
          </div>
        </div>
      )}

      {/* ── Quick chips ── */}
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
        {CHIPS.map(function(c,i){return (
          <button key={i} className="op-review-chip" onClick={function(){ setInput(c); inputRef.current && inputRef.current.focus(); }}>{c}</button>
        );})}
      </div>

      {/* ── Input ── */}
      <div style={{display:"flex",gap:6,alignItems:"flex-end"}}>
        <textarea ref={inputRef} className="chat-input" rows={2}
          placeholder="e.g. Reduce mobile phone to 70%, remove car expense, add self-education $450…"
          value={input}
          onChange={function(e){ setInput(e.target.value); }}
          onKeyDown={function(e){ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); handleApply(); } }}
          style={{flex:1,resize:"none"}}
        />
        <button className="tbtn primary" onClick={handleApply} disabled={loading||!input.trim()||!!candidates}
          style={{padding:"8px 14px",alignSelf:"stretch"}}>
          {loading ? <><Spinner/>Applying...</> : "Apply →"}
        </button>
      </div>
      <div style={{fontSize:10,color:"var(--hint)",marginTop:4}}>
        Review &amp; Risk and XLSX update automatically. Letter, Xero &amp; ATO Form update on final Save to SharePoint.
      </div>
    </div>
  );
}

function buildOutputsReviewContext(state, wpData, exceptions) {
  if (!wpData) return "No outputs generated yet.";
  const t = wpData.totals;
  const fy = getFYLabel(state.selectedFY);
  const fmt = function(v){return v>0?fmtAUD(v):"--";};
  return "You are AusTax Agent - Outputs Review mode. FY"+fy+".\nITR SUMMARY: Income "+fmt(t.totalIncome)+" | Deductions "+fmt(t.deductions+(t.ipPremium||0))+" | Taxable "+fmt(t.taxableIncome)+" | Gross tax "+fmt(t.grossTax)+" | LITO "+fmt(t.lito)+" | Medicare "+fmt(t.medicare)+" | Withheld "+fmt(t.totalTaxWH)+" | "+(t.refund>=0?"Refund":"Payable")+" "+fmtAUD(Math.abs(t.refund))+"\nEXCEPTIONS ("+((exceptions||[]).length)+"): "+((exceptions||[]).map(function(e,i){return (i+1)+". ["+((e.type||"").toUpperCase())+"] "+e.msg;}).join(" | ")||"None")+"\nAnswer questions about any output precisely. Never ask for TFN, name, DOB, or bank details.";
}

// -----------------------------------------
//  TRIGGER OUTPUT GENERATION
// -----------------------------------------
async function triggerOutputGeneration(state, dispatch) {
  if (!state.apiKey) { alert("Please enter your Anthropic API key."); return; }
  const hasDocs = state.docs.some(function(d){return d.status==="done"&&d.extracted&&!d.extracted.error;});
  if (!hasDocs) { alert("No extracted documents - complete Step 2 first."); return; }
  // Navigate straight to Step 4 so accountant watches outputs generate
  dispatch({ type:"SET_PANEL", payload:"output-detail" });
  dispatch({ type:"SET_ACTIVE_OUTPUT", payload:"letter" });
  dispatch({ type:"SET_OUTPUTS_STATE", payload:{
    letter:"loading", xero:"loading", form:"loading", xlsx:"loading", review:"loading",
    exceptions:[], wpData:null, deductData:[], xeroData:null
  }});
  const totals = computeTotals(state.docs, state.clientProfile, state.selectedFY);
  const fy = getFYLabel(state.selectedFY);
  const wp = {
    totals: { ...totals,
      ipPremium: totals.ipPremium || 0,
      essBoxF: totals.essBoxF || 0,
      essBoxD: totals.essBoxD || 0,
      essBoxE: totals.essBoxE || 0,
      essTaxWH: totals.essTaxWH || 0,
      phiClawback: totals.phiClawback || 0,
      lmito: totals.lmito || 0,
    },
    flags: totals.outOfPeriodDocs && totals.outOfPeriodDocs.length > 0
      ? [{ type:"warn", msg:"Out-of-period documents detected: "+totals.outOfPeriodDocs.join(", ") }]
      : [],
    sections: [],
    fy,
  };
  // 1. ATO form (instant — computed totals)
  dispatch({ type:"SET_OUTPUTS_STATE", payload:{ wpData:wp, form:"done" }});
  // 2. Xero JSON (instant — computed totals)
  const xeroJson = {
    financialYear: state.selectedFY,
    generated: new Date().toISOString(),
    individual: {
      income: {
        salaryWages: totals.paygIncome || 0,
        essIncome: (totals.essBoxF||0)+(totals.essBoxD||0)+(totals.essBoxE||0),
        rentalIncome: totals.rentalIncome || 0,
        capitalGains: totals.capitalGains || 0,
      },
      deductions: {
        workRelated: totals.deductions || 0,
        incomeProtection: totals.ipPremium || 0,
        rentalExpenses: totals.rentalExp || 0,
      },
      taxOffsets: { lito: totals.lito||0, lmito: totals.lmito||0 },
      medicare: { levy: totals.medicare||0, phiClawback: totals.phiClawback||0 },
      summary: {
        totalIncome: totals.totalIncome,
        taxableIncome: totals.taxableIncome,
        grossTax: totals.grossTax,
        netTax: totals.netTax,
        taxWithheld: totals.totalTaxWH,
        refundOrPayable: totals.refund,
      }
    }
  };
  dispatch({ type:"SET_OUTPUTS_STATE", payload:{ xeroData:xeroJson, xero:"done" }});
  // 3. Customer letter (instant — template-based)
  dispatch({ type:"SET_OUTPUTS_STATE", payload:{ letter:"done" }});
  // 4. Calculations XLSX (instant — SheetJS)
  dispatch({ type:"SET_OUTPUTS_STATE", payload:{ xlsx:"done" }});
  // 5. Flags & Risk — one combined Claude call (exceptions + deduction legitimacy folded in)
  try {
    const excResult = await generateExceptions(state.apiKey, state, wp);
    const allExc = mergeExceptions(wp.flags, excResult);
    dispatch({ type:"SET_OUTPUTS_STATE", payload:{ exceptions:allExc, review:"done", deductData:[] }});
  } catch(e) {
    dispatch({ type:"SET_OUTPUTS_STATE", payload:{ review:"error" }});
  }
}

function OutputDetailPanel({ state, dispatch }) {
  const { apiKey, activeOutput, outputsState, docs, clientProfile, selectedFY } = state;
  const [reviewMsgs, setReviewMsgs] = useState([]);
  const [reviewInput, setReviewInput] = useState("");
  const [reviewLoading, setReviewLoading] = useState(false);
  const [showSPSaver, setShowSPSaver] = useState(false);
  const reviewBottomRef = useRef(null);
  useEffect(function(){ reviewBottomRef.current && reviewBottomRef.current.scrollIntoView({behavior:"smooth"}); }, [reviewMsgs, reviewLoading]);
  const wp = outputsState.wpData;
  const allDone = ["letter","xero","form","xlsx","review"].every(function(k){ return outputsState[k]==="done"||outputsState[k]==="error"; });
  const sendReview = useCallback(async function(text) {
    if (!apiKey || !text.trim()) return;
    const clean = scrubPII(text.trim());
    setReviewInput("");
    setReviewMsgs(function(prev){ return [...prev, {role:"user",content:clean}]; });
    setReviewLoading(true);
    try {
      const sys = buildOutputsReviewContext(state, wp, outputsState.exceptions);
      const reply = await callClaude(apiKey, { system:sys, messages:[...reviewMsgs,{role:"user",content:clean}], maxTokens:600 });
      setReviewMsgs(function(prev){ return [...prev, {role:"assistant",content:reply}]; });
    } catch(e) {
      setReviewMsgs(function(prev){ return [...prev, {role:"assistant",content:"Error: "+e.message}]; });
    }
    setReviewLoading(false);
  }, [apiKey, reviewMsgs, state, wp, outputsState.exceptions]);

  const OUTPUT_DEFS = [
    { key:"letter",  label:"Client pay & lodge approval letter" },

    { key:"xlsx",    label:"Calculations spreadsheet" },

    if (st === "idle")    return <div style={{padding:40,textAlign:"center",color:"var(--hint)"}}>Click "Generate all 6 outputs" in the Return Drafter to generate this output.</div>;

    if (activeOutput === "xero") return (

        <div style={{marginBottom:8,display:"flex",gap:6}}>

        <div style={{fontFamily:"Courier New",fontSize:10,lineHeight:1.6,whiteSpace:"pre",background:"var(--bg)",border:"0.5px solid var(--border-strong)",borderRadius:"var(--rs)",padding:12,maxHeight:400,overflow:"auto",color:"var(--accent-t)"}}>

    );
    // ── MERGED: Review & Risk ──
    if (activeOutput === "review") {

      const checks = outputsState.deductData || [];
      const employers = inferEmployerContext(docs);
      const cp = clientProfile;
      const verdictColour={accepted:"var(--accent)",query:"var(--warn)",rejected:"var(--danger)"};
      const verdictBg={accepted:"var(--accent-l)",query:"var(--warn-l)",rejected:"var(--danger-l)"};
      const flagCount = exceptions.filter(function(e){return e.type==="flag";}).length;
      const warnCount = exceptions.filter(function(e){return e.type==="warn";}).length;
      const queryCount = checks.filter(function(r){return r.verdict==="query"||r.verdict==="rejected";}).length;
      return (

          const adjCount = item.key==="adjust" && state.adjustments && state.adjustments.length;
          return (
            <div key={item.key}
              onClick={function(){ if(st!=="idle"){ dispatch({type:"SET_ACTIVE_OUTPUT",payload:item.key}); } }}
              style={{padding:"8px 14px",fontSize:11,fontFamily:"Courier New",cursor:st==="idle"?"default":"pointer",
                borderBottom:isActive?"2px solid var(--accent)":"2px solid transparent",
                color:isActive?"var(--accent-t)":st==="idle"?"var(--hint)":"var(--muted)",
                fontWeight:isActive?600:400,whiteSpace:"nowrap",flexShrink:0,
                display:"flex",alignItems:"center",gap:5}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:st==="done"?"var(--accent)":st==="loading"?"var(--warn)":st==="error"?"var(--danger)":"var(--border-strong)",flexShrink:0}}/>
              {item.label}
              {adjCount ? <span style={{background:"var(--warn)",color:"#fff",borderRadius:20,fontSize:9,padding:"1px 5px",fontWeight:700}}>{adjCount}</span> : null}
            </div>
          );
        })}
      </div>
      <div className="op-body">
        <div className="op-outputs">
          {renderOutputContent()}
          {allDone && (
            <div className="op-verify-bar" style={{marginTop:20}}>
              <span style={{fontSize:12,color:"var(--muted)"}}>All 6 outputs ready</span>
              <div style={{flex:1}}/>
              <button className="tbtn primary" onClick={function(){ setShowSPSaver(true); }}>
                ☁️ Save to SharePoint
              </button>
            </div>
          )}
        </div>
        <div className="op-review">
          <div className="op-review-hdr">Review and query outputs</div>
          <div className="op-review-msgs">
            {reviewMsgs.length===0 && <div style={{fontSize:12,color:"var(--hint)",fontStyle:"italic",padding:"8px 0"}}>Ask anything about any output.</div>}
            {reviewMsgs.map(function(m,i){return (
              <div key={i} className="op-review-msg">
                <div className="op-review-role">{m.role}</div>
                <div className={"op-review-body "+m.role}>{m.content}</div>
              </div>
            );})}
            {reviewLoading && <div className="op-review-msg"><div className="op-review-role">assistant</div><div className="op-review-body assistant loading"><Spinner/>Reviewing...</div></div>}
            <div ref={reviewBottomRef}/>
          </div>
          {reviewMsgs.length===0 && (
            <div className="op-review-chips">
              {REVIEW_CHIPS.map(function(c,i){return <button key={i} className="op-review-chip" onClick={function(){sendReview(c);}}>{c}</button>;})}
            </div>
          )}
          <div className="op-review-input-row">
            <textarea className="chat-input" rows={1} placeholder="Ask about any output..." value={reviewInput}
              onChange={function(e){setReviewInput(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,100)+"px";}}
              onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendReview(reviewInput);}}}
            />
            <button className="tbtn primary" onClick={function(){sendReview(reviewInput);}} disabled={reviewLoading}>-&gt;</button>
          </div>
        </div>
      </div>
      {showSPSaver && (
        <SharePointSaver
          state={state}
          outputsState={outputsState}
          onClose={function(){ setShowSPSaver(false); }}
        />
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>

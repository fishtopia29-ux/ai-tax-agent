// Fetch remote config - call once on app boot
async function loadFYConfig() {
  // Skip fetch when running from local file system - fetch() is blocked by browser security
  const isLocal = location.protocol === "file:" || location.hostname === "localhost" || location.hostname === "127.0.0.1";
  if (isLocal) {
    console.log("Running locally - using built-in FY config (no fetch).");
    return { success: false, local: true };
  }
  try {
    const resp = await fetch("fy-config.json?v=" + Date.now(), { cache: "no-store" });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();
    // Validate - must have a years object with at least one entry
    if (!data.years || !Object.keys(data.years).length) throw new Error("Invalid config");
    // Convert Infinity sentinel (JSON doesn't support Infinity)
    Object.values(data.years).forEach(cfg => {
      cfg.brackets = cfg.brackets.map(b => [b[0] === 999999999 ? Infinity : b[0], b[1], b[2]]);
    });
    FY_CONFIG = data.years;
    FY_CONFIG_META = { ...data._meta, loadedFromRemote: true };
    DEFAULT_FY = data.defaultFY || Object.keys(data.years)[0];
    FY_OPTIONS = Object.keys(FY_CONFIG);
    console.log("✓ FY config loaded from fy-config.json - last updated:", FY_CONFIG_META.lastUpdated);
    return { success: true, meta: FY_CONFIG_META };
  } catch (e) {
    console.warn("FY config fetch failed, using built-in fallback:", e.message);
    FY_CONFIG_META = { lastUpdated: null, lastUpdatedBy: null, source: null, loadedFromRemote: false };
    return { success: false, error: e.message };
  }
}

// Dynamic helpers - always call with fyKey
function getFYConfig(fyKey) { return (FY_CONFIG && (FY_CONFIG[fyKey] || FY_CONFIG[DEFAULT_FY])) || FY_CONFIG_FALLBACK[DEFAULT_FY]; }
function getFYStart(fyKey) { return new Date(getFYConfig(fyKey).start); }
function getFYEnd(fyKey)   { return new Date(getFYConfig(fyKey).end); }
function getFYLabel(fyKey) { return getFYConfig(fyKey).label; }

function checkInPeriod(dateStr, fyKey) {
  // Returns { inPeriod: bool, date: Date|null, formatted: string }
  if (!dateStr) return { inPeriod: null, date: null, formatted: "" };
  const fyStart = getFYStart(fyKey || DEFAULT_FY);
  const fyEnd   = getFYEnd(fyKey || DEFAULT_FY);
  const cleaned = String(dateStr).trim();
  let d = null;
  if (/^\d{4}-\d{2}-\d{2}$/.test(cleaned)) d = new Date(cleaned);
  else if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(cleaned)) {
    const [day, mon, yr] = cleaned.split("/");
    d = new Date(`${yr}-${mon.padStart(2,"0")}-${day.padStart(2,"0")}`);
  }
  else if (/^\d{1,2}\s+[A-Za-z]+\s+\d{4}$/.test(cleaned)) d = new Date(cleaned);
  else if (/^[A-Za-z]+\s+\d{4}$/.test(cleaned)) d = new Date("1 " + cleaned);
  if (!d || isNaN(d.getTime())) return { inPeriod: null, date: null, formatted: cleaned };
  const inPeriod = d >= fyStart && d <= fyEnd;
  const formatted = d.toLocaleDateString("en-AU", { day:"numeric", month:"short", year:"numeric" });
  return { inPeriod, date: d, formatted };
}

// ?????????????????????????????????????????
function calcTax(inc, fyKey) {
  const cfg = getFYConfig(fyKey);
  const brackets = cfg.brackets;
  let prev = 0, tax = 0;
  for (const [threshold, rate, base] of brackets) {
    if (inc <= threshold) { tax = base + (inc - prev) * rate; break; }
    prev = threshold;
  }
  return Math.max(0, tax);
}
function calcLITO(inc, fyKey) {
  const cfg = getFYConfig(fyKey);
  const { litoMax, litoPhase1, litoPhase2 } = cfg;
  if (inc <= litoPhase1[0]) return litoMax;
  if (inc <= litoPhase1[1]) return litoMax - (inc - litoPhase1[0]) * litoPhase1[2];
  if (inc <= litoPhase2[1]) return Math.max(0, (litoMax - (litoPhase1[1]-litoPhase1[0])*litoPhase1[2]) - (inc - litoPhase2[0]) * litoPhase2[2]);
  return 0;
}
function calcLMITO(inc, fyKey) {
  const cfg = getFYConfig(fyKey);
  if (!cfg.lmitoMax || cfg.lmitoMax === 0) return 0;
  // LMITO: full amount $37,000-$48,000, phases out $90,001-$126,000
  if (inc <= 37000)  return 255;
  if (inc <= 48000)  return 255 + (inc - 37000) * (cfg.lmitoMax - 255) / 11000;
  if (inc <= 90000)  return cfg.lmitoMax;
  if (inc <= 126000) return Math.max(0, cfg.lmitoMax - (inc - 90000) * (cfg.lmitoMax / 36000));
  return 0;
}
// Medicare levy reduction - FY2024-25 family thresholds
// Single: shade-in $26,000-$32,500. Family: $43,846 + $4,027 per dependent child.
// Reduction = 10% of (income - lower threshold). Full levy above upper threshold.
function calcMedicareLevy(taxableIncome, familyIncome, numDependants, hasSpouse, fyKey) {
  const cfg = getFYConfig(fyKey);
  const rate = cfg.medicareRate;
  const hasDependants = hasSpouse || numDependants > 0;
  if (!hasDependants) {
    const lower = cfg.medicareLowerSingle, upper = cfg.medicareUpperSingle;
    if (taxableIncome <= lower) return 0;
    if (taxableIncome <= upper) return Math.min(taxableIncome * rate, (taxableIncome - lower) * 0.1);
    return taxableIncome * rate;
  }
  const lowerThreshold = cfg.medicareFamilyBase + (numDependants * cfg.medicareFamilyPerChild);
  const upperThreshold = lowerThreshold / 0.8;
  const ati = familyIncome > 0 ? familyIncome : taxableIncome;
  if (ati <= lowerThreshold) return 0;
  if (ati <= upperThreshold) return Math.min(taxableIncome * rate, (ati - lowerThreshold) * 0.1);
  return taxableIncome * rate;
}
// PHI rebate clawback - FY2024-25 income tiers
// Tier 0: ?$93,000 single / ?$186,000 family - full rebate (no clawback)
// Tier 1: $93,001-$108,000 / $186,001-$216,000 - reduced rebate
// Tier 2: $108,001-$144,000 / $216,001-$288,000 - further reduced
// Tier 3: >$144,000 / >$288,000 - no rebate entitlement (full clawback)
// Rebate rates (age <65): Tier0=24.608%, Tier1=16.405%, Tier2=8.202%, Tier3=0%
function calcPHIClawback(ati, rebateReceived, hasSpouse, numDependants, fyKey) {
  if (!rebateReceived || rebateReceived <= 0) return 0;
  const cfg = getFYConfig(fyKey);
  const isFamily = hasSpouse || numDependants > 0;
  const [t1, t2, t3] = isFamily ? cfg.phiTiersFamily : cfg.phiTiersSingle;
  const rates = cfg.phiRates;
  const entitledRate = ati < t1 ? rates[0] : ati < t2 ? rates[1] : ati < t3 ? rates[2] : rates[3];
  const clawback = Math.max(0, rebateReceived - (rebateReceived * (entitledRate / rates[0])));
  return Math.round(clawback * 100) / 100;
}
function parseVal(v) {
  if (v == null) return 0;
  const n = parseFloat(String(v).replace(/[$,\s]/g, ""));
  return isNaN(n) ? 0 : n;
}
function fmtAUD(v) {
  if (!v && v !== 0) return "-";
  return "$" + Math.abs(v).toLocaleString("en-AU", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function computeTotals(docs, clientProfile, fyKey) {
  const { hasSpouse=false, numDependants=0, spouseIncome=0, phiRebateReceived=0 } = clientProfile || {};
  const fy = fyKey || DEFAULT_FY;
  const done    = docs.filter(d => d.status === "done" && d.extracted && !d.extracted.error);
  const nonEss  = done.filter(d => d.type !== "ess");
  const essDocs = done.filter(d => d.type === "ess");
  const sum = (arr, f) => arr.reduce((a, d) => a + parseVal(d.extracted[f]), 0);

  const paygIncome   = sum(nonEss, "income");
  const taxWithheld  = sum(nonEss, "taxWithheld");
  const ipPremium    = sum(done,   "incProtectionPremium");
  const ipBenefit    = sum(done,   "incProtectionBenefit");
  // Exclude deductions from documents with confirmed out-of-period dates
  const inPeriodDone = done.filter(d => {
    try {
      const ex = d.extracted;
      if (!ex || (!ex.documentDate && !ex.periodEnd)) return true;
      const dateToCheck = ex.periodEnd || ex.documentDate;
      const { inPeriod } = checkInPeriod(dateToCheck, fy);
      return inPeriod !== false;
    } catch(e) { return true; }
  });
  const outOfPeriodDocs = done.filter(d => {
    try {
      const ex = d.extracted;
      if (!ex) return false;
      const dateToCheck = ex.periodEnd || ex.documentDate;
      if (!dateToCheck) return false;
      const { inPeriod } = checkInPeriod(dateToCheck, fy);
      return inPeriod === false;
    } catch(e) { return false; }
  });
  const deductions   = sum(inPeriodDone, "deductions") + (inPeriodDone.some(d => d.type === "insurance") ? ipPremium : 0);
  const rentalIncome = sum(done,   "rentalIncome");
  const rentalExp    = sum(done,   "rentalExpenses");
  const capitalGains = sum(done,   "capitalGains");
  const essBoxF      = sum(essDocs,"essIncome");
  const essBoxD      = sum(essDocs,"essBoxD");
  const essBoxE      = sum(essDocs,"essBoxE");
  const essTaxWH     = sum(essDocs,"essTaxWithheld");

  const essBoxDConcession = essDocs.length > 0 ? Math.min(essBoxD, 1000 * essDocs.length) : 0;
  const essAssessable = essBoxF + Math.max(0, essBoxD - essBoxDConcession) + essBoxE;
  const netRental     = rentalIncome - rentalExp;
  const totalIncome   = paygIncome + essAssessable + ipBenefit + (netRental > 0 ? netRental : 0) + capitalGains;
  const taxableIncome = Math.max(0, totalIncome - deductions + (netRental < 0 ? netRental : 0));

  const grossTax    = calcTax(taxableIncome, fy);
  const lito        = calcLITO(taxableIncome, fy);
  const lmito       = calcLMITO(taxableIncome, fy);
  const familyATI   = taxableIncome + spouseIncome;
  const medicare    = calcMedicareLevy(taxableIncome, familyATI, numDependants, hasSpouse, fy);
  const phiClawback = calcPHIClawback(familyATI, phiRebateReceived, hasSpouse, numDependants, fy);
  const netTax      = Math.max(0, grossTax - lito - lmito + medicare + phiClawback);
  const totalTaxWH  = taxWithheld + essTaxWH;
  const refund      = totalTaxWH - netTax;

  return { paygIncome, taxWithheld, deductions, rentalIncome, rentalExp, capitalGains, ipPremium, ipBenefit, outOfPeriodDocs,
           essBoxF, essBoxD, essBoxE, essTaxWH, essBoxDConcession,
           totalIncome, taxableIncome, grossTax, lito, lmito, medicare, phiClawback, netTax, totalTaxWH, refund, hasSpouse, numDependants };
}

function reducer(state, action) {
  switch (action.type) {
    case "SET_API_KEY":      return { ...state, apiKey: action.payload };
    case "SET_PANEL":        return { ...state, panel: action.payload };
    case "TOGGLE_INCOME": {
      const s = new Set(state.incomeTypes);
      s.has(action.payload) ? s.delete(action.payload) : s.add(action.payload);
      return { ...state, incomeTypes: s };
    }
    case "ADD_CHAT_MSG":       return { ...state, chatMessages: [...state.chatMessages, action.payload], clientActive: true };
    case "ADD_DRAFTER_MSG":    return { ...state, drafterMessages: [...state.drafterMessages, action.payload] };
    case "SET_SUMMARY":        return { ...state, interviewSummary: action.payload };
    case "SET_RISKS":          return { ...state, interviewRisks: action.payload };
    case "ADD_DOCS":           return { ...state, docs: [...state.docs, ...action.payload], docIdSeq: state.docIdSeq + action.payload.length };
    case "UPDATE_DOC":         return { ...state, docs: state.docs.map(d => d.id === action.payload.id ? { ...d, ...action.payload } : d) };
    case "REMOVE_DOC":         return { ...state, docs: state.docs.filter(d => d.id !== action.payload) };
    case "SHOW_ARCHIVE_MODAL": return { ...state, showArchiveModal: true };
    case "HIDE_ARCHIVE_MODAL": return { ...state, showArchiveModal: false };
    case "ARCHIVE_CLIENT":     return { ...state, archivedClients: [action.payload, ...state.archivedClients] };
    case "SET_FY":            return { ...state, selectedFY: action.payload, showFYModal: false };
    case "SET_CONFIG_STATUS": return { ...state, configStatus: action.payload };
    case "HIDE_FY_MODAL":     return { ...state, showFYModal: false };
    case "REFRESH_FY_OPTIONS":return { ...state, _fyRefresh: Date.now() };
    case "SET_CLIENT_PROFILE": return { ...state, clientProfile: { ...state.clientProfile, ...action.payload } };
    case "SET_XERO":           return { ...state, xero: { ...state.xero, ...action.payload } };
    case "SET_OUTPUTS_STATE":   return { ...state, outputsState: { ...state.outputsState, ...action.payload } };
    case "SET_ACTIVE_OUTPUT":   return { ...state, activeOutput: action.payload };
    case "RESET_SESSION":      return {
      ...INITIAL,
      apiKey: state.apiKey,
      archivedClients: state.archivedClients,
      incomeTypes: new Set(["payg"]),
      panel: "interview",
    };
    default: return state;
  }
}

async function callClaude(apiKey, { system, messages, maxTokens = 1000 }) {
  const cfg = window.GREENGRAPH_CONFIG || {};
  const useProxy = cfg.USE_PROXY === true;
  const resolvedKey = cfg.ANTHROPIC_API_KEY && cfg.ANTHROPIC_API_KEY !== "sk-ant-YOUR-KEY-HERE"
    ? cfg.ANTHROPIC_API_KEY : apiKey;
  const url = useProxy ? (cfg.PROXY_URL || "/api/claude") : API_URL;
  const headers = { "Content-Type": "application/json" };
  if (!useProxy) {
    headers["x-api-key"] = resolvedKey;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const resp = await fetch(url, {
    method: "POST", headers,
    body: JSON.stringify({ model: MODEL, max_tokens: maxTokens, system, messages }),
  });
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error?.message || "API error");
  return data.content.map(c => c.text || "").join("");
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("Read error"));
    r.readAsDataURL(file);
  });
}

// Convert spreadsheet file to CSV text using SheetJS
async function spreadsheetToText(file) {
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: "array" });
  const lines = [];
  workbook.SheetNames.forEach(sheetName => {
    const ws = workbook.Sheets[sheetName];
    const csv = XLSX.utils.sheet_to_csv(ws, { blankrows: false });
    if (csv.trim()) {
      lines.push(`=== Sheet: ${sheetName} ===`);
      lines.push(csv);
    }
  });
  return lines.join("\n\n");
}

function guessDocType(name) {
  const n = name.toLowerCase();
  // Specific patterns first - must come before broad keyword matches like "income"
  if (/income.protect|incomeprot|income_protect/.test(n))   return "insurance";
  if (/health.insur|health insurance|private.health|medibank|bupa|nib |hcf |ahm |hospital.cover/.test(n)) return "medical";
  if (/ess |share.scheme|employee.share/.test(n))           return "ess";
  if (/payg|salary|payment.summary|income.statement/.test(n)) return "payg";
  if (/rental|rent |property/.test(n))                      return "rental";
  if (/invest|broker|dividend|cgt/.test(n))                 return "invest";
  if (/receipt|deduct|expense|claim|work.related/.test(n))  return "receipt";
  if (/loan|mortgage|interest/.test(n))                     return "loan";
  if (/bas |abn |sole.trader|business/.test(n))             return "business";
  return "other";
}

// ?????????????????????????????????????????
//  ARCHIVE / EXPORT HELPERS
// ?????????????????????????????????????????
function buildArchiveText(clientName, state) {
  const lines = [];
  lines.push("AusTax Agent - Accountant Notes");
  lines.push(`Client: ${clientName}`);
  lines.push(`FY ${getFYLabel(state.selectedFY || DEFAULT_FY)}`);
  lines.push(`Archived: ${new Date().toLocaleString("en-AU")}`);
  lines.push("");
  lines.push("=== INTERVIEW TRANSCRIPT ===");
  state.chatMessages.length
    ? state.chatMessages.forEach(m => lines.push(`[${m.role.toUpperCase()}] ${m.content}`))
    : lines.push("(no interview recorded)");
  lines.push("");
  lines.push("=== VAULT EXTRACTED DATA ===");
  const done = state.docs.filter(d => d.status === "done" && d.extracted && !d.extracted.error);
  done.length ? done.forEach(d => {
    const ex = d.extracted;
    lines.push(`\n--- ${d.file.name} (${ex.docLabel || d.type}) ---`);
    (ex.fields || []).forEach(f => lines.push(`  ${f.ato_code || ""} ${f.label}: ${f.value}`));
    if (ex.essTransactions && ex.essTransactions.length) {
      lines.push("  ESS Transactions:");
      ex.essTransactions.forEach(t => lines.push(
        `    ${t.taxingPointDate || ""} ${t.soldWithin30Days ? "SALE" : "VEST"} Box${t.essItem || "F"} ${t.numInterests}x AU:${t.taxableAuPct != null ? t.taxableAuPct : 100}% = $${t.reportableDiscount}`
      ));
    }
    if (ex.notes) lines.push(`  Notes: ${ex.notes}`);
  }) : lines.push("(no documents extracted)");
  lines.push("");
  lines.push("=== RETURN DRAFTER ===");
  state.drafterMessages.length
    ? state.drafterMessages.forEach(m => lines.push(`[${m.role.toUpperCase()}] ${m.content}`))
    : lines.push("(no drafter session recorded)");
  return lines.join("\n");
}

function downloadText(filename, content) {
  const blob = new Blob([content], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function buildVaultContext(docs, chatMessages, selectedFY) {
  const done = docs.filter(d => d.status === "done" && d.extracted && !d.extracted.error);
  if (!done.length) return "No documents have been processed yet.";
  return done.map(d => {
    const ex = d.extracted;
    if (d.type === "ess") {
      const txs = ex.essTransactions || [];
      const saleEvents  = txs.filter(t => t.soldWithin30Days);
      const vestEvents  = txs.filter(t => !t.soldWithin30Days);
      const totalDiscount = txs.reduce((a, t) => a + parseVal(t.reportableDiscount), 0);
      // Full transaction table retained - needed for sale-date taxing point rules and CGT cost base
      const txTable = txs.map(t =>
        `  ${(t.taxingPointDate||"").padEnd(12)} ${(t.soldWithin30Days?"SALE":"VEST").padEnd(5)} Box${t.essItem||"F"} AU:${t.taxableAuPct!=null?t.taxableAuPct:100}% ${t.numInterests||0}x = $${parseVal(t.reportableDiscount).toFixed(2)} [${(t.award||"").slice(0,20)}]`
      ).join("\n");
      return `[ESS STATEMENT - Item 12] ${d.file.name}
Employer: ${ex.essEmployer||"Unknown"}
Box F (Deferral - FULLY ASSESSABLE s.83A-110): $${parseVal(ex.essIncome).toFixed(2)}
Box D (Upfront eligible, $1k concession s.83A-35): $${parseVal(ex.essBoxD).toFixed(2)}
Box E (Upfront not eligible): $${parseVal(ex.essBoxE).toFixed(2)}
Box C (TFN withheld - offsets tax): $${parseVal(ex.essTaxWithheld).toFixed(2)}
Tx total: $${totalDiscount.toFixed(2)} ${Math.abs(totalDiscount-parseVal(ex.essIncome))<1?"✓ matches Box F":"? use Box F"}
TRANSACTIONS (${txs.length} rows - SALE rows use sale-date taxing point; VEST rows: cost base = assessable amount for future CGT):
${txTable}
Notes: ${ex.notes||""}
Date: ${ex.documentDate||"not extracted"} | Period: ${ex.periodStart||""}${ex.periodEnd?" to "+ex.periodEnd:""} | In FY${getFYLabel(selectedFY||DEFAULT_FY)}: ${(() => { const d = ex.periodEnd||ex.documentDate; if (!d) return "unknown"; const {inPeriod} = checkInPeriod(d, selectedFY||DEFAULT_FY); return inPeriod===true?"YES":inPeriod===false?"NO - EXCLUDE FROM DEDUCTIONS":"unknown"; })()}`;
    }
    const employer = ex.fields ? (ex.fields.find(f => /employer/i.test(f.label))||{}).value || "" : "";
    // Send key figures only - avoid double-counting IP premium (already in IPremium field)
    const dedAmt = d.type === "insurance" ? "" : (ex.deductions??"");
    return `[${ex.docLabel||d.type.toUpperCase()}] ${d.file.name}${employer ? " - "+employer : ""}
Income:${ex.income??""} Withheld:${ex.taxWithheld??""} Deductions:${dedAmt} Rental:${ex.rentalIncome??""} RentalExp:${ex.rentalExpenses??""} CGT:${ex.capitalGains??""} IPremium(D15-deduction):${ex.incProtectionPremium??""} IBenefit(assessable-income):${ex.incProtectionBenefit??""}
Notes: ${ex.notes||""}
Date: ${ex.documentDate||"not extracted"} | Period: ${ex.periodStart||""}${ex.periodEnd?" to "+ex.periodEnd:""} | In FY${getFYLabel(selectedFY||DEFAULT_FY)}: ${(() => { const d = ex.periodEnd||ex.documentDate; if (!d) return "unknown"; const {inPeriod} = checkInPeriod(d, selectedFY||DEFAULT_FY); return inPeriod===true?"YES":inPeriod===false?"NO - EXCLUDE FROM DEDUCTIONS":"unknown"; })()}`;
  }).join("\n\n");
}

//  ERROR BOUNDARY
// ?????????????????????????????????????????
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  componentDidCatch(e, info) { console.error("Render error:", e, info); }
  render() {
    if (this.state.error) return (
      <div style={{ padding:"20px", background:"#faece7", border:"1px solid #993c1d", borderRadius:6, margin:10, fontFamily:"Courier New", fontSize:12, color:"#712b13" }}>
        <strong>Render error - check browser console (F12) for details.</strong><br/>
        {String(this.state.error)}
        <br/><br/>
        <button onClick={() => this.setState({ error: null })} style={{ padding:"4px 10px", cursor:"pointer" }}>Dismiss</button>
      </div>
    );
    return this.props.children;
  }
}

    <div className="sum-row">
      <span className="sum-label" style={bold ? { fontWeight:600 } : {}}>{label}</span>

  );
}

function VaultTotals({ docs, clientProfile, selectedFY }) {
  const t = computeTotals(docs, clientProfile, selectedFY);
  const f  = v => v > 0 ? fmtAUD(v) : "-";
  const fN = v => v > 0 ? "-" + fmtAUD(v) : "-";
  return (
    <div style={{ padding:"0 10px 8px" }}>
      <div className="sb-section" style={{ padding:"6px 0 2px" }}>Income</div>
      <SumRow label="PAYG salary (Item 1)"    value={f(t.paygIncome)}   />
      <SumRow label="Rental income"           value={f(t.rentalIncome)} />
      <SumRow label="Capital gains"           value={f(t.capitalGains)} />
      <div className="sb-section" style={{ padding:"6px 0 2px", borderTop:"0.5px solid var(--border)", marginTop:4 }}>ESS - Item 12</div>
      <SumRow label="Box F deferral"          value={f(t.essBoxF)} bold />
      <SumRow label="Box D upfront (elig.)"   value={t.essBoxD > 0 ? f(t.essBoxD) + (t.essBoxDConcession > 0 ? ` (-$${t.essBoxDConcession.toFixed(0)} conc.)` : "") : "-"} />
      <SumRow label="Box E upfront (no red.)" value={f(t.essBoxE)} />
      <SumRow label="Box C TFN withheld"      value={f(t.essTaxWH)} />
      <div className="sb-section" style={{ padding:"6px 0 2px", borderTop:"0.5px solid var(--border)", marginTop:4 }}>Deductions</div>
      <SumRow label="Work deductions"         value={fN(t.deductions)} />
      <SumRow label="Rental expenses"         value={fN(t.rentalExp)}  />
      {t.ipPremium > 0 && <SumRow label="Income prot. premium (D15)" value={fN(t.ipPremium)} />}
      {t.ipBenefit > 0 && <SumRow label="Income prot. benefit (income)" value={f(t.ipBenefit)} />}
      <div className="sb-section" style={{ padding:"6px 0 2px", borderTop:"0.5px solid var(--border)", marginTop:4 }}>Summary</div>
      <SumRow label="Taxable income"          value={f(t.taxableIncome)} bold />
      <SumRow label="Est. tax payable"        value={fN(t.netTax)} bold color="var(--danger)" />
      <SumRow label={`Medicare levy${t.hasSpouse||t.numDependants>0?" (family red.)":""}`} value={fN(t.medicare)} />
      {t.phiClawback > 0 && <SumRow label="PHI rebate clawback"  value={fN(t.phiClawback)} />}
      <SumRow label="Total withheld"          value={f(t.totalTaxWH)} />
      <div style={{ borderTop:"1.5px solid var(--border-strong)", marginTop:3, paddingTop:3 }}>
        <SumRow
          label="Est. refund / payable"
          value={t.totalTaxWH === 0 && t.netTax === 0 ? "-" : t.refund >= 0 ? `+${fmtAUD(t.refund)} refund` : `-${fmtAUD(Math.abs(t.refund))} payable`}
          bold
          color={t.refund >= 0 ? "var(--accent)" : "var(--danger)"}
        />
      </div>
    </div>
  );
}

//  INTERVIEW PANEL
// ?????????????????????????????????????????
function InterviewPanel({ state, dispatch }) {
  const { apiKey, chatMessages, incomeTypes } = state;
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current && bottomRef.current.scrollIntoView({ behavior:"smooth" }); }, [chatMessages, loading]);

  const send = useCallback(async (text) => {
    if (!apiKey) { alert("Please enter your Anthropic API key."); return; }
    const clean = scrubPII(text.trim());
    if (!clean) return;
    setInput("");
    dispatch({ type:"ADD_CHAT_MSG", payload:{ role:"user", content:clean } });
    setLoading(true);
    const incomeList = [...incomeTypes].join(", ");
    const fyLbl = getFYLabel(state.selectedFY);
    const system = `You are AusTax Agent, an expert Australian tax accountant assistant - Accountant Edition. Conducting a structured tax interview for FY${fyLbl}.
Active income types: ${incomeList}
- Ask focused, one-at-a-time questions
- Reference ATO sections, item numbers, and rulings
- Flag risks and opportunities
- After each exchange append SUMMARY and RISKS blocks
Format:
SUMMARY
- Item 1 Salary: $...
RISKS
-> [risk]
Never ask for TFN, full name, DOB, address, ABN, or bank details.`;
    try {
      const msgs = [...chatMessages, { role:"user", content:clean }];
      const reply = await callClaude(apiKey, { system, messages:msgs });
      dispatch({ type:"ADD_CHAT_MSG", payload:{ role:"assistant", content:reply } });
      const sumMatch = reply.match(/SUMMARY\n([\s\S]*?)(?=\nRISKS|\n\n|$)/);
      if (sumMatch) {
        const rows = sumMatch[1].trim().split("\n").filter(l => l.trim()).map(l => ({
          label: (l.replace(/^[?\-]\s*/, "").split(":")[0] || "").trim(),
          value: ((l.split(":")[1] || "").trim()),
        }));
        dispatch({ type:"SET_SUMMARY", payload:rows });
      }
      const riskMatch = reply.match(/RISKS\n([\s\S]*?)(?=\n\n|$)/);
      if (riskMatch) {
        const risks = riskMatch[1].trim().split("\n").filter(l => l.startsWith("->")).map(r => r.replace(/^->\s*/, ""));
        dispatch({ type:"SET_RISKS", payload:risks });
      }
    } catch(e) {
      dispatch({ type:"ADD_CHAT_MSG", payload:{ role:"assistant", content:"Error: " + e.message } });
    }
    setLoading(false);
  }, [apiKey, chatMessages, incomeTypes, dispatch]);

  const isEmpty = chatMessages.length === 0;
  return (
    <div className="panel">
      <div className="chat-wrap">
        {isEmpty && (
          <>
            <div style={{ textAlign:"center", padding:"10px 0 4px" }}>
              <div style={{ fontSize:22, marginBottom:6 }}>📋</div>
              <div style={{ fontSize:13, fontWeight:500, marginBottom:4 }}>Start a tax interview</div>
              <div style={{ fontSize:12, color:"var(--muted)" }}>Select income types, enter your API key, then pick a starting point or type your own question.</div>
            </div>
            <div className="starter-grid">
              {STARTER_PROMPTS.map((s, i) => (
                <div key={i} className="starter-card" onClick={() => send(s.prompt)}>
                  <div className="starter-icon">{s.icon}</div>
                  <div className="starter-title">{s.title}</div>
                  <div className="starter-sub">{s.sub}</div>
                </div>
              ))}
            </div>
          </>
        )}
        {chatMessages.map((m, i) => (
          <div key={i} className="msg">
            <div className="msg-role">{m.role}</div>
            <div className={`msg-body ${m.role}`}>{m.content}</div>
          </div>
        ))}
        {loading && (
          <div className="msg">
            <div className="msg-role">assistant</div>
            <div className="msg-body assistant loading"><Spinner />Thinking...</div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div className="notice warn" style={{ margin:"0 20px", borderRadius:"var(--rs)" }}>
        <span>⛑</span><span>Do not enter TFN, full name, DOB, address, ABN, or bank details.</span>
      </div>
      <div className="chips-row" style={{ borderTop:"none", paddingTop:8 }}>
        {INTERVIEW_CHIPS.map((c, i) => <span key={i} className="chip" onClick={() => send(c.prompt)}>{c.label}</span>)}
      </div>
      <div className="chat-input-row">
        <textarea className="chat-input" rows={1} placeholder="Ask anything about the return..."
          value={input}
          onChange={e => { setInput(e.target.value); e.target.style.height="auto"; e.target.style.height=Math.min(e.target.scrollHeight,110)+"px"; }}
          onKeyDown={e => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); send(input); } }}
        />
        <button className="tbtn primary" onClick={() => send(input)} disabled={loading}>Send ?</button>
      </div>
    </div>
  );
}

function EssCard({ doc }) {
  const ex = doc.extracted;
  const txs = ex.essTransactions || [];
  const total = txs.reduce((a, t) => a + parseVal(t.reportableDiscount), 0);
  const saleRows = txs.filter(t => t.soldWithin30Days);
  const matches = Math.abs(total - parseVal(ex.essIncome)) < 1;
  return (
    <div className="ext-panel">
      <div className="ext-hdr">
        <span>⛑</span>
        <span style={{ flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{doc.file.name}</span>
        <span style={{ fontSize:10, fontFamily:"Courier New", color:"var(--hint)", flexShrink:0 }}>ESS ? Item 12 ? {txs.length} rows</span>
      </div>
      <div className="ext-body">
        <div className="field-grid" style={{ marginBottom:10 }}>
          <div><div className="f-label">Employer</div><div className="f-val">{ex.essEmployer || "-"}</div></div>
          <div><div className="f-label">Box F - Deferral (Item 12)</div><div className="f-val" style={{ color:"var(--invest)", fontWeight:600 }}>{fmtAUD(parseVal(ex.essIncome))}</div></div>
          <div><div className="f-label">Box D - Upfront eligible</div><div className="f-val">{parseVal(ex.essBoxD) > 0 ? fmtAUD(parseVal(ex.essBoxD)) : "$0"}</div></div>
          <div><div className="f-label">Box E - Upfront no reduc.</div><div className="f-val">{parseVal(ex.essBoxE) > 0 ? fmtAUD(parseVal(ex.essBoxE)) : "$0"}</div></div>
          <div><div className="f-label">Box C - TFN withheld</div><div className="f-val">{fmtAUD(parseVal(ex.essTaxWithheld))}</div></div>
          <div><div className="f-label">Row total vs Box F</div><div className="f-val" style={{ color: matches ? "var(--accent)" : "var(--danger)" }}>{fmtAUD(total)} {matches ? "?" : "?"}</div></div>
        </div>
        {saleRows.length > 0 && (
          <div className="notice warn" style={{ marginBottom:8, fontSize:11 }}>
            <span>⛑</span><span>{saleRows.length} sale-date event(s) - market value basis is sale price per ATO rules.</span>
          </div>
        )}
        {txs.length > 0 && (
          <div style={{ overflowX:"auto" }}>
            <table className="ess-table">
              <thead><tr>
                <th>Award</th><th>Taxing point</th><th>Type</th><th>Basis</th>
                <th style={{ textAlign:"right" }}>#</th>
                <th style={{ textAlign:"right" }}>AU%</th>
                <th style={{ textAlign:"right" }}>Box</th>
                <th style={{ textAlign:"right" }}>Discount</th>
              </tr></thead>
              <tbody>
                {txs.map((t, i) => (
                  <tr key={i} style={{ background: t.soldWithin30Days ? "var(--warn-l)" : i%2===0 ? "var(--surface)" : "var(--surface2)" }}>
                    <td title={t.award}>{(t.award||"").slice(0,20)}</td>
                    <td>{t.taxingPointDate}</td>
                    <td style={{ color: t.soldWithin30Days ? "var(--warn)" : "var(--muted)" }}>{t.soldWithin30Days ? "Sale" : "Vest"}</td>
                    <td>{t.discountBasis}</td>
                    <td style={{ textAlign:"right" }}>{t.numInterests}</td>
                    <td style={{ textAlign:"right" }}>{t.taxableAuPct != null ? t.taxableAuPct+"%" : ""}</td>
                    <td style={{ textAlign:"right", fontWeight:600, color:"var(--invest)" }}>{t.essItem||"F"}</td>
                    <td style={{ textAlign:"right", fontWeight:600 }}>{fmtAUD(parseVal(t.reportableDiscount))}</td>
                  </tr>
                ))}
              </tbody>
              <tfoot><tr><td colSpan={7}>TOTAL</td><td style={{ textAlign:"right" }}>{fmtAUD(total)}</td></tr></tfoot>
            </table>
          </div>
        )}
        {ex.notes && <div className="ext-notes">{ex.notes}</div>}
      </div>
    </div>
  );
}

// ?????????????????????????????????????????
//  DOCUMENT EXTRACTION
// ?????????????????????????????????????????
async function extractDoc(doc, apiKey, selectedFY) {
  const dt = DOC_TYPES.find(d => d.id === doc.type) || DOC_TYPES[8];
  const isSpreadsheet = doc.file.name.match(/\.(xlsx|xls|csv)$/i);
  const isImg = !isSpreadsheet && doc.file.type !== "application/pdf";
  const isEss = doc.type === "ess";
  const fyLabel = getFYLabel(selectedFY || DEFAULT_FY);
  const fyStart = getFYConfig(selectedFY || DEFAULT_FY).start;
  const fyEnd = getFYConfig(selectedFY || DEFAULT_FY).end;
  const system = `You are an Australian tax document parser for FY${fyLabel}. Return ONLY valid JSON, no markdown, no backticks, no preamble.
FIELD RULES (all numbers: plain, no $ or commas):
"income"?PAYG gross wages(Item 1). NULL for ESS. "taxWithheld"?PAYG tax withheld. "deductions"?total deductible. "rentalIncome"?gross rental. "rentalExpenses"?rental deductions. "capitalGains"?net capital gains.
"essIncome"?ESS Box F deferral(Item 12). MUST NOT be null for ESS. "essTaxWithheld"?Box C TFN withheld. "essBoxD"?Box D upfront eligible. "essBoxE"?Box E upfront not eligible. "essEmployer"?employer name.
"essTransactions"?ESS ONLY: EVERY row from detail table: {award,grantDate,taxingPointDate,taxingPointType,discountBasis,numInterests,taxableAuPct,taxableForeignPct,reportableDiscount,essItem,soldWithin30Days}. Extract ALL rows.
INCOME PROTECTION RULES - these are TWO DIFFERENT figures, never confuse them:
"incProtectionPremium"?the PREMIUM PAID by the taxpayer to the insurer (D15 deduction, s.290). Look for words: "premium", "annual premium", "total premium paid", "amount paid". THIS IS A DEDUCTION.
"incProtectionBenefit"?any BENEFIT/CLAIM PAYMENT received by the taxpayer from the insurer (assessable income, s.6-5). Look for words: "benefit paid", "income replacement benefit", "claim payment", "monthly benefit received". THIS IS INCOME. NULL if no benefits were received during the year.
If the document only shows premium details with no benefit payments listed, set incProtectionBenefit to null.
DATE EXTRACTION - extract these for ALL document types:
"documentDate"?the primary date of the document (receipt date, statement date, payment date, issue date). Format as YYYY-MM-DD. NULL if not found.
"periodStart"?start of coverage/service period if stated (e.g. insurance policy period, rental period). Format as YYYY-MM-DD. NULL if not stated.
"periodEnd"?end of coverage/service period if stated. Format as YYYY-MM-DD. NULL if not stated.
FY${fyLabel} period is ${fyStart} to ${fyEnd}. If documentDate falls outside this range, note it in the "notes" field.
Return: {"docType":"${doc.type}","docLabel":"${dt.name}","fields":[{"label":"","value":"","ato_code":""}],"income":null,"taxWithheld":null,"deductions":null,"rentalIncome":null,"rentalExpenses":null,"capitalGains":null,"essIncome":null,"essTaxWithheld":null,"essBoxD":null,"essBoxE":null,"essEmployer":null,"essTransactions":[],"incProtectionPremium":null,"incProtectionBenefit":null,"documentDate":null,"periodStart":null,"periodEnd":null,"notes":""}`;
  let userContent;
  if (isSpreadsheet) {
    const csvText = await spreadsheetToText(doc.file);
    userContent = [{ type:"text", text: `Extract all Australian tax-relevant data from this spreadsheet and return as JSON.\n\n${csvText}` }];
  } else {
    const b64 = await toBase64(doc.file);
    userContent = [
      { type: isImg ? "image" : "document", source:{ type:"base64", media_type:doc.file.type, data:b64 } },
      { type:"text", text: isEss ? "Extract ALL tax data including every row from the transaction table." : "Extract all tax-relevant data as JSON." }
    ];
  }
  const text = await callClaude(apiKey, {
    system,
    messages: [{ role:"user", content: userContent }],
    maxTokens: isEss ? 8000 : 1500,
  });
  // Robust JSON extraction - strip markdown fences, then recover truncated JSON
  let clean = text.replace(/```json|```/g, "").trim();
  const start = clean.indexOf("{");
  if (start === -1) throw new Error("No JSON object found in response");
  let depth = 0, end = -1;
  for (let i = start; i < clean.length; i++) {
    if (clean[i] === "{" || clean[i] === "[") depth++;
    else if (clean[i] === "}" || clean[i] === "]") { depth--; if (depth === 0) { end = i; break; } }
  }
  if (end === -1) {
    let partial = clean.slice(start);
    partial = partial.replace(/,\s*"[^"]*$/, "").replace(/,\s*$/, "");
    const closers = [];
    for (const ch of partial) {
      if (ch === "{") closers.push("}");
      else if (ch === "[") closers.push("]");
      else if (ch === "}" || ch === "]") closers.pop();
    }
    clean = partial + closers.reverse().join("");
  } else {
    clean = clean.slice(start, end + 1);
  }
  return JSON.parse(clean);
}

function VaultPanel({ state, dispatch, onDraft }) {
  const { apiKey, docs } = state;
  const [drag, setDrag] = useState(false);
  const [processing, setProcessing] = useState(false);
  const fileRef = useRef(null);

  const addFiles = useCallback((files) => {
    const valid = Array.from(files).filter(f => ["application/pdf","image/png","image/jpeg","application/vnd.openxmlformats-officedocument.spreadsheetml.sheet","application/vnd.ms-excel","text/csv"].includes(f.type) || f.name.match(/\.(xlsx|xls|csv)$/i));
    const newDocs = valid.map((f, i) => ({
      id: state.docIdSeq + i + 1,
      file: f,
      type: guessDocType(f.name),
      status: "pending",
      extracted: null,
    }));
    if (newDocs.length) dispatch({ type:"ADD_DOCS", payload:newDocs });
  }, [state.docIdSeq, dispatch]);

  const processAll = useCallback(async () => {
    if (!apiKey) { alert("Please enter your Anthropic API key."); return; }
    setProcessing(true);
    const pending = docs.filter(d => d.status !== "done");
    for (const doc of pending) {
      dispatch({ type:"UPDATE_DOC", payload:{ id:doc.id, status:"processing" } });
      try {
        const extracted = await extractDoc(doc, apiKey, state.selectedFY);
        dispatch({ type:"UPDATE_DOC", payload:{ id:doc.id, status:"done", extracted } });
      } catch(e) {
        dispatch({ type:"UPDATE_DOC", payload:{ id:doc.id, status:"error", extracted:{ error:e.message } } });
      }
    }
    setProcessing(false);
  }, [apiKey, docs, dispatch]);

  const hasDone = docs.some(d => d.status === "done" && d.extracted && !d.extracted.error);

  return (
    <div className="panel">
      <div className="vault-wrap">
        <div className="notice warn"><span>⛑</span><span>Do not upload documents containing TFN, full name, or bank account numbers. Use anonymised copies only.</span></div>
        <div className="notice info"><span>⛑</span><span>Upload PDFs or images. Claude will extract all ATO-relevant figures automatically.</span></div>
        <div className={`upload-zone${drag ? " drag" : ""}`}
          onClick={() => fileRef.current && fileRef.current.click()}
          onDragOver={e => { e.preventDefault(); setDrag(true); }}
          onDrop={e => { e.preventDefault(); setDrag(false); addFiles(e.dataTransfer.files); }}
          onDragLeave={() => setDrag(false)}>
          <input ref={fileRef} type="file" style={{ display:"none" }} multiple accept=".pdf,.png,.jpg,.jpeg,.xlsx,.xls,.csv"
            onChange={e => addFiles(e.target.files)} />
          <div className="uz-icon">⬆</div>
          <div className="uz-title">Drop files here or click to upload</div>
          <div className="uz-sub">PDF, PNG, JPG, XLSX, CSV - PAYG summaries, receipts, rental statements, brokerage reports, ESS statements, expense spreadsheets</div>
        </div>
        <div className="doc-types">
          {DOC_TYPES.map(dt => (
            <div key={dt.id} className="dtype-card">
              <span className="dtype-icon">{dt.icon}</span>
              <div className="dtype-name">{dt.name}</div>
              <div className="dtype-desc">{dt.desc}</div>
            </div>
          ))}
        </div>
        {docs.length > 0 && (
          <>
            <div className="vault-hdr">
              <div className="vault-hdr-title">Uploaded documents ({docs.length})</div>
              <button className="tbtn primary" onClick={processAll} disabled={processing || docs.every(d => d.status === "done")}>
                {processing ? <><Spinner />Extracting...</> : "Extract documents"}
              </button>
            </div>
            {docs.map(doc => {
              const dt = DOC_TYPES.find(d => d.id === doc.type) || DOC_TYPES[8];
              const statusLabel = { pending:"Pending", processing:"Extracting...", done:"Extracted", error:"Error" }[doc.status];
              return (
                <div key={doc.id} className="doc-item">
                  <div className="doc-item-icon" style={{ background:dt.bg }}>{dt.icon}</div>
                  <div className="doc-item-info">
                    <div className="doc-item-name">{doc.file.name}</div>
                    <div className="doc-item-meta">{dt.name} ? {(doc.file.size/1024).toFixed(0)} KB</div>
                  </div>
                  <select className="type-sel" value={doc.type}
                    onChange={e => dispatch({ type:"UPDATE_DOC", payload:{ id:doc.id, type:e.target.value } })}>
                    {DOC_TYPES.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                  </select>
                  {doc.status === "done" && doc.extracted && (() => {
                    try {
                      const ex = doc.extracted;
                      const dateToCheck = ex.periodEnd || ex.documentDate;
                      if (!dateToCheck) return null;
                      const selFY = state.selectedFY || DEFAULT_FY;
                      const { inPeriod, formatted } = checkInPeriod(dateToCheck, selFY);
                      const fyLbl = getFYLabel(selFY);
                      if (inPeriod === false) return (
                        <span className="doc-status error" title={`Date ${formatted} is outside FY${fyLbl}`}>? Out of period</span>
                      );
                      if (inPeriod === true) return (
                        <span className="doc-status done" title={`Date ${formatted} confirmed in FY${fyLbl}`}>? In period</span>
                      );
                      return null;
                    } catch(e) { return null; }
                  })()}
                  <span className={`doc-status ${doc.status}`}>{statusLabel}</span>
                  <span className="doc-remove" onClick={() => dispatch({ type:"REMOVE_DOC", payload:doc.id })}>✕</span>
                </div>
              );
            })}
          </>
        )}
        {hasDone && (
          <>
            <div className="cta-banner">
              <div style={{ fontSize:26, flexShrink:0 }}>✨</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:600, marginBottom:3 }}>Documents extracted - ready to draft</div>
                <div style={{ fontSize:11, color:"var(--muted)" }}>All documents have been extracted. Click to generate a complete FY{getFYLabel(state.selectedFY)} tax return draft.</div>
              </div>
              <button className="tbtn primary" style={{ flexShrink:0, padding:"8px 16px" }} onClick={onDraft}>? Draft tax return</button>
            </div>
            <div className="vault-hdr"><div className="vault-hdr-title">Extracted data</div></div>
            {docs.filter(d => d.status === "done" && d.extracted && !d.extracted.error).map(doc => {
              if (doc.type === "ess") return <EssCard key={doc.id} doc={doc} />;
              const ex = doc.extracted;
              const dt = DOC_TYPES.find(d => d.id === doc.type) || DOC_TYPES[8];
              return (
                <div key={doc.id} className="ext-panel">
                  <div className="ext-hdr">
                    <span>{dt.icon}</span>
                    <span style={{ flex:1 }}>{doc.file.name}</span>
                    <span style={{ fontSize:10, fontFamily:"Courier New", color:"var(--hint)" }}>{ex.docLabel||dt.name}</span>
                  </div>
                  <div className="ext-body">
                    <div className="field-grid">
                      {(ex.fields||[]).slice(0,8).map((f,i) => (
                        <div key={i}>
                          <div className="f-label">{f.ato_code ? f.ato_code+" - " : ""}{f.label}</div>
                          <div className="f-val">{f.value}</div>
                        </div>
                      ))}
                    </div>
                    {ex.notes && <div className="ext-notes">{ex.notes}</div>}
                  </div>
                </div>
              );
            })}
          </>
        )}
      </div>
    </div>
  );
}

// ?????????????????????????????????????????
//  TAX RETURN RENDERER
// ?????????????????????????????????????????
function TaxReturnRenderer({ content }) {
  // Normalise line endings - API may return \r\n (Windows) which breaks regex
  const text = (content || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  const fmtAmt = v => {
    const n = parseFloat(v);
    if (isNaN(n)) return v;
    const abs = Math.abs(n).toLocaleString("en-AU", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return n < 0 ? `-$${abs}` : `$${abs}`;
  };

  const parseSection = (src, marker) => {
    const tag = "##" + marker;
    const idx = src.indexOf(tag);
    if (idx === -1) return null;
    const afterTag = src.indexOf("\n", idx);
    if (afterTag === -1) return null;
    const body = src.slice(afterTag + 1);
    const nextSection = body.indexOf("\n##");
    const raw = nextSection === -1 ? body : body.slice(0, nextSection);
    return raw.trim() || null;
  };

  const parseRows = raw => raw ? raw.split("\n").filter(l => l.includes("|")).map(l => l.split("|").map(c => c.trim())) : [];

  const incomeRaw   = parseSection(text, "INCOME");
  const deductRaw   = parseSection(text, "DEDUCTIONS");
  const summaryRaw  = parseSection(text, "SUMMARY");
  const notesRaw    = parseSection(text, "NOTES");

  // If no structured sections found, fall back to plain text
  if (!incomeRaw && !summaryRaw) {
    return <div style={{ whiteSpace:"pre-wrap", fontSize:13, lineHeight:1.7 }}>{text}</div>;
  }

  const incomeRows  = parseRows(incomeRaw).filter(r => r[0] !== "ITEM");
  const deductRows  = parseRows(deductRaw).filter(r => r[0] !== "ITEM");
  const summaryRows = parseRows(summaryRaw).filter(r => r[0] !== "LABEL");

  const refundRow   = summaryRows.find(r => /refund|payable/i.test(r[0]));
  const isRefund    = refundRow && parseFloat((refundRow[1]||"").replace(/[^0-9.-]/g,"")) >= 0;

  const cellSt = { padding:"5px 10px", fontSize:11, borderBottom:"0.5px solid var(--border)", fontFamily:"'Courier New',monospace" };
  const hdrSt  = { ...cellSt, background:"var(--surface2)", fontWeight:700, fontFamily:"Georgia,serif", fontSize:11, letterSpacing:".3px" };
  const secHdr = { fontSize:10, fontFamily:"'Courier New',monospace", color:"var(--sb-section)", letterSpacing:".9px", textTransform:"uppercase",
                   padding:"10px 0 4px", borderTop:"1.5px solid var(--border-strong)", marginTop:8 };
  const tblSt  = { width:"100%", borderCollapse:"collapse", marginBottom:4 };

  const copyTSV = () => {
    const lines = [];
    lines.push("INCOME");
    lines.push("Item\tDescription\tSource\tAmount");
    incomeRows.forEach(r => lines.push(r.join("\t")));
    lines.push("");
    lines.push("DEDUCTIONS");
    lines.push("Item\tDescription\tNotes\tAmount");
    deductRows.forEach(r => lines.push(r.join("\t")));
    lines.push("");
    lines.push("SUMMARY");
    summaryRows.forEach(r => lines.push(r.join("\t")));
    if (notesRaw) { lines.push(""); lines.push("NOTES"); lines.push(notesRaw); }
    navigator.clipboard.writeText(lines.join("\n")).then(() => alert("Copied to clipboard - paste into Excel or Google Sheets"));
  };

  return (
    <div style={{ fontSize:12 }}>
      <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:6 }}>
        <button className="tbtn" style={{ fontSize:11 }} onClick={copyTSV}>? Copy to spreadsheet</button>
      </div>

      {/* INCOME */}
      <div style={secHdr}>Income</div>
      <table style={tblSt}>
        <thead><tr>
          {["Item","Description","Source","Amount"].map(h => <th key={h} style={{ ...hdrSt, textAlign: h==="Amount"?"right":"left" }}>{h}</th>)}
        </tr></thead>
        <tbody>
          {incomeRows.map((r, i) => (
            <tr key={i} style={{ background: i%2===0 ? "var(--surface)" : "var(--surface2)" }}>
              <td style={{ ...cellSt, color:"var(--accent)", fontWeight:600, width:70 }}>{r[0]||""}</td>
              <td style={{ ...cellSt }}>{r[1]||""}</td>
              <td style={{ ...cellSt, color:"var(--muted)" }}>{r[2]||""}</td>
              <td style={{ ...cellSt, textAlign:"right", fontWeight:600 }}>{fmtAmt(r[3]||"")}</td>
            </tr>
          ))}
        </tbody>
      </table>

      {/* DEDUCTIONS */}
      <div style={secHdr}>Deductions</div>
      <table style={tblSt}>
        <thead><tr>
          {["Item","Description","Notes","Amount"].map(h => <th key={h} style={{ ...hdrSt, textAlign: h==="Amount"?"right":"left" }}>{h}</th>)}
        </tr></thead>
        <tbody>
          {deductRows.length > 0 ? deductRows.map((r, i) => (
            <tr key={i} style={{ background: i%2===0 ? "var(--surface)" : "var(--surface2)" }}>
              <td style={{ ...cellSt, color:"var(--accent)", fontWeight:600, width:70 }}>{r[0]||""}</td>
              <td style={{ ...cellSt }}>{r[1]||""}</td>
              <td style={{ ...cellSt, color:"var(--muted)" }}>{r[2]||""}</td>
              <td style={{ ...cellSt, textAlign:"right", fontWeight:600 }}>{fmtAmt(r[3]||"")}</td>
            </tr>
          )) : <tr><td colSpan={4} style={{ ...cellSt, color:"var(--hint)", fontStyle:"italic" }}>No deductions identified</td></tr>}
        </tbody>
      </table>

      {/* SUMMARY */}
      <div style={secHdr}>Summary</div>
      <table style={tblSt}>
        <tbody>
          {summaryRows.map((r, i) => {
            const isResult = /refund|payable/i.test(r[0]);
            const val = parseFloat((r[1]||"").replace(/[^0-9.-]/g,""));
            // Payable = negative (tax owed), Refund = positive - derive label from sign
            const isPayable = isResult && val < 0;
            const isRefund  = isResult && val >= 0;
            const color = isResult ? (isRefund ? "var(--accent)" : "var(--danger)") : "inherit";
            const displayLabel = isResult
              ? (isPayable ? "Est. amount payable" : "Est. refund")
              : (r[0]||"");
            const displayVal = isResult
              ? (isPayable ? fmtAmt(Math.abs(val)) : fmtAmt(val))
              : fmtAmt(r[1]||"");
            return (
              <tr key={i} style={{ background: isResult ? "var(--surface2)" : i%2===0 ? "var(--surface)" : "transparent",
                                   borderTop: isResult ? "1.5px solid var(--border-strong)" : "none" }}>
                <td style={{ ...cellSt, fontWeight: isResult ? 700 : 400 }}>{displayLabel}</td>
                <td style={{ ...cellSt, textAlign:"right", fontWeight: isResult ? 700 : 600, color }}>{displayVal}</td>
              </tr>
            );
          })}
        </tbody>
      </table>

      {/* NOTES */}
      {notesRaw && (
        <>
          <div style={secHdr}>Notes &amp; Considerations</div>
          <ul style={{ margin:0, padding:"6px 0 6px 0", listStyle:"none" }}>
            {(() => {
              // Split on newlines first, then break any remaining long single-line notes on sentence boundaries
              const lines = notesRaw.split("\n").filter(l => l.trim());
              const bullets = lines.length > 1
                ? lines
                : notesRaw.replace(/\.\s+(?=[A-Z])/g, ".\n").split("\n").filter(l => l.trim());
              return bullets.map((note, i) => (
                <li key={i} style={{ display:"flex", gap:8, padding:"5px 0", fontSize:12, lineHeight:1.7, color:"var(--muted)", borderBottom:"0.5px solid var(--border)" }}>
                  <span style={{ color:"var(--warn)", flexShrink:0, fontSize:11, marginTop:3 }}>⛑</span>
                  <span>{note.replace(/^[-?*????]\s*/, "").trim()}</span>
                </li>
              ));
            })()}
          </ul>
        </>
      )}
    </div>
  );
}

RATES FY${fyLabel}: ${bracketStr}
Medicare ${fyCfg.medicareRate*100}%. Family lower=${fyCfg.medicareFamilyBase}+(${fyCfg.medicareFamilyPerChild}?deps).
PHI clawback tiers(s/f):${phiStr} rates:${fyCfg.phiRates.join("/")} clawback=rebate?(1-entitled/${fyCfg.phiRates[0]}).
LITO up to $${fyCfg.litoMax} phases $${fyCfg.litoPhase1[0]}-$${fyCfg.litoPhase2[1]}. LMITO:${lmitoStr}.
${fyCfg.notes}
ESS TREATMENT:
- Box F?Item 12 ordinary income s.83A-110. NO CGT discount on the discount itself.
- SALE rows (soldWithin30Days): taxing point = sale date, assessable = sale proceeds minus costs.
- VEST rows (held shares): assessable = market value at vesting. Cost base for future CGT = this assessed amount.
- Box D?apply $1,000 concession per employer (s.83A-35). Box C?offsets tax payable.
- Flag in ##NOTES: number of held shares, their cost bases, and CGT implications on future disposal.
RULES:
- Exclude docs marked NO-EXCLUDE from deductions.
- List each employer as separate Item 1 row.
- Flag PAYG variation if ESS>$50k and withheld<70% gross tax.
- INCOME PROTECTION: IBenefit(assessable-income) ? include as Item 20 assessable income. IPremium(D15-deduction) ? include as D15 deduction ONLY ONCE. Never count the same IP amount as both a general Deduction AND an IPremium - use IPremium field only.
- USE PRE-COMPUTED TOTALS: the PRE-COMPUTED TOTALS block contains exact figures already calculated. Use these directly in ##SUMMARY - do not recalculate from raw document figures as this causes errors. The documents section is for context only; the computed totals are authoritative.
OUTPUT - exactly these markers on their own lines, pipe-delimited, no $ in amounts:
##INCOME
ITEM|DESCRIPTION|SOURCE|AMOUNT
##DEDUCTIONS
ITEM|DESCRIPTION|NOTES|AMOUNT
##SUMMARY
LABEL|AMOUNT
Rows:Total income|Total deductions|Taxable income|Gross tax|LITO|LMITO|Medicare levy|PHI clawback|Total withheld|Est. refund / payable
SIGN RULES: deductions=negative, tax payable=negative, refund=positive, withheld=positive. Est. refund/payable = totalWithheld - netTax. If result is negative it is PAYABLE (output as negative number). If positive it is a REFUND.
##NOTES
One note per line.`;
    try {
      const msgs = [...drafterMessages, { role:"user", content:clean }];
      const reply = await callClaude(apiKey, { system, messages:msgs, maxTokens:2000 });
      dispatch({ type:"ADD_DRAFTER_MSG", payload:{ role:"assistant", content:reply } });
    } catch(e) {
      dispatch({ type:"ADD_DRAFTER_MSG", payload:{ role:"assistant", content:"Error: "+e.message } });
    }
    setLoading(false);
  }, [apiKey, drafterMessages, docs, chatMessages, dispatch]);

  return (
    <div className="panel">
      <div className="chat-wrap">
        {drafterMessages.length === 0 && (
          <div className="msg">
            <div className="msg-role">System</div>
            <div className="msg-body assistant">ITR Preparation vault loaded. Use the quick actions below or type your own question.</div>
          </div>
        )}
        {drafterMessages.map((m, i) => (
          <div key={i} className="msg">
            <div className="msg-role">{m.role}</div>
            <div className={`msg-body ${m.role}`}>
              {m.role === "assistant" ? <TaxReturnRenderer content={m.content} /> : m.content}
            </div>
          </div>
        ))}
        {loading && (
          <div className="msg">
            <div className="msg-role">assistant</div>
            <div className="msg-body assistant loading"><Spinner />Drafting...</div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div className="chips-row">
        {DRAFTER_CHIPS.map((c, i) => (
          <span key={i} className={`chip${c.primary ? " primary-chip" : ""}`} onClick={() => send(typeof c.prompt === 'function' ? c.prompt(state.selectedFY) : c.prompt)}>{c.label}</span>
        ))}
        {drafterMessages.some(m => m.role === "assistant") && (
          <>
            <span className="chip" style={{ background:"#1a3a5c", color:"#fff", borderColor:"#1a3a5c" }}
              onClick={() => {
                const ref = prompt("Client name for letter and estimate:", "Client");
                if (ref !== null) generateClientLetter(state, ref);
              }}>
              📄 Generate client letter + estimate
            </span>
            <span className="chip" style={{ background:"#2d7a3a", color:"#fff", borderColor:"#2d7a3a" }}
              onClick={() => triggerOutputGeneration(state, dispatch)}>
              ⚡ Generate all 6 outputs
            </span>
          </>
        )}
      </div>
      <div className="chat-input-row">
        <textarea className="chat-input" rows={1} placeholder="Ask anything about this return..."
          value={input}
          onChange={e => { setInput(e.target.value); e.target.style.height="auto"; e.target.style.height=Math.min(e.target.scrollHeight,110)+"px"; }}
          onKeyDown={e => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); send(input); } }}
        />
        <button className="tbtn primary" onClick={() => send(input)} disabled={loading}>Send ?</button>
      </div>
    </div>
  );
}

// ?????????????????????????????????????????
function ArchiveModal({ state, dispatch }) {
  const [clientName, setClientName] = useState("");
  const inputRef = useRef(null);
  const hasData = state.chatMessages.length || state.drafterMessages.length || state.docs.length;

  useEffect(() => {
    if (state.showArchiveModal) {
      setClientName("");
      setTimeout(() => inputRef.current && inputRef.current.focus(), 80);
    }
  }, [state.showArchiveModal]);

  if (!state.showArchiveModal) return null;

  const confirm = () => {
    const name = clientName.trim() || ("Client-" + new Date().toLocaleDateString("en-AU").replace(/\//g, "-"));
    const safeName = name.replace(/[^a-zA-Z0-9_\-\s]/g, "").trim().replace(/\s+/g, "_");
    const fyTag = state.selectedFY.replace("-","");
    const filename = `AusTax_${safeName}_FY${fyTag}.txt`;
    dispatch({ type:"HIDE_ARCHIVE_MODAL" });
    if (hasData) {
      downloadText(filename, buildArchiveText(name, state));
      dispatch({ type:"ARCHIVE_CLIENT", payload:{ name, safeName, filename, ts:new Date().toLocaleString("en-AU") } });
      setTimeout(() => dispatch({ type:"RESET_SESSION" }), 400);
    } else {
      dispatch({ type:"RESET_SESSION" });
    }
  };

  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) dispatch({ type:"HIDE_ARCHIVE_MODAL" }); }}>
      <div className="modal">
        <div className="modal-title">? Archive current client & start fresh</div>
        <div className="modal-sub">
          {hasData
            ? <span>The session will be downloaded as <strong>AusTax_[ClientName]_FY2425.txt</strong>. All data will then be cleared.</span>
            : "No active session data - confirm to reset the screen for a new client."}
        </div>
        {hasData && (
          <div className="modal-info">
            ? What gets saved:<br />
            ? Full interview transcript<br />
            ? All ITR Preparation extracted document data<br />
            ? Return drafter conversation<br />
            ? Running summary & flagged risks
          </div>
        )}
        <div className="modal-label">Client name or reference</div>
        <input ref={inputRef} className="modal-input" placeholder="e.g. Smith J - FY2425"
          maxLength={60} value={clientName}
          onChange={e => setClientName(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") confirm(); }} />
        <div className="modal-actions">
          <button className="tbtn" onClick={() => dispatch({ type:"HIDE_ARCHIVE_MODAL" })}>Cancel</button>
          <button className="tbtn primary" onClick={confirm}>
            {hasData ? "📥 Save & clear session" : "? Clear & start fresh"}
          </button>
        </div>
      </div>
    </div>
  );
}

//  TAXATION ESTIMATE HTML BUILDER
//  Generates the human-readable appendix pages that match the MGB-style
//  taxation estimate + deductions schedule format.
//  Called by generateClientLetter (as token) and standalone preview.
// ?????????????????????????????????????????
function buildTaxEstimateHTML(state, clientName) {
  const t = computeTotals(state.docs, state.clientProfile, state.selectedFY);
  const fyCfg = getFYConfig(state.selectedFY || DEFAULT_FY);
  const fyLabel = getFYLabel(state.selectedFY || DEFAULT_FY);
  const returnYear = String(fyCfg.endYear);
  const today = new Date();
  const pad = n => String(n).padStart(2,"0");
  const ordinal = d => { const s=["th","st","nd","rd"]; const v=d%100; return d+(s[(v-20)%10]||s[v]||s[0]); };
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const dateStr = `${ordinal(today.getDate())} ${months[today.getMonth()]} ${today.getFullYear()}`;

  const fmtA = v => v > 0
    ? v.toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:2})
    : "";
  const fmtAZ = v => v >= 0
    ? v.toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:2})
    : "(" + Math.abs(v).toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:2}) + ")";

  // Work out per-employer lines for income schedule
  const done = state.docs.filter(d => d.status==="done" && d.extracted && !d.extracted.error);
  const paygDocs  = done.filter(d => d.type==="payg");
  const essDocs   = done.filter(d => d.type==="ess");
  const rentalDocs= done.filter(d => d.type==="rental");
  const insurDocs = done.filter(d => d.type==="insurance");

  // Income lines
  const incomeLines = [];
  paygDocs.forEach(d => {
    const ex = d.extracted;
    const emp = (ex.fields||[]).find(f=>/employer/i.test(f.label));
    const empName = emp ? emp.value : "Employer";
    incomeLines.push({ label:`Item 1 - Salary / wages (${empName})`, debit:"", credit: fmtA(parseVal(ex.income)) });
    if (parseVal(ex.taxWithheld) > 0)
      incomeLines.push({ label:`  PAYG withholding - ${empName}`, debit:"", credit: fmtA(parseVal(ex.taxWithheld)), indent: true, credit_label: "credit" });
  });
  if (t.essBoxF + t.essBoxD + t.essBoxE > 0) {
    const essNet = t.essBoxF + Math.max(0, t.essBoxD - t.essBoxDConcession) + t.essBoxE;
    incomeLines.push({ label:"Item 12 - Employee share scheme (assessable discount)", debit:"", credit: fmtA(essNet) });
    if (t.essTaxWH > 0)
      incomeLines.push({ label:"  ESS Box C - TFN amounts withheld", debit:"", credit: fmtA(t.essTaxWH), indent: true, credit_label: "credit" });
  }
  if (t.rentalIncome > 0)
    incomeLines.push({ label:`Item 15 - Gross rental income`, debit:"", credit: fmtA(t.rentalIncome) });
  if (t.capitalGains > 0)
    incomeLines.push({ label:"Item 18 - Capital gains", debit:"", credit: fmtA(t.capitalGains) });
  if (t.ipBenefit > 0)
    incomeLines.push({ label:"Item 20 - Income protection benefit", debit:"", credit: fmtA(t.ipBenefit) });

  // Deduction lines - gather from extracted docs
  const deductLines = [];
  done.filter(d=>d.type!=="ess").forEach(d => {
    const ex = d.extracted;
    (ex.fields||[]).filter(f=>f.ato_code && /^D/i.test(f.ato_code) && parseVal(f.value)>0).forEach(f => {
      deductLines.push({ code: f.ato_code, label: f.label, value: parseVal(f.value) });
    });
  });
  if (t.ipPremium > 0)
    deductLines.push({ code:"D15", label:"Income protection insurance premium", value: t.ipPremium });
  if (t.rentalExp > 0)
    deductLines.push({ code:"Rental", label:"Rental property expenses", value: t.rentalExp });

  // Build estimate rows (Debits / Credits two-column format matching MGB)
  const estRows = [
    { label: `Your taxable income is $${t.taxableIncome.toLocaleString("en-AU")}`, bold: true, header: true },
    { label: "Tax on your taxable or net income",     debit: fmtA(t.grossTax),   credit: "" },
    { label: "Assessed tax payable",                  debit: fmtA(t.grossTax),   credit: "", bold: true },
    { label: "Less: Low income tax offset (LITO)",    debit: fmtA(t.lito),       credit: "" },
    ...(t.lmito > 0 ? [{ label:"Less: Low & middle income tax offset (LMITO)", debit: fmtA(t.lmito), credit:"" }] : []),
    { label: "Plus other liabilities",                debit: "",                  credit: "", section: true },
    { label: "Medicare levy",                         debit: fmtA(t.medicare),   credit: "" },
    ...(t.phiClawback > 0 ? [{ label:"Private health insurance rebate reduction", debit: fmtA(t.phiClawback), credit:"" }] : []),
    { label: "PAYG credits and other entitlements",   debit: "",                  credit: fmtA(t.totalTaxWH), bold: true },
    { label: "", separator: true },
    {
      label: t.refund >= 0 ? "Result of this Estimate - Refund" : "Result of this Estimate - Tax Payable",
      debit:  t.refund < 0  ? fmtA(Math.abs(t.refund)) : "",
      credit: t.refund >= 0 ? fmtA(t.refund)           : "",
      bold: true, result: true,
    },
  ];

  // ?? Shared print styles ??
  const printStyles = `

    .income-table tfoot td{font-weight:700;border-top:1.5px solid #999;border-bottom:2px solid #1a1a1a;}
    .footer-note{margin-top:24px;padding:10px 14px;background:#f5f7f5;border:0.5px solid #ccc;border-radius:4px;font-size:9pt;color:#555;line-height:1.6;}
    .disclaimer{margin-top:20px;font-size:8.5pt;color:#888;line-height:1.6;border-top:0.5px solid #ddd;padding-top:12px;}
    .print-btn{display:block;margin:0 auto 24px;padding:10px 28px;font-size:12pt;background:#2d7a3a;color:#fff;border:none;border-radius:5px;cursor:pointer;}
  `;

  // ?? Page 1: Taxation Estimate ??
  const estimatePage = `
  <div class="page">
    <div class="firm-header">
      <div>
        <div class="firm-name">${FIRM_CONFIG.name}</div>
        <div class="firm-tagline">${FIRM_CONFIG.tagline}</div>
      </div>
      <div class="firm-contact">
        <div>${FIRM_CONFIG.address}, ${FIRM_CONFIG.suburb} ${FIRM_CONFIG.statePc}</div>
        <div>Phone: <strong>${FIRM_CONFIG.phone}</strong></div>
        <div>Email: <strong>${FIRM_CONFIG.email}</strong></div>
        <div>ABN: ${FIRM_CONFIG.abn}</div>
      </div>
    </div>

    <div class="doc-title">Taxation Estimate</div>
    <div class="doc-subtitle">For the year ended 30 June ${returnYear}</div>

    <div class="meta-grid">
      <div class="meta-row"><span class="meta-label">Client name:</span><span class="meta-value">${clientName.toUpperCase()}</span></div>
      <div class="meta-row"><span class="meta-label">Date prepared:</span><span class="meta-value">${dateStr}</span></div>
      <div class="meta-row"><span class="meta-label">Financial year:</span><span class="meta-value">FY ${fyLabel}</span></div>
      <div class="meta-row"><span class="meta-label">Prepared by:</span><span class="meta-value">${FIRM_CONFIG.signerName}, ${FIRM_CONFIG.signerTitle}</span></div>
    </div>

    <table class="est-table">
      <thead>
        <tr>
          <td class="desc">Description</td>
          <td class="debit">Debits $</td>
          <td class="credit">Credits $</td>
        </tr>
      </thead>
      <tbody>
        ${estRows.map(row => {
          if (row.separator) return `<tr class="separator"><td colspan="3"></td></tr>`;
          if (row.header)    return `<tr class="header-row"><td colspan="3" class="desc">${row.label}</td></tr>`;
          if (row.section)   return `<tr class="section-hdr"><td colspan="3" class="desc">${row.label}</td></tr>`;
          return `<tr class="${row.result?"result":row.bold?"bold":""}">
            <td class="desc">${row.label}</td>
            <td class="debit">${row.debit||""}</td>
            <td class="credit">${row.credit||""}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>

    <div class="credits-note">
      <strong>PAYG Credits and other entitlements included $${fmtAZ(t.totalTaxWH)}</strong><br/>
      Pay as you go (PAYG) withholding (deducted by your employer): $${fmtA(t.taxWithheld)}
      ${t.essTaxWH > 0 ? `<br/>ESS TFN amounts withheld (Box C): $${fmtA(t.essTaxWH)}` : ""}
    </div>

    <div class="footer-note">
      Please note that this is our estimate of your assessment which may be subject to Tax Office adjustment for
      HECS-HELP, spouse's FTB overpayment, or exceeding your concessional or non-concessional superannuation
      contributions cap (if applicable). A Notice of Assessment from the Australian Taxation Office will be
      forwarded to you at a later date.
    </div>
  </div>`;

  // ?? Page 2: Income Schedule ??
  const incomePage = incomeLines.length > 0 ? `
  <div class="page page-break">
    <div class="firm-header">
      <div><div class="firm-name">${FIRM_CONFIG.name}</div><div class="firm-tagline">${FIRM_CONFIG.tagline}</div></div>
      <div class="firm-contact">
        <div>${FIRM_CONFIG.address}, ${FIRM_CONFIG.suburb} ${FIRM_CONFIG.statePc}</div>
        <div>Phone: <strong>${FIRM_CONFIG.phone}</strong></div>
      </div>
    </div>

    <div class="doc-title">Income Schedule</div>
    <div class="doc-subtitle">For the year ended 30 June ${returnYear} - ${clientName.toUpperCase()}</div>

    <div class="section-title">Income Items</div>
    <table class="income-table">
      <thead><tr>
        <td class="label" style="font-weight:700;font-size:9.5pt;color:#555;text-transform:uppercase;letter-spacing:.3px;border-bottom:1.5px solid #999;">Description</td>
        <td class="credit-col" style="font-weight:700;font-size:9.5pt;color:#555;text-transform:uppercase;letter-spacing:.3px;border-bottom:1.5px solid #999;">Amount $</td>
      </tr></thead>
      <tbody>
        ${incomeLines.map(r => `
        <tr>
          <td class="label${r.indent?" indent":""}">${r.label}</td>
          <td class="credit-col">${r.credit||""}</td>
        </tr>`).join("")}
      </tbody>
      <tfoot>
        <tr>
          <td class="label" style="font-weight:700;">Total assessable income</td>
          <td class="credit-col" style="font-weight:700;">${fmtA(t.totalIncome)}</td>
        </tr>
        <tr>
          <td class="label" style="font-weight:700;">Total deductions</td>
          <td class="credit-col" style="font-weight:700;">(${fmtA(t.deductions + t.ipPremium)})</td>
        </tr>
        <tr>
          <td class="label" style="font-weight:700;font-size:11pt;color:#1a5225;">Taxable income</td>
          <td class="credit-col" style="font-weight:700;font-size:11pt;color:#1a5225;">${fmtA(t.taxableIncome)}</td>
        </tr>
      </tfoot>
    </table>
  </div>` : "";

  // ?? Page 3: Deductions Schedule ??
  const deductPage = deductLines.length > 0 ? `
  <div class="page page-break">
    <div class="firm-header">
      <div><div class="firm-name">${FIRM_CONFIG.name}</div><div class="firm-tagline">${FIRM_CONFIG.tagline}</div></div>
      <div class="firm-contact">
        <div>${FIRM_CONFIG.address}, ${FIRM_CONFIG.suburb} ${FIRM_CONFIG.statePc}</div>
        <div>Phone: <strong>${FIRM_CONFIG.phone}</strong></div>
      </div>
    </div>

    <div class="doc-title">Deductions Schedule</div>
    <div class="doc-subtitle">For the year ended 30 June ${returnYear} - ${clientName.toUpperCase()}</div>

    <div class="section-title">Claimed Deductions</div>
    <table class="deduct-table">
      <thead><tr>
        <td class="code" style="font-size:9pt;color:#555;text-transform:uppercase;letter-spacing:.3px;border-bottom:1.5px solid #999;">Code</td>
        <td class="desc" style="font-weight:700;font-size:9.5pt;color:#555;text-transform:uppercase;letter-spacing:.3px;border-bottom:1.5px solid #999;">Description</td>
        <td class="amt" style="font-weight:700;font-size:9.5pt;color:#555;text-transform:uppercase;letter-spacing:.3px;border-bottom:1.5px solid #999;">Amount $</td>
      </tr></thead>
      <tbody>
        ${deductLines.map(r => `
        <tr>
          <td class="code">${r.code}</td>
          <td class="desc">${r.label}</td>
          <td class="amt">${fmtA(r.value)}</td>
        </tr>`).join("")}
      </tbody>
      <tfoot>
        <tr>
          <td class="code"></td>
          <td class="desc">Total deductions</td>
          <td class="amt">${fmtA(t.deductions + t.ipPremium)}</td>
        </tr>
      </tfoot>
    </table>

    <div class="disclaimer">
      Entitlement to certain tax deductions claimed is dependent upon the taxpayer having retained specific
      records which substantiate the expenditure. Whilst we have exercised due care and skill in preparing
      this estimate, relevant provisions of the Income Tax Assessment Act place the responsibility for the
      contents of the return with the taxpayer and provide penalties for inaccurate or inadequate disclosure.
    </div>
  </div>` : "";

  return { estimatePage, incomePage, deductPage, printStyles };
}

function openEstimatePreview(state, clientRef) {

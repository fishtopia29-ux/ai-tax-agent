                    onMouseEnter={e => { if(!isSelected) e.currentTarget.style.background="var(--surface2)"; }}
                    onMouseLeave={e => { if(!isSelected) e.currentTarget.style.background="transparent"; }}>
                    <input type="checkbox" checked={isSelected} onChange={() => toggleFile(item)}
                      onClick={e => e.stopPropagation()} style={{ flexShrink:0 }} />
                    <span style={{ fontSize:14, flexShrink:0 }}>📄</span>
                    <span style={{ flex:1 }}>{item.name}</span>
                    <span style={{
                      fontSize:10, fontFamily:"Courier New", color:"var(--hint)",
                      background:"var(--surface2)", padding:"2px 6px", borderRadius:4
                    }}>{ext}</span>
                    <span style={{ fontSize:11, color:"var(--hint)", minWidth:55, textAlign:"right" }}>{sizeKb}</span>
                  </div>
                );
              })}
              {folders.length === 0 && files.length === 0 && (
                <div style={{ padding:24, color:"var(--hint)", fontSize:13, textAlign:"center" }}>
                  No supported files in this folder (PDF, PNG, JPG, XLSX, CSV)
                </div>
              )}
            </>
          )}
        </div>

        {/* Footer */}
        <div style={{
          display:"flex", alignItems:"center", gap:10, padding:"12px 16px",
          borderTop:"0.5px solid var(--border)", flexShrink:0
        }}>
          <span style={{ flex:1, fontSize:12, color:"var(--muted)" }}>
            {selectedCount > 0 ? selectedCount + " file" + (selectedCount > 1 ? "s" : "") + " selected" : "Click files to select them"}
          </span>
          <button className="tbtn" onClick={onClose}>Cancel</button>
          <button className="tbtn primary"
            disabled={selectedCount === 0 || downloading}
            onClick={handleImport}>
            {downloading ? <><Spinner />Importing...</> : "Import " + (selectedCount > 0 ? selectedCount + " file" + (selectedCount > 1 ? "s" : "") : "")}
          </button>
        </div>
      </div>
    </div>
  );
}

// ?????????????????????????????????????????
//  SHAREPOINT SAVER MODAL
//  Saves the 6 approved artefacts to a customer folder in SharePoint.
//  Reuses all existing MSAL auth and Graph browse helpers — only adds upload.
// ?????????????????????????????????????????
function SharePointSaver({ state, outputsState, onClose }) {
  const [status, setStatus]         = useState("idle");
  const [error, setError]           = useState(null);
  const [token, setToken]           = useState(null);
  const [driveId, setDriveId]       = useState(null);
  const [breadcrumb, setBreadcrumb] = useState([{ id:"root", name:"Documents" }]);
  const [items, setItems]           = useState([]);
  const [targetFolder, setTargetFolder] = useState(null);
  const [uploading, setUploading]   = useState(false);
  const [uploadLog, setUploadLog]   = useState([]);
  const [showNewFolder, setShowNewFolder] = useState(false);
  const [newFolderName, setNewFolderName] = useState("");
  const [creatingFolder, setCreatingFolder] = useState(false);

  const clientRef = outputsState.clientRef || "Client";
  const fy = state.selectedFY || DEFAULT_FY;

  // Sign in and load root on mount
  useEffect(function() {
    (async function() {
      try {
        setStatus("loading");
        const t = await getSharePointToken();
        setToken(t);
        const { driveId: dId } = await getSharePointDriveId(t);
        setDriveId(dId);
        const rootItems = await listFolder(t, dId, "root");
        setItems(rootItems);
        setStatus("browsing");
      } catch(e) {
        setError(e.message);
        setStatus("error");
      }
    })();
  }, []);

  async function openFolder(item) {
    try {
      setStatus("loading");
      const children = await listFolder(token, driveId, item.id);
      setItems(children);
      setBreadcrumb(function(prev){ return [...prev, { id: item.id, name: item.name }]; });
      setTargetFolder(item);
      setStatus("browsing");
    } catch(e) { setError(e.message); setStatus("error"); }
  }

  async function navigateCrumb(crumb, idx) {
    try {
      setStatus("loading");
      const children = await listFolder(token, driveId, crumb.id);
      setItems(children);
      setBreadcrumb(function(prev){ return prev.slice(0, idx + 1); });
      setTargetFolder(idx === 0 ? null : { id: crumb.id, name: crumb.name });
      setStatus("browsing");
    } catch(e) { setError(e.message); setStatus("error"); }
  }

  // Build all 6 artefacts as { name, blob, label } objects
  function buildArtefacts() {
    const wp = outputsState.wpData;
    const safeRef = (clientRef || "Client").replace(/[\\/:"*?<>|]/g, "_");
    const artefacts = [];

    // 1. Client Letter — generate a self-contained HTML summary
    //    (Full letter requires letter-template.html on the server; this is a portable summary version)
    const t = wp ? wp.totals : {};
    const fmt = function(v){ return v > 0 ? fmtAUD(v) : "—"; };
    const letterHtml = [
      "<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'>",
      "<title>Client Letter — " + safeRef + " FY" + getFYLabel(fy) + "</title>",
      "<style>body{font-family:Georgia,serif;max-width:720px;margin:40px auto;color:#1a1a18;font-size:14px;line-height:1.7}",
      "h2{color:#2d7a3a}table{width:100%;border-collapse:collapse;margin:16px 0}",
      "th{background:#eef2ee;padding:7px 12px;text-align:left;font-size:12px}",
      "td{padding:7px 12px;border-bottom:0.5px solid #ddd;font-size:13px}",
      ".ref{font-family:'Courier New',monospace;font-size:11px;color:#666}",
      ".pos{color:#2d7a3a;font-weight:600}.neg{color:#993c1d;font-weight:600}</style></head><body>",
      "<h2>" + FIRM_CONFIG.name + " — FY" + getFYLabel(fy) + " Tax Return</h2>",
      "<p><strong>Client:</strong> " + safeRef + " &nbsp;|&nbsp; <strong>Prepared:</strong> " + new Date().toLocaleDateString("en-AU") + "</p>",
      "<h3>Return Summary</h3><table>",
      "<tr><th>Item</th><th>Amount</th></tr>",
      "<tr><td>Total assessable income</td><td class='pos'>" + fmt(t.totalIncome) + "</td></tr>",
      "<tr><td>Total deductions</td><td class='neg'>-" + fmt(t.deductions + (t.ipPremium || 0)) + "</td></tr>",
      "<tr><td><strong>Taxable income</strong></td><td><strong>" + fmt(t.taxableIncome) + "</strong></td></tr>",
      "<tr><td>Gross tax</td><td class='neg'>-" + fmt(t.grossTax) + "</td></tr>",
      "<tr><td>LITO</td><td class='pos'>+" + fmt(t.lito) + "</td></tr>",
      t.lmito > 0 ? "<tr><td>LMITO</td><td class='pos'>+" + fmt(t.lmito) + "</td></tr>" : "",
      "<tr><td>Medicare levy</td><td class='neg'>-" + fmt(t.medicare) + "</td></tr>",
      t.phiClawback > 0 ? "<tr><td>PHI rebate clawback</td><td class='neg'>-" + fmt(t.phiClawback) + "</td></tr>" : "",
      "<tr><td>Total tax withheld</td><td class='pos'>+" + fmt(t.totalTaxWH) + "</td></tr>",
      "<tr><td><strong>" + (t.refund >= 0 ? "Estimated refund" : "Amount payable") + "</strong></td>",
      "<td><strong class='" + (t.refund >= 0 ? "pos" : "neg") + "'>" + fmtAUD(Math.abs(t.refund || 0)) + "</strong></td></tr>",
      "</table>",
      "<p class='ref'>Prepared by " + FIRM_CONFIG.name + " · " + FIRM_CONFIG.email + " · ABN " + FIRM_CONFIG.abn + "</p>",
      "<p class='ref'>This document was generated by GREENGRAPH AI Tax Agent and requires review by a registered tax agent before lodgement.</p>",
      "</body></html>",
    ].join("");
    artefacts.push({
      name: safeRef + "_FY" + getFYLabel(fy) + "_ClientLetter.html",
      blob: new Blob([letterHtml], { type: "text/html" }),
      label: "Client Letter",
    });

    // 2. Xero JSON
    artefacts.push({
      name: safeRef + "_FY" + getFYLabel(fy) + "_Xero.json",
      blob: new Blob([JSON.stringify(outputsState.xeroData || {}, null, 2)], { type: "application/json" }),
      label: "Xero JSON",
    });

    // 3. ATO Form Summary — plain text
    const formLines = [
      "GREENGRAPH AI Tax Agent — ATO Return Summary",
      "Client: " + safeRef + "  |  FY: " + getFYLabel(fy) + "  |  Generated: " + new Date().toLocaleString("en-AU"),
      "",
      "INCOME",
      "  Total assessable income:    " + fmt(t.totalIncome),
      "  PAYG salary / wages:        " + fmt(t.paygIncome),
      "  ESS income (Item 12):       " + fmt(t.essBoxF + (t.essBoxD || 0) + (t.essBoxE || 0)),
      "  Rental income:              " + fmt(t.rentalIncome),
      "  Capital gains:              " + fmt(t.capitalGains),
      "",
      "DEDUCTIONS",
      "  Work-related deductions:    " + fmt(t.deductions),
      "  Income protection (D15):    " + fmt(t.ipPremium),
      "  Rental expenses:            " + fmt(t.rentalExp),
      "",
      "TAX CALCULATION",
      "  Taxable income:             " + fmt(t.taxableIncome),
      "  Gross income tax:           " + fmt(t.grossTax),
      "  LITO:                       " + fmt(t.lito),
      "  LMITO:                      " + fmt(t.lmito || 0),
      "  Medicare levy:              " + fmt(t.medicare),
      "  PHI rebate clawback:        " + fmt(t.phiClawback || 0),
      "  Net tax payable:            " + fmt(t.netTax),
      "  Total withheld:             " + fmt(t.totalTaxWH),
      "  " + (t.refund >= 0 ? "ESTIMATED REFUND:           " : "AMOUNT PAYABLE:             ") + fmtAUD(Math.abs(t.refund || 0)),
      "",
      "Prepared by " + FIRM_CONFIG.name + " · " + FIRM_CONFIG.email,
      "This document requires review by a registered tax agent before lodgement.",
    ].join("\n");
    artefacts.push({
      name: safeRef + "_FY" + getFYLabel(fy) + "_ATOForm.txt",
      blob: new Blob([formLines], { type: "text/plain" }),
      label: "ATO Form",
    });

    // 4. XLSX workbook — rebuilt from outputsState data using SheetJS
    try {
      const wb = XLSX.utils.book_new();
      const fyLabel = getFYLabel(fy);
      const now = new Date().toLocaleString("en-AU");
      const tbl = wp ? wp.totals : {};

      // Sheet 1 — ITR Workpaper
      const wpRows = [
        ["GREENGRAPH Tax Agent - ITR Workpaper", "Client: " + safeRef, "FY: " + fyLabel, "Generated: " + now], [],
        ["Section","ATO Code","Description","Sub-label","Amount ($)","Status","Source"],
      ];
      (wp && wp.sections || []).forEach(function(sec) {
        sec.rows.forEach(function(r) {
          wpRows.push([sec.title, r.code, r.label, r.sublabel||"", r.isText ? r.value : (r.value||""), r.status, r.src||""]);
        });
      });
      wpRows.push([],["KEY TOTALS"],
        ["Taxable Income", tbl.taxableIncome || 0],
        ["Net Tax Payable", tbl.netTax || 0],
        ["Total Withheld", tbl.totalTaxWH || 0],
        ["Est. Refund / (Payable)", tbl.refund || 0]);
      const ws1 = XLSX.utils.aoa_to_sheet(wpRows);
      ws1["!cols"] = [{wch:24},{wch:10},{wch:40},{wch:38},{wch:14},{wch:10},{wch:20}];
      XLSX.utils.book_append_sheet(wb, ws1, "ITR Workpaper");

      // Sheet 2 — Tax Calculation
      const calcRows = [["Tax Calculation Detail","FY " + fyLabel,"Client: " + safeRef],[],["Item","Amount ($)"],
        ["Total assessable income", tbl.totalIncome || 0],
        ["Total deductions", -((tbl.deductions || 0) + (tbl.ipPremium || 0))],
        ["Taxable income", tbl.taxableIncome || 0],[],
        ["Gross income tax", -(tbl.grossTax || 0)],
        ["LITO", tbl.lito || 0],
        ["LMITO", tbl.lmito || 0],
        ["Medicare levy", -(tbl.medicare || 0)],
        ["PHI clawback", -(tbl.phiClawback || 0)],
        ["Net tax payable", -(tbl.netTax || 0)],[],
        ["PAYG withheld", tbl.taxWithheld || 0],
        ["ESS Box C withheld", tbl.essTaxWH || 0],
        ["Total credits", tbl.totalTaxWH || 0],
        ["Estimated refund / (payable)", tbl.refund || 0]];
      const ws2 = XLSX.utils.aoa_to_sheet(calcRows);
      ws2["!cols"] = [{wch:38},{wch:16}];
      XLSX.utils.book_append_sheet(wb, ws2, "Tax Calculation");

      // Sheet 3 — Exceptions
      const excRows = [["GREENGRAPH Tax Agent - Exceptions"],["Client: " + safeRef, "FY: " + fyLabel, "Generated: " + now],[],
        ["#","Severity","Category","Exception","ATO Reference","Action"]];
      (outputsState.exceptions || []).forEach(function(ex, i) {
        excRows.push([i+1, ex.type==="flag"?"REQUIRED":ex.type==="warn"?"WARNING":"INFO", ex.category||"", ex.msg||"", ex.ref||"", ex.action||"Review before lodgement"]);
      });
      if (!(outputsState.exceptions && outputsState.exceptions.length)) excRows.push(["","","","No exceptions flagged."]);
      const ws3 = XLSX.utils.aoa_to_sheet(excRows);
      ws3["!cols"] = [{wch:4},{wch:10},{wch:16},{wch:60},{wch:18},{wch:30}];
      XLSX.utils.book_append_sheet(wb, ws3, "Exceptions");

      // Sheet 4 — Deduction Check
      if (outputsState.deductData && outputsState.deductData.length) {
        const dRows = [["GREENGRAPH Tax Agent - Deduction Legitimacy Check"],["Client: " + safeRef, "FY: " + fyLabel, "Generated: " + now],[],
          ["ATO Code","Description","Amount ($)","Verdict","Confidence","Reason","ATO Reference","Action"]];
        outputsState.deductData.forEach(function(r) {
          dRows.push([r.code, r.label, r.amount||0, (r.verdict||"").toUpperCase(), r.confidence||"", r.reason||"", r.ato_reference||"", r.action||""]);
        });
        const ws4 = XLSX.utils.aoa_to_sheet(dRows);
        ws4["!cols"] = [{wch:8},{wch:36},{wch:12},{wch:10},{wch:10},{wch:50},{wch:22},{wch:36}];
        XLSX.utils.book_append_sheet(wb, ws4, "Deduction Check");
      }

      const xlsxData = XLSX.write(wb, { bookType:"xlsx", type:"array" });
      artefacts.push({
        name: safeRef + "_FY" + getFYLabel(fy) + "_Calculations.xlsx",
        blob: new Blob([xlsxData], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" }),
        label: "Calculations XLSX",
      });
    } catch(e) {
      artefacts.push({
        name: safeRef + "_FY" + getFYLabel(fy) + "_Calculations.xlsx",
        blob: new Blob(["XLSX build error: " + e.message], { type: "text/plain" }),
        label: "Calculations XLSX",
        buildError: true,
      });
    }

    // 5. Exceptions — CSV
    const excHeader = "Type,Category,Message,ATO Reference,Action";
    const excBody = (outputsState.exceptions || []).map(function(e) {
      return [e.type, e.category||"", e.msg||"", e.ref||"", e.action||""]
        .map(function(v){ return '"' + String(v).replace(/"/g, '""') + '"'; }).join(",");
    }).join("\n");
    artefacts.push({
      name: safeRef + "_FY" + getFYLabel(fy) + "_Exceptions.csv",
      blob: new Blob([[excHeader, excBody].filter(Boolean).join("\n")], { type: "text/csv" }),
      label: "Exceptions CSV",
    });

    // 6. Deduction Legitimacy Check — CSV
    const deductHeader = "Code,Deduction,Amount,Verdict,Confidence,Reason,ATO Reference,Action";
    const deductBody = (outputsState.deductData || []).map(function(r) {
      return [r.code||"", r.label||"", r.amount||0, r.verdict||"", r.confidence||"", r.reason||"", r.ato_reference||"", r.action||""]
        .map(function(v){ return '"' + String(v).replace(/"/g, '""') + '"'; }).join(",");
    }).join("\n");
    artefacts.push({
      name: safeRef + "_FY" + getFYLabel(fy) + "_DeductionCheck.csv",
      blob: new Blob([[deductHeader, deductBody].filter(Boolean).join("\n")], { type: "text/csv" }),
      label: "Deduction Check CSV",
    });

    return artefacts;
  }


  async function handleCreateFolder() {
    const name = newFolderName.trim();
    if (!name) return;
    setCreatingFolder(true);
    try {
      const parentId = breadcrumb[breadcrumb.length - 1].id;
      const newFolder = await createSharePointFolder(token, driveId, parentId, name);
      // Navigate into the newly created folder automatically
      setItems(function(prev){ return [...prev, newFolder]; });
      setBreadcrumb(function(prev){ return [...prev, { id: newFolder.id, name: newFolder.name }]; });
      setTargetFolder(newFolder);
      const children = await listFolder(token, driveId, newFolder.id);
      setItems(children);
      setStatus("browsing");
    } catch(e) {
      alert("Could not create folder: " + e.message);
    }
    setCreatingFolder(false);
    setShowNewFolder(false);
    setNewFolderName("");
  }

  async function handleSave() {
    const folderId = targetFolder ? targetFolder.id : breadcrumb[breadcrumb.length - 1].id;
    setUploading(true);
    setUploadLog([]);
    const artefacts = buildArtefacts();
    const log = [];
    for (const art of artefacts) {
      if (art.buildError) {
        log.push({ name: art.label, status:"warn", msg: "Built with error — uploaded as text" });
      }
      try {
        await uploadToSharePointFolder(token, driveId, folderId, art.name, art.blob);
        log.push({ name: art.label, status:"ok", msg: art.name });
      } catch(e) {
        log.push({ name: art.label, status:"error", msg: e.message });
      }
      setUploadLog([...log]);
    }
    setUploading(false);
    setStatus("done");
  }

  const folders   = items.filter(function(i){ return i.folder; });
  const fileCount = items.filter(function(i){ return !i.folder; }).length;
  const currentFolderName = breadcrumb[breadcrumb.length - 1]?.name || "Documents";
  const isDone    = status === "done";
  const allOk     = uploadLog.length > 0 && uploadLog.every(function(l){ return l.status === "ok" || l.status === "warn"; });
  const hasErrors = uploadLog.some(function(l){ return l.status === "error"; });

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ background:"var(--surface)", border:"0.5px solid var(--border-strong)", borderRadius:"var(--r)", width:"min(660px,95vw)", maxHeight:"82vh", display:"flex", flexDirection:"column", boxShadow:"0 8px 40px rgba(0,0,0,0.3)" }}>

        {/* ── Header ── */}
        <div style={{ display:"flex", alignItems:"center", gap:10, padding:"14px 16px", borderBottom:"0.5px solid var(--border)", flexShrink:0, background:"var(--surface2)" }}>
          <span style={{ fontSize:20 }}>☁️</span>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:13, fontWeight:600 }}>Save artefacts to SharePoint</div>
            <div style={{ fontSize:11, color:"var(--muted)" }}>Navigate to the client's folder, then click Save 6 artefacts.</div>
          </div>
          <button className="tbtn" onClick={onClose} style={{ padding:"4px 10px" }}>✕ Close</button>
        </div>

        {/* ── Client + artefact summary ── */}
        <div style={{ padding:"8px 16px", background:"var(--accent-l)", borderBottom:"0.5px solid var(--accent)", fontSize:11, display:"flex", gap:20, flexShrink:0 }}>
          <span><span style={{ color:"var(--muted)" }}>Client ref:</span> <strong>{clientRef}</strong></span>
          <span><span style={{ color:"var(--muted)" }}>FY:</span> <strong>{getFYLabel(fy)}</strong></span>
          <span><span style={{ color:"var(--muted)" }}>Artefacts:</span> <strong>5 files</strong> (letter, Xero JSON, ATO form, XLSX, flags &amp; risk CSV)</span>
        </div>

        {/* ── Breadcrumb ── */}
        {(status === "browsing" || isDone) && (
          <div style={{ display:"flex", alignItems:"center", gap:4, padding:"7px 16px", borderBottom:"0.5px solid var(--border)", flexShrink:0, fontSize:12, flexWrap:"wrap", background:"var(--surface)" }}>
            <span style={{ fontSize:11, color:"var(--hint)", marginRight:4 }}>📁</span>
            {breadcrumb.map(function(crumb, idx) {
              return (
                <React.Fragment key={crumb.id}>
                  {idx > 0 && <span style={{ color:"var(--hint)" }}>›</span>}
                  <button
                    onClick={function(){ if (!isDone) navigateCrumb(crumb, idx); }}
                    disabled={isDone}
                    style={{ background:"none", border:"none", cursor: isDone ? "default" : "pointer", padding:"2px 4px",
                      color: idx === breadcrumb.length - 1 ? "var(--text)" : "var(--accent)",
                      fontWeight: idx === breadcrumb.length - 1 ? 600 : 400, fontSize:12 }}>
                    {crumb.name}
                  </button>
                </React.Fragment>
              );
            })}
            {!isDone && <span style={{ marginLeft:"auto", fontSize:10, fontFamily:"Courier New", color:"var(--hint)" }}>← navigate to client folder, then save</span>}
          </div>
        )}

        {/* ── Body ── */}
        <div style={{ flex:1, overflowY:"auto" }}>

          {status === "loading" && (
            <div style={{ padding:32, textAlign:"center", color:"var(--muted)", fontSize:13 }}>
              <Spinner /> Connecting to SharePoint...
            </div>
          )}

          {status === "error" && (
            <div style={{ padding:24 }}>
              <div className="notice warn"><span>⚠</span><span><strong>Connection error:</strong> {error}</span></div>
              <div style={{ fontSize:11, color:"var(--hint)", marginTop:8, padding:"0 4px" }}>
                Ensure your Azure App Registration has <code>Files.ReadWrite</code> and <code>Sites.ReadWrite.All</code> permissions granted.
              </div>
            </div>
          )}

          {status === "browsing" && !isDone && (
            <>
              {/* New Folder button + inline input */}
              <div style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 16px", borderBottom:"0.5px solid var(--border)", background:"var(--surface2)", flexShrink:0 }}>
                {!showNewFolder ? (
                  <button className="tbtn" onClick={function(){ setShowNewFolder(true); setTimeout(function(){ document.getElementById("sp-new-folder-input") && document.getElementById("sp-new-folder-input").focus(); }, 50); }}
                    style={{ fontSize:11, display:"flex", alignItems:"center", gap:5 }}>
                    <span>📁+</span> New folder here
                  </button>
                ) : (
                  <>
                    <span style={{ fontSize:14 }}>📁</span>
                    <input
                      id="sp-new-folder-input"
                      type="text"
                      placeholder="Folder name (e.g. Smith J - FY2024-25)"
                      value={newFolderName}
                      onChange={function(e){ setNewFolderName(e.target.value); }}
                      onKeyDown={function(e){ if (e.key === "Enter") handleCreateFolder(); if (e.key === "Escape") { setShowNewFolder(false); setNewFolderName(""); } }}
                      style={{ flex:1, padding:"5px 9px", fontSize:12, border:"0.5px solid var(--accent)", borderRadius:"var(--rs)", background:"var(--surface)", color:"var(--text)", outline:"none", fontFamily:"inherit" }}
                    />
                    <button className="tbtn primary" onClick={handleCreateFolder} disabled={!newFolderName.trim() || creatingFolder}
                      style={{ fontSize:11 }}>
                      {creatingFolder ? <><Spinner/>Creating...</> : "Create"}
                    </button>
                    <button className="tbtn" onClick={function(){ setShowNewFolder(false); setNewFolderName(""); }} style={{ fontSize:11 }}>Cancel</button>
                  </>
                )}
              </div>

              {folders.length === 0 && !showNewFolder && (
                <div style={{ padding:"14px 16px", color:"var(--muted)", fontSize:12 }}>
                  No sub-folders here. You can save directly to <strong>{currentFolderName}</strong>, or create a new folder above.
                  {fileCount > 0 && <span style={{ color:"var(--hint)", display:"block", marginTop:4 }}>{fileCount} existing file(s) in this folder — artefacts will be added alongside them.</span>}
                </div>
              )}
              {folders.map(function(item) {
                return (
                  <div key={item.id} onClick={function(){ openFolder(item); }}
                    style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 16px", cursor:"pointer", fontSize:13, borderBottom:"0.5px solid var(--border)" }}
                    onMouseEnter={function(e){ e.currentTarget.style.background="var(--surface2)"; }}
                    onMouseLeave={function(e){ e.currentTarget.style.background="transparent"; }}>
                    <span style={{ fontSize:16, flexShrink:0 }}>📁</span>
                    <span style={{ flex:1 }}>{item.name}</span>
                    <span style={{ color:"var(--hint)", fontSize:11 }}>›</span>
                  </div>
                );
              })}
              {fileCount > 0 && folders.length > 0 && (
                <div style={{ padding:"6px 16px", fontSize:11, color:"var(--hint)", fontStyle:"italic", borderBottom:"0.5px solid var(--border)" }}>
                  {fileCount} existing file(s) in this folder.
                </div>
              )}
            </>
          )}

          {/* Upload log — shown during and after upload */}
          {uploadLog.length > 0 && (
            <div style={{ padding:"12px 16px" }}>
              <div style={{ fontSize:10, fontFamily:"Courier New", fontWeight:700, color:"var(--muted)", letterSpacing:".5px", textTransform:"uppercase", marginBottom:8 }}>
                Upload log — {currentFolderName}
              </div>
              {uploadLog.map(function(l, i) {
                const col = l.status === "ok" ? "var(--accent)" : l.status === "warn" ? "var(--warn)" : "var(--danger)";
                const icon = l.status === "ok" ? "✓" : l.status === "warn" ? "⚠" : "✗";
                return (
                  <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:9, padding:"6px 0", borderBottom:"0.5px solid var(--border)", fontSize:12 }}>
                    <span style={{ color: col, fontWeight:700, flexShrink:0, marginTop:1 }}>{icon}</span>
                    <span style={{ minWidth:170, fontWeight:500, flexShrink:0 }}>{l.name}</span>
                    <span style={{ fontSize:10, fontFamily:"Courier New", color:"var(--hint)", flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{l.msg}</span>
                  </div>
                );
              })}
              {uploading && (
                <div style={{ padding:"8px 0", fontSize:12, color:"var(--muted)", fontStyle:"italic" }}>
                  <Spinner /> Uploading...
                </div>
              )}
              {isDone && allOk && !hasErrors && (
                <div className="notice info" style={{ marginTop:10 }}>
                  <span>✓</span>
                  <span>All 6 artefacts saved to <strong>{currentFolderName}</strong> in SharePoint successfully.</span>
                </div>
              )}
              {isDone && hasErrors && (
                <div className="notice warn" style={{ marginTop:10 }}>
                  <span>⚠</span>
                  <span>Some artefacts failed to upload — check the log above and retry if needed.</span>
                </div>
              )}
            </div>
          )}
        </div>

        {/* ── Footer ── */}
        <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 16px", borderTop:"0.5px solid var(--border)", flexShrink:0, background:"var(--surface2)" }}>
          <div style={{ flex:1, fontSize:12, color:"var(--muted)" }}>
            {isDone && allOk
              ? "✓ All artefacts uploaded to SharePoint"
              : isDone && hasErrors
              ? "⚠ Upload completed with errors"
              : uploading
              ? "Uploading — please wait..."
              : "Destination: " + currentFolderName}
          </div>
          <button className="tbtn" onClick={onClose}>{isDone ? "Close" : "Cancel"}</button>
          {!isDone && (
            <button className="tbtn primary" onClick={handleSave}
              disabled={uploading || status !== "browsing"}
              style={{ display:"flex", alignItems:"center", gap:6 }}>
              {uploading
                ? <><Spinner />Uploading...</>
                : <>☁️ Save 6 artefacts to &ldquo;{currentFolderName}&rdquo;</>}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────
//  VAULT PANEL
// ─────────────────────────────────────────
function VaultPanel({ state, dispatch, onDraft }) {
  const { apiKey, docs } = state;
  const [drag, setDrag] = useState(false);
  const [processing, setProcessing] = useState(false);
  const [showSPBrowser, setShowSPBrowser] = useState(false);
  const fileRef = useRef(null);

  const addFiles = useCallback((files) => {
    const valid = Array.from(files).filter(f => ["application/pdf","image/png","image/jpeg","application/vnd.openxmlformats-officedocument.spreadsheetml.sheet","application/vnd.ms-excel","text/csv"].includes(f.type) || f.name.match(/\.(xlsx|xls|csv)$/i));
    const newDocs = valid.map((f, i) => ({
      id: state.docIdSeq + i + 1,
      file: f,
      type: guessDocType(f.name),
      status: "pending",
      extracted: null,
    }));
    if (newDocs.length) dispatch({ type:"ADD_DOCS", payload:newDocs });
  }, [state.docIdSeq, dispatch]);

  const processAll = useCallback(async () => {
    if (!apiKey) { alert("Please enter your Anthropic API key."); return; }
    setProcessing(true);
    const pending = docs.filter(d => d.status !== "done");
    for (const doc of pending) {
      dispatch({ type:"UPDATE_DOC", payload:{ id:doc.id, status:"processing" } });
      try {
        const extracted = await extractDoc(doc, apiKey, state.selectedFY);
        dispatch({ type:"UPDATE_DOC", payload:{ id:doc.id, status:"done", extracted } });
      } catch(e) {
        dispatch({ type:"UPDATE_DOC", payload:{ id:doc.id, status:"error", extracted:{ error:e.message } } });
      }
    }
    setProcessing(false);
  }, [apiKey, docs, dispatch]);

  const hasDone = docs.length > 0
    && docs.every(d => d.status === "done" || d.status === "error")
    && docs.some(d => d.status === "done" && d.extracted && !d.extracted.error);

  return (
    <div className="panel">
      <div className="vault-wrap">
        <div className="notice warn"><span>⚠</span><span>Do not upload documents containing TFN, full name, or bank account numbers. Use anonymised copies only.</span></div>
        <div className="notice info"><span>ℹ</span><span>Upload PDFs or images. Claude will extract all ATO-relevant figures automatically.</span></div>
        <div className={`upload-zone${drag ? " drag" : ""}`}
          onClick={() => fileRef.current && fileRef.current.click()}
          onDragOver={e => { e.preventDefault(); setDrag(true); }}
          onDrop={e => { e.preventDefault(); setDrag(false); addFiles(e.dataTransfer.files); }}
          onDragLeave={() => setDrag(false)}>
          <input ref={fileRef} type="file" style={{ display:"none" }} multiple accept=".pdf,.png,.jpg,.jpeg,.xlsx,.xls,.csv"
            onChange={e => addFiles(e.target.files)} />
          <div className="uz-icon">⬆</div>
          <div className="uz-title">Drop files here or click to upload</div>
          <div className="uz-sub">PDF, PNG, JPG, XLSX, CSV - PAYG summaries, receipts, rental statements, brokerage reports, ESS statements, expense spreadsheets</div>
        </div>

        {/* SharePoint import option */}
        <div style={{ display:"flex", alignItems:"center", gap:10, margin:"10px 0 6px" }}>
          <div style={{ flex:1, height:"0.5px", background:"var(--border)" }}/>
          <span style={{ fontSize:11, color:"var(--hint)", whiteSpace:"nowrap" }}>or import from</span>
          <div style={{ flex:1, height:"0.5px", background:"var(--border)" }}/>
        </div>
        <button
          className="tbtn"
          style={{ width:"100%", padding:"10px 14px", fontSize:12, display:"flex",
                   alignItems:"center", justifyContent:"center", gap:8,
                   border:"0.5px solid var(--border-strong)", borderRadius:"var(--r)",
                   background:"var(--surface2)", cursor:"pointer" }}
          onClick={() => setShowSPBrowser(true)}>
          <span style={{ fontSize:16 }}>🗂️</span>
          <span>Import from SharePoint</span>
        </button>
{showSPBrowser && (
          <SharePointBrowser
            onFilesReady={(files) => { addFiles(files); setShowSPBrowser(false); }}
            onClose={() => setShowSPBrowser(false)}
          />
        )}
        <div className="doc-types">
          {DOC_TYPES.map(dt => (
            <div key={dt.id} className="dtype-card">
              <span className="dtype-icon">{dt.icon}</span>
              <div className="dtype-name">{dt.name}</div>
              <div className="dtype-desc">{dt.desc}</div>
            </div>
          ))}
        </div>
        {docs.length > 0 && (
          <>
            <div className="vault-hdr">
              <div className="vault-hdr-title">Uploaded documents ({docs.length})</div>
              <button className="tbtn primary" onClick={processAll} disabled={processing || docs.every(d => d.status === "done")}>
                {processing ? <><Spinner />Extracting…</> : "Extract documents"}
              </button>
            </div>
            {docs.map(doc => {
              const dt = DOC_TYPES.find(d => d.id === doc.type) || DOC_TYPES[8];
              const statusLabel = { pending:"Pending", processing:"Extracting…", done:"Extracted", error:"Error" }[doc.status];
              return (
                <div key={doc.id} className="doc-item">
                  <div className="doc-item-icon" style={{ background:dt.bg }}>{dt.icon}</div>
                  <div className="doc-item-info">
                    <div className="doc-item-name">{doc.file.name}</div>
                    <div className="doc-item-meta">{dt.name} · {(doc.file.size/1024).toFixed(0)} KB</div>
                  </div>
                  <select className="type-sel" value={doc.type}
                    onChange={e => dispatch({ type:"UPDATE_DOC", payload:{ id:doc.id, type:e.target.value } })}>
                    {DOC_TYPES.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                  </select>
                  {doc.status === "done" && doc.extracted && (() => {
                    try {
                      const ex = doc.extracted;
                      const dateToCheck = ex.periodEnd || ex.documentDate;
                      if (!dateToCheck) return null;
                      const selFY = state.selectedFY || DEFAULT_FY;
                      const { inPeriod, formatted } = checkInPeriod(dateToCheck, selFY);
                      const fyLbl = getFYLabel(selFY);
                      if (inPeriod === false) return (
                        <span className="doc-status error" title={`Date ${formatted} is outside FY${fyLbl}`}>⚠ Out of period</span>
                      );
                      if (inPeriod === true) return (
                        <span className="doc-status done" title={`Date ${formatted} confirmed in FY${fyLbl}`}>✓ In period</span>
                      );
                      return null;
                    } catch(e) { return null; }
                  })()}
                  <span className={`doc-status ${doc.status}`}>{statusLabel}</span>
                  <span className="doc-remove" onClick={() => dispatch({ type:"REMOVE_DOC", payload:doc.id })}>✕</span>
                </div>
              );
            })}
          </>
        )}
        {hasDone && (
          <>
            <div className="cta-banner">
              <div style={{ fontSize:26, flexShrink:0 }}>✦</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:600, marginBottom:3 }}>Documents extracted — ready to draft</div>
                <div style={{ fontSize:11, color:"var(--muted)" }}>All documents have been extracted. Click to generate a complete FY{getFYLabel(state.selectedFY)} tax return draft.</div>
              </div>
              <button className="tbtn primary" style={{ flexShrink:0, padding:"8px 16px" }} onClick={onDraft}>✦ Draft tax return</button>
            </div>
            <div className="vault-hdr"><div className="vault-hdr-title">Extracted data</div></div>
            {docs.filter(d => d.status === "done" && d.extracted && !d.extracted.error).map(doc => {
              if (doc.type === "ess") return <EssCard key={doc.id} doc={doc} />;
              const ex = doc.extracted;
              const dt = DOC_TYPES.find(d => d.id === doc.type) || DOC_TYPES[8];
              return (
                <div key={doc.id} className="ext-panel">
                  <div className="ext-hdr">
                    <span>{dt.icon}</span>
                    <span style={{ flex:1 }}>{doc.file.name}</span>
                    <span style={{ fontSize:10, fontFamily:"Courier New", color:"var(--hint)" }}>{ex.docLabel||dt.name}</span>
                  </div>
                  <div className="ext-body">
                    <div className="field-grid">
                      {(ex.fields||[]).slice(0,8).map((f,i) => (
                        <div key={i}>
                          <div className="f-label">{f.ato_code ? f.ato_code+" — " : ""}{f.label}</div>
                          <div className="f-val">{f.value}</div>
                        </div>
                      ))}
                    </div>
                    {ex.notes && <div className="ext-notes">{ex.notes}</div>}
                  </div>
                </div>
              );
            })}
          </>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────
//  TAX RETURN RENDERER
// ─────────────────────────────────────────
function TaxReturnRenderer({ content }) {
  // Normalise line endings — API may return \r\n (Windows) which breaks regex
  const text = (content || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  const fmtAmt = v => {
    const n = parseFloat(v);
    if (isNaN(n)) return v;
    const abs = Math.abs(n).toLocaleString("en-AU", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return n < 0 ? `-$${abs}` : `$${abs}`;
  };

  const parseSection = (src, marker) => {
    const tag = "##" + marker;
    const idx = src.indexOf(tag);
    if (idx === -1) return null;
    const afterTag = src.indexOf("\n", idx);
    if (afterTag === -1) return null;
    const body = src.slice(afterTag + 1);
    const nextSection = body.indexOf("\n##");
    const raw = nextSection === -1 ? body : body.slice(0, nextSection);
    return raw.trim() || null;
  };

  const parseRows = raw => raw ? raw.split("\n").filter(l => l.includes("|")).map(l => l.split("|").map(c => c.trim())) : [];

  const incomeRaw   = parseSection(text, "INCOME");
  const deductRaw   = parseSection(text, "DEDUCTIONS");
  const summaryRaw  = parseSection(text, "SUMMARY");
  const reviewRaw   = parseSection(text, "REVIEW");

  // If no structured sections found, fall back to plain text
  if (!incomeRaw && !summaryRaw) {
    return <div style={{ whiteSpace:"pre-wrap", fontSize:13, lineHeight:1.7 }}>{text}</div>;
  }

  const incomeRows  = parseRows(incomeRaw).filter(r => r[0] !== "ITEM");
  const deductRows  = parseRows(deductRaw).filter(r => r[0] !== "ITEM");
  const summaryRows = parseRows(summaryRaw).filter(r => r[0] !== "LABEL");

  const refundRow   = summaryRows.find(r => /refund|payable/i.test(r[0]));
  const isRefund    = refundRow && parseFloat((refundRow[1]||"").replace(/[^0-9.-]/g,"")) >= 0;

  const cellSt = { padding:"5px 10px", fontSize:11, borderBottom:"0.5px solid var(--border)", fontFamily:"'Courier New',monospace" };
  const hdrSt  = { ...cellSt, background:"var(--surface2)", fontWeight:700, fontFamily:"Georgia,serif", fontSize:11, letterSpacing:".3px" };
  const secHdr = { fontSize:10, fontFamily:"'Courier New',monospace", color:"var(--sb-section)", letterSpacing:".9px", textTransform:"uppercase",
                   padding:"10px 0 4px", borderTop:"1.5px solid var(--border-strong)", marginTop:8 };
  const tblSt  = { width:"100%", borderCollapse:"collapse", marginBottom:4 };

  const copyTSV = () => {
    const lines = [];
    lines.push("INCOME");
    lines.push("Item\tDescription\tSource\tAmount");
    incomeRows.forEach(r => lines.push(r.join("\t")));
    lines.push("");
    lines.push("DEDUCTIONS");
    lines.push("Item\tDescription\tNotes\tAmount");
    deductRows.forEach(r => lines.push(r.join("\t")));
    lines.push("");
    lines.push("SUMMARY");
    summaryRows.forEach(r => lines.push(r.join("\t")));
    if (reviewRaw) { lines.push(""); lines.push("FLAGS & RISK"); lines.push(reviewRaw); }
    navigator.clipboard.writeText(lines.join("\n")).then(() => alert("Copied to clipboard — paste into Excel or Google Sheets"));
  };

  return (
    <div style={{ fontSize:12 }}>
      <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:6 }}>
        <button className="tbtn" style={{ fontSize:11 }} onClick={copyTSV}>📋 Copy to spreadsheet</button>
      </div>

      {/* INCOME */}
      <div style={secHdr}>Income</div>
      <table style={tblSt}>
        <thead><tr>
          {["Item","Description","Source","Amount"].map(h => <th key={h} style={{ ...hdrSt, textAlign: h==="Amount"?"right":"left" }}>{h}</th>)}
        </tr></thead>
        <tbody>
          {incomeRows.map((r, i) => (
            <tr key={i} style={{ background: i%2===0 ? "var(--surface)" : "var(--surface2)" }}>
              <td style={{ ...cellSt, color:"var(--accent)", fontWeight:600, width:70 }}>{r[0]||""}</td>
              <td style={{ ...cellSt }}>{r[1]||""}</td>
              <td style={{ ...cellSt, color:"var(--muted)" }}>{r[2]||""}</td>
              <td style={{ ...cellSt, textAlign:"right", fontWeight:600 }}>{fmtAmt(r[3]||"")}</td>
            </tr>
          ))}
        </tbody>
      </table>

      {/* DEDUCTIONS */}
      <div style={secHdr}>Deductions</div>
      <table style={tblSt}>
        <thead><tr>
          {["Item","Description","Notes","Amount"].map(h => <th key={h} style={{ ...hdrSt, textAlign: h==="Amount"?"right":"left" }}>{h}</th>)}
        </tr></thead>
        <tbody>
          {deductRows.length > 0 ? deductRows.map((r, i) => (
            <tr key={i} style={{ background: i%2===0 ? "var(--surface)" : "var(--surface2)" }}>
              <td style={{ ...cellSt, color:"var(--accent)", fontWeight:600, width:70 }}>{r[0]||""}</td>
              <td style={{ ...cellSt }}>{r[1]||""}</td>
              <td style={{ ...cellSt, color:"var(--muted)" }}>{r[2]||""}</td>
              <td style={{ ...cellSt, textAlign:"right", fontWeight:600 }}>{fmtAmt(r[3]||"")}</td>
            </tr>
          )) : <tr><td colSpan={4} style={{ ...cellSt, color:"var(--hint)", fontStyle:"italic" }}>No deductions identified</td></tr>}
        </tbody>
      </table>

      {/* SUMMARY */}
      <div style={secHdr}>Summary</div>
      <table style={tblSt}>
        <tbody>
          {summaryRows.map((r, i) => {
            const isResult = /refund|payable/i.test(r[0]);
            const val = parseFloat((r[1]||"").replace(/[^0-9.-]/g,""));
            // Payable = negative (tax owed), Refund = positive — derive label from sign
            const isPayable = isResult && val < 0;
            const isRefund  = isResult && val >= 0;
            const color = isResult ? (isRefund ? "var(--accent)" : "var(--danger)") : "inherit";
            const displayLabel = isResult
              ? (isPayable ? "Est. amount payable" : "Est. refund")
              : (r[0]||"");
            const displayVal = isResult
              ? (isPayable ? fmtAmt(Math.abs(val)) : fmtAmt(val))
              : fmtAmt(r[1]||"");
            return (
              <tr key={i} style={{ background: isResult ? "var(--surface2)" : i%2===0 ? "var(--surface)" : "transparent",
                                   borderTop: isResult ? "1.5px solid var(--border-strong)" : "none" }}>
                <td style={{ ...cellSt, fontWeight: isResult ? 700 : 400 }}>{displayLabel}</td>
                <td style={{ ...cellSt, textAlign:"right", fontWeight: isResult ? 700 : 600, color }}>{displayVal}</td>
              </tr>
            );
          })}
        </tbody>
      </table>

      {/* FLAGS & RISK */}
      {reviewRaw && (
        <>
          <div style={secHdr}>Flags &amp; Risk</div>
          <ul style={{ margin:0, padding:"6px 0 6px 0", listStyle:"none" }}>
            {(() => {
              const raw = reviewRaw.split("\n").filter(l => l.trim());
              const rank = l => /^\[FLAG\]/i.test(l) ? 0 : /^\[WARN\]/i.test(l) ? 1 : 2;
              const sorted = [...raw].sort((a, b) => rank(a) - rank(b));
              return sorted.map((note, i) => {
                const isFlag = /^\[FLAG\]/i.test(note);
                const isWarn = /^\[WARN\]/i.test(note);
                const icon   = isFlag ? "⛔" : isWarn ? "⚠" : "ℹ";
                const color  = isFlag ? "var(--danger)" : isWarn ? "var(--warn)" : "var(--info)";
                const clean  = note.replace(/^\[(FLAG|WARN|INFO)\]\s*/i, "").replace(/^[-•*⚑►▸·]\s*/, "").trim();
                return (
                  <li key={i} style={{ display:"flex", gap:8, padding:"6px 0", fontSize:12, lineHeight:1.6, borderBottom:"0.5px solid var(--border)" }}>
                    <span style={{ color, flexShrink:0, fontSize:13, marginTop:1 }}>{icon}</span>
                    <span style={{ color: isFlag ? "var(--danger)" : isWarn ? "var(--warn-t)" : "var(--muted)" }}>{clean}</span>
                  </li>
                );
              });
            })()}
          </ul>
        </>
      )}
    </div>
  );
}

// ─────────────────────────────────────────
//  DRAFTER PANEL
// ─────────────────────────────────────────
function DrafterPanel({ state, dispatch }) {
  const { apiKey, drafterMessages, docs, chatMessages, clientProfile, selectedFY } = state;
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current && bottomRef.current.scrollIntoView({ behavior:"smooth" }); }, [drafterMessages, loading]);

  // Auto-fire draft prompt when navigated from Step 2
  useEffect(() => {
    if (state.drafterAutoPrompt && !loading) {
      const prompt = state.drafterAutoPrompt;
      dispatch({ type:"SET_DRAFTER_AUTO_PROMPT", payload: null });
      send(prompt);
    }
  }, [state.drafterAutoPrompt]);

    const send = useCallback(async (text) => {
    if (!apiKey) { alert("Please enter your Anthropic API key."); return; }
    const clean = text.trim();
    if (!clean) return;
    setInput("");
    dispatch({ type:"ADD_DRAFTER_MSG", payload:{ role:"user", content:clean } });
    setLoading(true);
    const ctx = buildVaultContext(docs, chatMessages, selectedFY);
    // Build full deduction line-item breakdown for drafter context
    const deductLines = buildDeductionLineItems(docs, computeTotals(docs, clientProfile, selectedFY));
    const deductCtx = deductLines.length
      ? "DEDUCTION LINE ITEMS (individual items — use these for any adjustment requests):\n" +
        deductLines.map((l,i) => `  ${i+1}. ${l.code} "${l.label}" $${l.amount.toFixed(2)} (source: ${l.source})`).join("\n")
      : "DEDUCTION LINE ITEMS: no individual items extracted — only aggregated totals available.";
    // Pass pre-computed sidebar totals to drafter — prevents Claude re-deriving from raw docs
    const t = computeTotals(docs, clientProfile, selectedFY);
    const computedCtx = `PRE-COMPUTED TOTALS (use these exact figures — do not re-derive from documents):
Total assessable income: ${t.totalIncome.toFixed(2)}
Total deductions: ${t.deductions.toFixed(2)}
Taxable income: ${t.taxableIncome.toFixed(2)}
Gross tax: ${t.grossTax.toFixed(2)}
LITO offset: ${t.lito.toFixed(2)}
LMITO offset: ${(t.lmito||0).toFixed(2)}
Medicare levy: ${t.medicare.toFixed(2)}
PHI clawback: ${t.phiClawback.toFixed(2)}
Net tax payable: ${t.netTax.toFixed(2)}
Total withheld: ${t.totalTaxWH.toFixed(2)}
Est. refund / payable: ${t.refund.toFixed(2)} (negative = payable, positive = refund)
PAYG income: ${t.paygIncome.toFixed(2)}
ESS Box F: ${t.essBoxF.toFixed(2)}
IP benefit (income): ${(t.ipBenefit||0).toFixed(2)}
IP premium (D15 deduction): ${(t.ipPremium||0).toFixed(2)}`;
    const cp = clientProfile || {};
    const profileCtx = `hasSpouse=${cp.hasSpouse||false}|deps=${cp.numDependants||0}|spouseATI=${cp.spouseIncome||0}|phiRebate=${cp.phiRebateReceived||0}`;
    const fyLabel = getFYLabel(selectedFY);
    const fyCfg = getFYConfig(selectedFY);
    const bracketStr = fyCfg.brackets.map((b,i,arr) => {
      const lo = i===0?0:arr[i-1][0]+1;
      const hi = b[0]===Infinity?"∞":"$"+b[0].toLocaleString();
      return `$${lo.toLocaleString()}–${hi}:${b[1]===0?"Nil":b[1]*100+"c"}${b[2]>0?" base$"+b[2]:""}`;
    }).join(" | ");
    const phiStr = fyCfg.phiTiersSingle.map((t,i)=>t+"/"+(fyCfg.phiTiersFamily[i])).join("|");
    const lmitoStr = fyCfg.lmitoMax>0?`up to $${fyCfg.lmitoMax} APPLY THIS`:"NOT applicable";
    const system = `You are AusTax, an expert Australian tax accountant. FY${fyLabel}.
DOCUMENTS:
${ctx}
${deductCtx}
PROFILE: ${profileCtx}
${computedCtx}
RATES FY${fyLabel}: ${bracketStr}
Medicare ${fyCfg.medicareRate*100}%. Family lower=${fyCfg.medicareFamilyBase}+(${fyCfg.medicareFamilyPerChild}×deps).
PHI clawback tiers(s/f):${phiStr} rates:${fyCfg.phiRates.join("/")} clawback=rebate×(1-entitled/${fyCfg.phiRates[0]}).
LITO up to $${fyCfg.litoMax} phases $${fyCfg.litoPhase1[0]}–$${fyCfg.litoPhase2[1]}. LMITO:${lmitoStr}.
${fyCfg.notes}
ESS TREATMENT:
- Box F→Item 12 ordinary income s.83A-110. NO CGT discount on the discount itself.
- SALE rows (soldWithin30Days): taxing point = sale date, assessable = sale proceeds minus costs.
- VEST rows (held shares): assessable = market value at vesting. Cost base for future CGT = this assessed amount.
- Box D→apply $1,000 concession per employer (s.83A-35). Box C→offsets tax payable.
- Flag in ##REVIEW: number of held shares, their cost bases, and CGT implications on future disposal.
RULES:
- Exclude docs marked NO-EXCLUDE from deductions.
- List each employer as separate Item 1 row.
- Flag PAYG variation if ESS>$50k and withheld<70% gross tax.
- INCOME PROTECTION: IBenefit(assessable-income) → include as Item 20 assessable income. IPremium(D15-deduction) → include as D15 deduction ONLY ONCE. Never count the same IP amount as both a general Deduction AND an IPremium — use IPremium field only.
- USE PRE-COMPUTED TOTALS: the PRE-COMPUTED TOTALS block contains exact figures already calculated. Use these directly in ##SUMMARY — do not recalculate from raw document figures as this causes errors. The documents section is for context only; the computed totals are authoritative.
OUTPUT — exactly these markers on their own lines, pipe-delimited, no $ in amounts:
##INCOME
ITEM|DESCRIPTION|SOURCE|AMOUNT
##DEDUCTIONS
ITEM|DESCRIPTION|NOTES|AMOUNT
##SUMMARY
LABEL|AMOUNT
Rows:Total income|Total deductions|Taxable income|Gross tax|LITO|LMITO|Medicare levy|PHI clawback|Total withheld|Est. refund / payable
SIGN RULES: deductions=negative, tax payable=negative, refund=positive, withheld=positive. Est. refund/payable = totalWithheld - netTax. If result is negative it is PAYABLE (output as negative number). If positive it is a REFUND.
##REVIEW
One risk or review item per line. Focus on: ATO audit risk, missing information, deduction legitimacy concerns, ESS complexity, Medicare/PHI issues, out-of-period items, anything the accountant must check before lodging. Use prefix [FLAG], [WARN], or [INFO] on each line.`;
    try {
      const msgs = [...drafterMessages, { role:"user", content:clean }];
      const reply = await callClaude(apiKey, { system, messages:msgs, maxTokens:2000 });
      dispatch({ type:"ADD_DRAFTER_MSG", payload:{ role:"assistant", content:reply } });
    } catch(e) {
      dispatch({ type:"ADD_DRAFTER_MSG", payload:{ role:"assistant", content:"Error: "+e.message } });
    }
    setLoading(false);
  }, [apiKey, drafterMessages, docs, chatMessages, dispatch]);

  return (
    <div className="panel">
      <div className="chat-wrap">
        {drafterMessages.length === 0 && (
          <div className="msg">
            <div className="msg-role">System</div>
            <div className="msg-body assistant">ITR Preparation vault loaded. Use the quick actions below or type your own question.</div>
          </div>
        )}
        {drafterMessages.map((m, i) => (
          <div key={i} className="msg">
            <div className="msg-role">{m.role}</div>
            <div className={`msg-body ${m.role}`}>

            </div>

        {loading && (

        <textarea className="chat-input" rows={1} placeholder="Ask anything about this return, or describe an adjustment…"
          value={input}

async function generateClientLetter(state) {
  // Extract data from drafter messages
  const drafterText = state.drafterMessages.filter(m => m.role === "assistant").map(m => m.content).join("\n");

  // Parse amount payable from drafter summary rows
  const parseSection = (text, marker) => {
    const tag = "##" + marker;
    const idx = text.indexOf(tag);
    if (idx === -1) return null;
    const afterTag = text.indexOf("\n", idx);
    if (afterTag === -1) return null;
    const body = text.slice(afterTag + 1);
    const nextSection = body.indexOf("\n##");
    return (nextSection === -1 ? body : body.slice(0, nextSection)).trim() || null;
  };
  const normText = drafterText.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  const summaryRaw = parseSection(normText, "SUMMARY");
  let amountPayable = "see enclosed estimate";
  if (summaryRaw) {
    const rows = summaryRaw.split("\n").filter(l => l.includes("|")).map(l => l.split("|").map(c => c.trim()));
    const refundRow = rows.find(r => /refund|payable/i.test(r[0]));
    if (refundRow && refundRow[1]) {
      const val = parseFloat(refundRow[1].replace(/[^0-9.-]/g, ""));
      if (!isNaN(val)) {
        const abs = Math.abs(val).toLocaleString("en-AU", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        amountPayable = val < 0 ? `$${abs} payable` : `$${abs} refund`;
      }
    }
  }

  // Client name from archived or active session
  const clientName = state.clientActive ? "Client" : "Client";

  // Dates
  const today = new Date();
  const pad = n => String(n).padStart(2, "0");
  const ordinal = d => { const s=["th","st","nd","rd"]; const v=d%100; return d+(s[(v-20)%10]||s[v]||s[0]); };
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const letterDate = `${ordinal(today.getDate())} ${months[today.getMonth()]} ${today.getFullYear()}`;
  const invoiceDate = `${pad(today.getDate())}/${pad(today.getMonth()+1)}/${today.getFullYear()}`;
  const dueDate = new Date(today.getTime() + 14*24*60*60*1000);
  const invoiceDue = `${pad(dueDate.getDate())}/${pad(dueDate.getMonth()+1)}/${dueDate.getFullYear()}`;

  // Invoice number — timestamp-based
  const invoiceNum = `INV-${today.getFullYear()}${pad(today.getMonth()+1)}${pad(today.getDate())}-${Math.floor(Math.random()*900)+100}`;

  // FY info
  const fyLabel = getFYLabel(state.selectedFY || DEFAULT_FY);
  const fyCfg = getFYConfig(state.selectedFY || DEFAULT_FY);
  const returnYear = String(fyCfg.endYear);

  // Fee calculations
  const feeEx = FIRM_CONFIG.feeExGst;
  const feeGst = feeEx * 0.1;
  const feeInc = feeEx + feeGst;
  const fmt = v => "$" + v.toLocaleString("en-AU", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  // Token map
  const tokens = {
    FIRM_NAME:         FIRM_CONFIG.name,
    FIRM_TAGLINE:      FIRM_CONFIG.tagline,
    FIRM_ADDRESS:      FIRM_CONFIG.address,
    FIRM_SUBURB:       FIRM_CONFIG.suburb,
    FIRM_STATE_PC:     FIRM_CONFIG.statePc,
    FIRM_PHONE:        FIRM_CONFIG.phone,
    FIRM_EMAIL:        FIRM_CONFIG.email,
    FIRM_ABN:          FIRM_CONFIG.abn,
    SIGNER_NAME:       FIRM_CONFIG.signerName,
    SIGNER_TITLE:      FIRM_CONFIG.signerTitle,
    CLIENT_NAME:       clientName,
    CLIENT_FIRST:      clientName.split(" ")[0],
    LETTER_DATE:       letterDate,
    RETURN_YEAR:       returnYear,
    FY_LABEL:          fyLabel,
    AMOUNT_PAYABLE:    amountPayable,
    INVOICE_NUMBER:    invoiceNum,
    INVOICE_DATE:      invoiceDate,
    INVOICE_DUE:       invoiceDue,
    FEE_EX_GST:        fmt(feeEx),
    FEE_GST:           fmt(feeGst),
    FEE_INC_GST:       fmt(feeInc),
    BANK_NAME:         FIRM_CONFIG.bankName,
    BANK_ACCOUNT_NAME: FIRM_CONFIG.bankAccName,
    BANK_BSB:          FIRM_CONFIG.bankBsb,
    BANK_ACCOUNT:      FIRM_CONFIG.bankAcc,
  };

  // Fetch template
  let template;
  try {
    const resp = await fetch("letter-template.html?v=" + Date.now(), { cache: "no-store" });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    template = await resp.text();
  } catch(e) {
    // Fallback — open a simple window if template not found
    alert("letter-template.html not found on server. Please place it in the same directory as index.html.");
    return;
  }

  // Replace all tokens
  let populated = template;
  Object.entries(tokens).forEach(([key, val]) => {
    populated = populated.split("{{" + key + "}}").join(val || "");
  });

  // Open in new window for print/PDF
  const win = window.open("", "_blank");
  if (!win) { alert("Pop-up blocked — please allow pop-ups for this site."); return; }
  win.document.write(populated);
  win.document.close();
}

function exportOutputsXLSX(wpData, exceptions, clientRef, selectedFY, deductCheck) {
  const wb = XLSX.utils.book_new();
  const fy = getFYLabel(selectedFY);
  const now = new Date().toLocaleString("en-AU");
  const ref = clientRef || "Client";
  const t = wpData.totals;
  const wpRows = [
    ["GREENGRAPH Tax Agent - ITR Workpaper", "Client: "+ref, "FY: "+fy, "Generated: "+now],[],
    ["Section","ATO Code","Description","Sub-label","Amount ($)","Status","Source"],
  ];
  (wpData.sections||[]).forEach(function(sec) {
    sec.rows.forEach(function(r) {
      const amt = r.isText ? r.value : (r.value != null && r.value !== 0 ? r.value : "");
      wpRows.push([sec.title, r.code, r.label, r.sublabel||"", amt, r.status, r.src||""]);
    });
  });
  wpRows.push([],["KEY TOTALS"],["Taxable Income",t.taxableIncome],["Net Tax Payable",t.netTax],["Total Withheld",t.totalTaxWH],["Est. Refund / Payable",t.refund]);
  const ws1 = XLSX.utils.aoa_to_sheet(wpRows);
  ws1["!cols"] = [{wch:24},{wch:10},{wch:40},{wch:38},{wch:14},{wch:10},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws1, "ITR Workpaper");
  const calcRows = [["Tax Calculation Detail","FY "+fy,"Client: "+ref],[],["Item","Amount ($)"],
    ["Total assessable income",t.totalIncome],["Total deductions",-(t.deductions+(t.ipPremium||0))],
    ["Taxable income",t.taxableIncome],[],["Gross income tax",-t.grossTax],["LITO",t.lito],
    ["LMITO",t.lmito||0],["Medicare levy",-t.medicare],["PHI clawback",-(t.phiClawback||0)],
    ["Net tax payable",-t.netTax],[],["PAYG withheld",t.taxWithheld],
    ["ESS Box C withheld",t.essTaxWH||0],["Total credits",t.totalTaxWH],["Estimated refund / (payable)",t.refund]];
  const ws2 = XLSX.utils.aoa_to_sheet(calcRows);
  ws2["!cols"] = [{wch:38},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws2, "Tax Calculation");
  const excRows = [["GREENGRAPH Tax Agent - Exceptions"],["Client: "+ref,"FY: "+fy,"Generated: "+now],[],
    ["#","Severity","Category","Exception","ATO Reference","Action"]];
  (exceptions||[]).forEach(function(ex,i) {
    excRows.push([i+1,ex.type==="flag"?"REQUIRED":ex.type==="warn"?"WARNING":"INFO",ex.category||"",ex.msg,ex.ref||"",ex.action||"Review before lodgement"]);
  });
  if (!exceptions||!exceptions.length) excRows.push(["","","","No exceptions flagged."]);
  const ws3 = XLSX.utils.aoa_to_sheet(excRows);
  ws3["!cols"] = [{wch:4},{wch:10},{wch:16},{wch:60},{wch:18},{wch:30}];
  XLSX.utils.book_append_sheet(wb, ws3, "Exceptions");
  if (deductCheck && deductCheck.length) {
    const dRows = [["GREENGRAPH Tax Agent - Deduction Legitimacy Check"],["Client: "+ref,"FY: "+fy,"Generated: "+now],[],
      ["ATO Code","Description","Amount ($)","Verdict","Confidence","Reason","ATO Reference","Action"]];
    deductCheck.forEach(function(r) {
      dRows.push([r.code,r.label,r.amount||0,(r.verdict||"").toUpperCase(),r.confidence||"",r.reason||"",r.ato_reference||"",r.action||""]);
    });
    const ws4 = XLSX.utils.aoa_to_sheet(dRows);
    ws4["!cols"] = [{wch:8},{wch:36},{wch:12},{wch:10},{wch:10},{wch:50},{wch:22},{wch:36}];
    XLSX.utils.book_append_sheet(wb, ws4, "Deduction Check");
  }
  const fyTag = selectedFY.replace("-","");
  XLSX.writeFile(wb, "ITR_Outputs_FY"+fyTag+"_"+(ref).replace(/\s+/g,"_")+".xlsx");
}

function mergeExceptions(wpFlags, aiExceptions) {
  const fromFlags = (wpFlags||[]).map(function(f) {
    return { type:f.type||"warn", category:"Calculated", msg:f.msg, ref:"", action:"Review before lodgement" };
  });
  return fromFlags.concat((aiExceptions||[]).filter(function(e){return e&&e.msg;}));
}

function inferEmployerContext(docs) {
  const done = docs.filter(function(d){return d.status==="done"&&d.extracted&&!d.extracted.error;});
  const paygDocs = done.filter(function(d){return d.type==="payg";});
  if (!paygDocs.length) return null;
  const employers = paygDocs.map(function(d) {
    const ex = d.extracted;
    const empField = (ex.fields||[]).find(function(f){return /employer/i.test(f.label);});
    const empName = empField ? empField.value : "";
    const abnField = (ex.fields||[]).find(function(f){return /abn/i.test(f.label);});
    return { name:empName, abn:abnField?abnField.value:null, income:parseVal(ex.income) };
  }).filter(function(e){return e.name;});
  return employers.length ? employers : null;
}

async function checkDeductionLegitimacy(apiKey, state, wpData) {
  const t = wpData.totals;
  const fy = getFYLabel(state.selectedFY);
  const employers = inferEmployerContext(state.docs);
  const employerStr = employers
    ? employers.map(function(e){return e.name+(e.abn?" (ABN: "+e.abn+")":"")+" - income $"+e.income.toLocaleString("en-AU");}).join(" | ")
    : "No PAYG employer extracted";
  const done = state.docs.filter(function(d){return d.status==="done"&&d.extracted&&!d.extracted.error;});
  const claimedDeductions = [];
  done.filter(function(d){return d.type!=="ess";}).forEach(function(d) {
    const ex = d.extracted;
    (ex.fields||[]).filter(function(f){return f.ato_code&&/^D/i.test(f.ato_code)&&parseVal(f.value)>0;}).forEach(function(f) {
      claimedDeductions.push({code:f.ato_code, label:f.label, amount:parseVal(f.value), source:d.file.name});
    });
  });
  if (t.ipPremium>0) claimedDeductions.push({code:"D15",label:"Income protection insurance premium",amount:t.ipPremium,source:"insurance doc"});
  if (t.deductions>0&&!claimedDeductions.length) claimedDeductions.push({code:"D5",label:"Other work-related expenses",amount:t.deductions,source:"receipts"});
  if (!claimedDeductions.length) return [];
  const statedOccupation = state.clientProfile.occupation || "not stated";
  const atoTitle = state.clientProfile.atoJobTitle;
  const occupationContext = atoTitle
    ? "ATO-confirmed job title: \""+atoTitle+"\""
    : "Stated occupation: \""+statedOccupation+"\" (manually entered - ATO confirmation not yet available)";
  const system = "You are an expert Australian tax compliance reviewer. Analyse each claimed deduction against ATO occupation-specific deduction rules and s.8-1 ITAA 1997. Return ONLY a JSON array, no markdown. Each item: {\"code\":\"D1\",\"label\":\"description\",\"amount\":1234.56,\"verdict\":\"accepted|query|rejected\",\"confidence\":\"high|medium|low\",\"reason\":\"brief explanation\",\"ato_reference\":\"s.8-1 ITAA 1997 or ATO guide\",\"action\":\"what to do\"}";
  const deductList = claimedDeductions.map(function(d,i){return (i+1)+". "+d.code+" - "+d.label+": $"+d.amount.toFixed(2)+" (source: "+d.source+")";}).join("\n");
  const prompt = "FY"+fy+" deduction legitimacy check.\n\nEMPLOYER (from PAYG - what ATO knows via STP):\n"+employerStr+"\n\n"+occupationContext+"\n\nCLAIMED DEDUCTIONS:\n"+deductList+"\n\nFor each deduction: infer industry from employer name, cross-reference ATO occupation-specific rules, flag inconsistencies.";
  const raw = await callClaude(apiKey, { system, messages:[{role:"user",content:prompt}], maxTokens:1200 });
  try { return JSON.parse(raw.replace(/```json|```/g,"").trim()); }
  catch(e) { return [{code:"?",label:"Parse error",amount:0,verdict:"query",confidence:"low",reason:"Legitimacy check could not be parsed.",ato_reference:"s.8-1 ITAA 1997",action:"Manual review required"}]; }
}

// Compute adjusted totals by applying all active adjustment overrides on top of base docs
function computeAdjustedTotals(docs, clientProfile, selectedFY, adjustments) {
  const base = computeTotals(docs, clientProfile, selectedFY);
  let overrides = {
    deductions: base.deductions,
    ipPremium: base.ipPremium,
    paygIncome: base.paygIncome,
    rentalIncome: base.rentalIncome,
    rentalExp: base.rentalExp,
    capitalGains: base.capitalGains,
  };
  // Apply each adjustment's delta in order
  (adjustments || []).forEach(function(adj) {
    if (adj.delta) {
      Object.keys(adj.delta).forEach(function(k) {
        if (overrides[k] !== undefined) overrides[k] = adj.delta[k];
      });
    }
  });
  // Re-run tax calc with overrides applied
  const fy = selectedFY || DEFAULT_FY;
  const { hasSpouse=false, numDependants=0, spouseIncome=0, phiRebateReceived=0 } = clientProfile || {};
  const netRental = overrides.rentalIncome - overrides.rentalExp;
  const totalIncome = overrides.paygIncome + (base.essBoxF||0) + (base.essBoxD||0) + (base.essBoxE||0) + (base.ipBenefit||0) + (netRental > 0 ? netRental : 0) + overrides.capitalGains;
  const taxableIncome = Math.max(0, totalIncome - overrides.deductions - (overrides.ipPremium||0) + (netRental < 0 ? netRental : 0));
  const grossTax = calcTax(taxableIncome, fy);
  const lito = calcLITO(taxableIncome, fy);
  const lmito = calcLMITO(taxableIncome, fy);
  const familyATI = taxableIncome + spouseIncome;
  const medicare = calcMedicareLevy(taxableIncome, familyATI, numDependants, hasSpouse, fy);
  const phiClawback = calcPHIClawback(familyATI, phiRebateReceived, hasSpouse, numDependants, fy);
  const netTax = Math.max(0, grossTax - lito - lmito + medicare + phiClawback);
  const totalTaxWH = base.totalTaxWH;
  const refund = totalTaxWH - netTax;
  return { ...base, ...overrides, totalIncome, taxableIncome, grossTax, lito, lmito, medicare, phiClawback, netTax, totalTaxWH, refund, netRental };
}

// Send instruction to Claude, get back a structured delta + human summary
// Build a flat list of all deduction line items from extracted docs
function buildDeductionLineItems(docs, currentTotals) {
  const lines = [];
  const done = (docs || []).filter(function(d){ return d.status==="done" && d.extracted && !d.extracted.error; });
  done.forEach(function(d) {
    const ex = d.extracted;
    // D-coded fields from field grid
    (ex.fields || []).forEach(function(f) {
      if (f.ato_code && /^D/i.test(f.ato_code) && parseVal(f.value) > 0) {
        lines.push({ code: f.ato_code, label: f.label, amount: parseVal(f.value), source: d.file.name });
      }
    });
    // Income protection premium as D15
    if (parseVal(ex.incProtectionPremium) > 0) {
      lines.push({ code:"D15", label:"Income protection insurance premium", amount: parseVal(ex.incProtectionPremium), source: d.file.name });
    }
  });
  // If no coded lines found but we have a deductions total, add a generic entry
  if (!lines.length && currentTotals.deductions > 0) {
    lines.push({ code:"D5", label:"Work-related expenses (total)", amount: currentTotals.deductions, source:"extracted" });
  }
  return lines;
}

async function interpretAdjustment(apiKey, instruction, currentTotals, docs, selectedFY) {
  const fy = getFYLabel(selectedFY);
  const lineItems = buildDeductionLineItems(docs, currentTotals);
  const lineItemsText = lineItems.length
    ? lineItems.map(function(l,i){ return (i+1)+". "+l.code+" \""+l.label+"\" $"+l.amount.toFixed(2)+" ("+l.source+")"; }).join("\n")
    : "No individual deduction lines extracted — only total available: $"+currentTotals.deductions.toFixed(2);

  const system = `You are an intelligent Australian tax return adjustment assistant. The accountant gives you a plain-English instruction to adjust the ITR. You have access to the full list of extracted deduction line items.

EXTRACTED DEDUCTION LINE ITEMS:
${lineItemsText}

CURRENT ITR TOTALS (AUD):
- deductions (total work-related, sum of D1-D14 above): ${currentTotals.deductions.toFixed(2)}
- ipPremium (income protection D15): ${(currentTotals.ipPremium||0).toFixed(2)}
- paygIncome (salary Item 1): ${currentTotals.paygIncome.toFixed(2)}
- rentalIncome: ${currentTotals.rentalIncome.toFixed(2)}
- rentalExp: ${currentTotals.rentalExp.toFixed(2)}
- capitalGains: ${currentTotals.capitalGains.toFixed(2)}

YOUR JOB:
1. Match the instruction to specific line item(s) using fuzzy/semantic matching — e.g. "mobile" matches "Mobile phone expenses", "car" matches "Motor vehicle expenses", "WFH" matches "Working from home"
2. Calculate the new deduction TOTAL after the change
3. Return ONLY valid JSON — no markdown, no preamble

RESPONSE FORMATS — choose one:

A) If you can confidently match and calculate:
{"delta":{"deductions":newTotalValue},"lineItem":{"code":"D3","label":"Mobile phone expenses","oldAmount":420,"newAmount":294,"change":-126},"summary":"Mobile phone expenses reduced from 100% to 70%: $420 → $294. Total deductions: $X → $Y"}

B) If the instruction is ambiguous and multiple line items could match, return candidates for the accountant to choose from:
{"candidates":[{"code":"D3","label":"Mobile phone expenses","amount":420},{"code":"D5","label":"Other work expenses","amount":150}],"summary":"Multiple items could match — please select one"}

C) If you need to add a NEW deduction not in the list:
{"delta":{"deductions":newTotalValue},"lineItem":{"code":"D5","label":"Description of new item","oldAmount":0,"newAmount":amount,"change":amount},"summary":"Added X: $amount. Total deductions: $X → $Y"}

RULES:
- delta.deductions must be the NEW TOTAL of all deductions after the change (not just the changed amount)
- For percentage changes: newAmount = oldAmount * percentage. E.g. 70% of $420 = $294
- For removals: subtract the item's amount from the deductions total
- For additions: add the new amount to the deductions total  
- summary must clearly state: item name, old amount, new amount, and new total deductions
- Be decisive — only return candidates if genuinely ambiguous (2+ equally plausible matches)`;

  const raw = await callClaude(apiKey, {
    system,
    messages: [{ role:"user", content: "FY"+fy+" adjustment: "+instruction }],
    maxTokens: 500,
  });
  try {
    const clean = raw.replace(/```json|```/g,"").trim();
    const start = clean.indexOf("{");
    return JSON.parse(start > -1 ? clean.slice(start) : clean);
  } catch(e) {
    return { delta:{}, summary:"Parse error — please rephrase the instruction." };
  }
}
